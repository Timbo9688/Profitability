<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profitability Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#CC0000;--red2:#a80000;
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f5f5f5;--text2:#b0b0b0;--text3:#666;
  --border:#333;--border2:#444;
  --green:#22c55e;--orange:#f97316;--amber:#eab308;--blue:#3b82f6;
  --r:6px;--rl:10px;
  --fh:'Barlow Condensed',sans-serif;
  --fb:'Barlow',sans-serif;
}
body{font-family:var(--fb);font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:rgba(15,15,15,0.85);z-index:0;pointer-events:none;display:none;}
body.has-bg::before{display:block;}
.app{max-width:1120px;margin:0 auto;position:relative;z-index:1;display:none;}

/* LOCK */
#lock-screen{position:fixed;inset:0;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
.lock-logo{width:90px;height:90px;border-radius:50%;overflow:hidden;border:3px solid var(--red);box-shadow:0 0 24px rgba(204,0,0,.35);}
.lock-logo img{width:100%;height:100%;object-fit:cover;}
.lock-title{font-family:var(--fh);font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:1px;text-align:center;}
.lock-title span{color:var(--red);}
.lock-sub{font-size:11px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;text-align:center;}
.lock-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--rl);padding:28px;width:320px;display:flex;flex-direction:column;gap:12px;}
.lock-box label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;font-weight:600;}
.lock-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:11px 12px;font-size:15px;color:var(--text);letter-spacing:2px;width:100%;}
.lock-inp:focus{outline:none;border-color:var(--red);}
.lock-err{font-size:11px;color:#f87171;min-height:14px;text-align:center;}
.lock-btn{background:var(--red);border:none;color:#fff;padding:12px;border-radius:var(--r);font-size:14px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:1px;cursor:pointer;}
.lock-btn:hover{background:var(--red2);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:2px solid var(--red);}
.topbar-row1{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-logo{width:36px;height:36px;border-radius:50%;overflow:hidden;border:2px solid var(--red);}
.brand-logo img{width:100%;height:100%;object-fit:cover;}
.brand-name{font-family:var(--fh);font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:1px;line-height:1.1;}
.brand-name span{color:var(--red);}
.brand-sub{font-size:9px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.sync-idle{background:var(--border2);}
.sync-ok{background:var(--green);}
.sync-busy{background:var(--amber);animation:pulse .8s infinite;}
.sync-err{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.undo-btn{background:transparent;border:1px solid var(--border2);border-radius:var(--r);padding:5px 11px;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--fb);display:flex;align-items:center;gap:4px;}
.undo-btn:hover:not(:disabled){border-color:var(--text2);color:var(--text);}
.undo-btn:disabled{opacity:.3;cursor:default;}

/* SUMMARY BAR */
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);border-top:1px solid var(--border);}
.sum-cell{padding:9px 16px;border-right:1px solid var(--border);}
.sum-cell:last-child{border-right:none;}
.sum-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;font-weight:600;}
.sum-val{font-size:18px;font-weight:700;font-family:var(--fh);line-height:1.1;}
.sum-sub{font-size:9px;color:var(--text3);margin-top:1px;}
@media(max-width:700px){.summary-bar{grid-template-columns:repeat(3,1fr);}.sum-cell:nth-child(3){border-right:none;}.sum-cell:nth-child(n+4){border-top:1px solid var(--border);}}

/* NAV */
.nav{display:flex;gap:0;background:var(--bg2);border-top:1px solid var(--border);flex-wrap:wrap;}
.nav button{padding:10px 16px;border:none;border-bottom:3px solid transparent;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--fh);letter-spacing:.8px;text-transform:uppercase;background:transparent;color:var(--text3);transition:color .15s,border-color .15s;}
.nav button.active{color:var(--text);border-bottom-color:var(--red);}
.nav button:hover:not(.active){color:var(--text2);}
.bcnt{display:inline-block;background:var(--red);color:#fff;border-radius:10px;padding:0 5px;font-size:9px;margin-left:4px;line-height:16px;vertical-align:middle;}

.content{padding:16px 20px;}

/* COLORS */
.cg{color:var(--green);}.cr{color:#f87171;}.co{color:var(--orange);}.ca{color:var(--amber);}.cb{color:#60a5fa;}

/* ALERTS */
.alert{border-radius:var(--r);padding:8px 12px;margin-bottom:10px;font-size:12px;display:flex;align-items:center;gap:8px;}
.a-warn{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);color:var(--amber);}
.a-red{background:rgba(204,0,0,.08);border:1px solid rgba(204,0,0,.2);color:#f87171;cursor:pointer;user-select:none;}
.a-red:hover{background:rgba(204,0,0,.12);}
.a-info{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);color:#93c5fd;}

/* SEARCH BAR */
.ledger-toolbar{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:10px 12px;}
.l-inp{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--fb);}
.l-inp:focus{outline:none;border-color:var(--red);}
.l-inp.main{flex:1;min-width:180px;}
.l-inp.date{width:120px;}

/* DAY BLOCKS */
.day-section{border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;transition:border-color .2s;}
.day-section.highlighted{border-color:var(--red);box-shadow:0 0 0 2px rgba(204,0,0,.2);}
.day-head{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--bg2);flex-wrap:wrap;}
.day-date-lbl{font-family:var(--fh);font-size:18px;font-weight:700;flex-shrink:0;min-width:52px;}
.day-kpis{display:flex;gap:20px;flex:1;flex-wrap:wrap;}
.kpi{display:flex;flex-direction:column;gap:1px;}
.kpi-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.kpi-val{font-size:15px;font-weight:700;font-family:var(--fh);}
.pill{display:inline-block;padding:2px 10px;border-radius:20px;font-size:13px;font-weight:700;font-family:var(--fh);}
.pill-pos{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.pill-neg{background:rgba(204,0,0,.12);color:#f87171;border:1px solid rgba(204,0,0,.2);}

/* ORDER ROWS */
.day-orders{border-top:1px solid var(--border);}
.ord-hdr{display:flex;align-items:center;padding:5px 16px;background:var(--bg3);font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;gap:8px;border-bottom:1px solid var(--border);}
.ord-row{display:flex;align-items:center;padding:7px 16px;border-bottom:1px solid var(--border);font-size:13px;gap:8px;transition:background .1s;}
.ord-row:last-child{border-bottom:none;}
.ord-row:hover{background:rgba(255,255,255,.02);}
.ord-row.low-margin{background:rgba(204,0,0,.06);}
.ord-num{flex:0 0 52px;font-size:11px;color:var(--text3);font-family:var(--fh);}
.ord-desc{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ord-rev{flex:0 0 88px;text-align:right;}
.ord-vc{flex:0 0 88px;text-align:right;}
.ord-gp{flex:0 0 92px;text-align:right;font-weight:700;}
.ord-act{flex:0 0 auto;display:flex;gap:3px;justify-content:flex-end;flex-wrap:wrap;}

/* ONE-TIME EXPENSES */
.day-exp-section{border-top:1px solid var(--border);background:var(--bg);}
.exp-row{display:flex;align-items:center;padding:6px 16px;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.exp-row:last-of-type{border-bottom:none;}
.exp-add-row{display:flex;align-items:center;gap:8px;padding:7px 16px;flex-wrap:wrap;}

/* FIXED COSTS */
.day-fc{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-top:1px solid var(--border);background:var(--bg2);flex-wrap:wrap;}
.fc-section-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;flex-shrink:0;padding-top:13px;}
.fc-fields{display:flex;gap:8px;flex:1;flex-wrap:wrap;}
.fc-field{display:flex;flex-direction:column;gap:2px;}
.fc-field-lbl{font-size:9px;color:var(--text3);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:82px;text-transform:uppercase;letter-spacing:.3px;}
.fc-inp{width:80px;border:1px solid var(--border2);border-radius:var(--r);padding:4px 6px;font-size:13px;font-family:var(--fb);background:var(--bg3);color:var(--text);text-align:right;}
.fc-inp:focus{outline:none;border-color:var(--red);}
.fc-inp.ov{border-color:var(--amber);color:var(--amber);}
.fc-divider{width:1px;background:var(--border);align-self:stretch;margin:0 4px;flex-shrink:0;}
.fc-right{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
.fc-total-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.fc-total-val{font-size:15px;font-weight:700;font-family:var(--fh);color:var(--orange);}
.fc-reset{background:transparent;border:1px solid var(--border);border-radius:4px;padding:2px 7px;cursor:pointer;font-size:10px;color:var(--text3);font-family:var(--fb);}
.fc-reset:hover{color:var(--text2);}

/* BUTTONS */
.btn-p{background:var(--red);border:none;color:#fff;padding:8px 18px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;}
.btn-p:hover{background:var(--red2);}
.btn-g{background:transparent;border:1px solid var(--border2);padding:7px 14px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:600;font-family:var(--fh);text-transform:uppercase;letter-spacing:.4px;color:var(--text2);}
.btn-g:hover{border-color:var(--text2);color:var(--text);}
.btn-s{background:transparent;border:1px solid var(--border);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;color:var(--text2);font-family:var(--fb);}
.btn-s:hover{border-color:var(--border2);color:var(--text);}
.btn-d{background:transparent;border:1px solid rgba(204,0,0,.35);border-radius:4px;padding:3px 8px;cursor:pointer;font-size:11px;color:#f87171;font-family:var(--fb);}
.btn-d:hover{background:rgba(204,0,0,.08);}
.btn-grn{background:transparent;border:1px solid rgba(34,197,94,.35);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:11px;font-weight:600;color:var(--green);font-family:var(--fb);}
.btn-grn:hover{background:rgba(34,197,94,.08);}
.inp-base{border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:13px;font-family:var(--fb);background:var(--bg2);color:var(--text);}
.inp-base:focus{outline:none;border-color:var(--red);}

/* FORMS */
.form-wrap{max-width:620px;}
.s-title{font-family:var(--fh);font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.s-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.frow{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.fg input,.fg select{border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-size:14px;font-family:var(--fb);background:var(--bg2);color:var(--text);width:100%;}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(204,0,0,.12);}
.preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;gap:20px;flex-wrap:wrap;}
.pv-i{display:flex;flex-direction:column;gap:2px;}
.pv-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.pv-val{font-size:19px;font-weight:800;font-family:var(--fh);}
.ret-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-top:12px;}
.chk-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:8px;}
.chk-row input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--red);}

/* SUMMARY */
.sum-cards{display:flex;flex-direction:column;gap:14px;}
.sum-card{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.sum-card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
.sum-card-title{font-family:var(--fh);font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;}
.sum-card-sub{font-size:11px;color:var(--text3);}
.sum-card-body{padding:14px 16px;}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
@media(max-width:600px){.sum-grid{grid-template-columns:1fr 1fr;}}
.sum-metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.sm-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600;}
.sm-val{font-size:20px;font-weight:800;font-family:var(--fh);}
.sm-sub{font-size:10px;color:var(--text3);margin-top:2px;}
.sum-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sum-bar-lbl{font-size:11px;color:var(--text2);width:110px;flex-shrink:0;}
.sum-bar-track{flex:1;background:var(--bg3);border-radius:3px;height:6px;overflow:hidden;}
.sum-bar-fill{height:100%;border-radius:3px;}
.sum-bar-amt{font-size:12px;font-weight:600;width:90px;text-align:right;flex-shrink:0;font-family:var(--fh);}
.sum-bar-pct{font-size:11px;color:var(--text3);width:36px;text-align:right;flex-shrink:0;}
.sum-stats{display:flex;gap:20px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);}
.sum-stats strong{color:var(--text);font-weight:600;}
.sum-breakdown{display:flex;gap:20px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
.breakdown-col{flex:1;min-width:150px;}
.bk-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.bk-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.bk-lbl{color:var(--text2);}.bk-val{font-weight:600;font-family:var(--fh);}
.chart-wrap{height:160px;margin-bottom:12px;}
.be-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap;}
.be-item{flex:1;min-width:110px;background:var(--bg3);border-radius:var(--r);padding:10px 12px;}
.be-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;font-weight:600;}
.be-val{font-size:18px;font-weight:800;font-family:var(--fh);}
.no-data{padding:40px;text-align:center;color:var(--text3);font-size:13px;}

/* SETTINGS */
.ss{margin-bottom:24px;}
.ss-title{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.period-item{border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;margin-bottom:6px;background:var(--bg2);}
.period-item.cur{border-color:var(--red);}
.period-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cur-badge{font-size:10px;background:rgba(204,0,0,.15);color:var(--red);border-radius:20px;padding:1px 7px;font-weight:700;border:1px solid rgba(204,0,0,.25);}
.period-items-list{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);}
.period-items-list span{color:var(--text);font-weight:600;}
.period-editor{background:var(--bg2);border-radius:var(--rl);padding:16px;margin-bottom:12px;border:1px solid var(--border);}
.period-editor-items{border:1px solid var(--border);border-radius:var(--r);padding:4px 12px;background:var(--bg3);margin-bottom:10px;}
.pi-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border);}
.pi-row:last-child{border-bottom:none;}
.pi-name{flex:1;min-width:110px;border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:13px;font-family:var(--fb);background:var(--bg);color:var(--text);}
.pi-amt{width:85px;border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:13px;font-family:var(--fb);background:var(--bg);color:var(--text);text-align:right;}
.pi-freq{border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:13px;font-family:var(--fb);background:var(--bg);color:var(--text);}
.pi-rate{font-size:11px;color:var(--text3);width:72px;text-align:right;flex-shrink:0;}
.pi-name:focus,.pi-amt:focus,.pi-freq:focus{outline:none;border-color:var(--red);}
.cx-card{border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;background:var(--bg2);}
.cx-card.ended{opacity:.55;}
.cx-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px;}
.cx-field{display:flex;flex-direction:column;gap:2px;}
.cx-field label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.3px;}
.cx-field input,.cx-field select{border:1px solid var(--border2);border-radius:var(--r);padding:6px 8px;font-size:13px;font-family:var(--fb);background:var(--bg);color:var(--text);}
.cx-field input:focus,.cx-field select:focus{outline:none;border-color:var(--red);}
.fc-config-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--border);}
.fc-config-row:last-child{border-bottom:none;}
.fc-lbl-inp{border:1px solid var(--border2);border-radius:var(--r);padding:5px 8px;font-size:13px;font-family:var(--fb);background:var(--bg);color:var(--text);width:170px;}
.fc-lbl-inp:focus{outline:none;border-color:var(--red);}
.sync-box{background:var(--bg2);border-radius:var(--rl);padding:14px;margin-bottom:10px;border:1px solid var(--border);}
.sync-inp{border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:var(--fb);background:var(--bg);color:var(--text);width:100%;margin-top:4px;}
.sync-inp:focus{outline:none;border-color:var(--red);}
.audit-box{background:var(--bg2);border-radius:var(--rl);padding:14px;border:1px solid var(--border);}
.a-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.a-row:last-of-type{border-bottom:none;}
.a-phdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 0 3px;margin-top:4px;}
.a-total{display:flex;justify-content:space-between;font-size:14px;font-weight:700;font-family:var(--fh);padding-top:8px;margin-top:4px;border-top:1px solid var(--border2);}

/* LABELS / CORE RETURNS */
.lbl-card{border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;background:var(--bg2);}
.lbl-card.used{opacity:.5;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.3px;}
.bdg-p{background:rgba(234,179,8,.12);color:var(--amber);border:1px solid rgba(234,179,8,.2);}
.bdg-u{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.email-tpl{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;font-size:11px;font-family:monospace;color:var(--text2);white-space:pre-wrap;line-height:1.6;margin-top:8px;word-break:break-word;}

/* HISTORY */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:1px solid var(--border);}
thead th{padding:6px 8px;font-weight:700;color:var(--text3);white-space:nowrap;font-family:var(--fh);text-transform:uppercase;letter-spacing:.4px;font-size:10px;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:hover{background:var(--bg2);}
tbody td{padding:7px 8px;}
.right{text-align:right;}

/* MISC */
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.empty h3{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--text2);margin-bottom:6px;text-transform:uppercase;}
.empty p{font-size:13px;margin-bottom:18px;}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0;}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;background:var(--bg3);color:var(--text2);text-transform:uppercase;letter-spacing:.3px;}
.fc-row{display:flex;align-items:center;gap:8px;}
@media(max-width:600px){.ord-vc,.ord-gp{flex:0 0 72px;}.content{padding:10px 12px;}.day-head{padding:8px 12px;}.ord-row{padding:6px 12px;}}







</style>

// ── PASSWORD ──────────────────────────────────────────────────────────────────
const PASS_KEY='hpdc-pass';

function unlock(){
  const v=document.getElementById('lock-inp').value;

// ── STATE ─────────────────────────────────────────────────────────────────────
let orders=[], fcPeriods=[], customExpenses=[], dailyOverrides={};
let dailyExpenses=[], fieldConfig=[], syncConfig={enabled:false,scriptUrl:''};
let burnRates=[]; // [{id,effectiveDate,dailyTotal,note}]
let employees=[]; // [{id,name,role,active}]
let undoStack=[], alertThreshold=30;
let view='daily', editId=null, f=fresh(), newPeriodDraft=null, newCxDraft=null;
let entryDatePreset=null, addingExpDate=null;

const DEFAULT_FIELDS=[
  {id:'headsCost',   label:'Heads cost',    active:true, builtin:true},
  {id:'coreCost',    label:'Core cost',     active:true, builtin:true},
  {id:'dnjParts',    label:'DNJ parts',     active:true, builtin:true},
  {id:'shipping',    label:'Shipping',      active:true, builtin:true},
  {id:'newHeadCost', label:'New head cost', active:true, builtin:true},
  {id:'newPartsCost',label:'New parts cost',active:true, builtin:true},
];
const DEFAULT_FC_ITEMS=[];

function today(){const d=new Date();return`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;}
function todayShort(){const d=new Date();return`${d.getMonth()+1}/${d.getDate()}`;}
function sid(d){return d.replace(/\//g,'_');}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fresh(){
  const o={date:'',orderNum:'',customerName:'',technician:'',quantity:'1',description:'',revenue:'',returnSent:false,returnUsed:false,returnCost:'',coreValue:'',trackingNumbers:[],returnedNums:[],reminderLog:[],customerEmail:'',warrantyVoided:false,notes:''};
  fieldConfig.forEach(fc=>{if(!(fc.id in o))o[fc.id]='';});
  return o;
}


// UPS tracking URL builder — %0A must be literal, NOT encoded, NOT a real newline
function upsUrl(nums){return 'https://www.ups.com/track?tracknum='+nums.filter(t=>t.trim()).join('%0A');}
function openUPS(nums){window.open(upsUrl(nums),'_blank');}
// ── UNDO ─────────────────────────────────────────────────────────────────────
function pushUndo(){
  undoStack.push({
    orders:JSON.parse(JSON.stringify(orders)),
    fcPeriods:JSON.parse(JSON.stringify(fcPeriods)),
    customExpenses:JSON.parse(JSON.stringify(customExpenses)),
    dailyOverrides:JSON.parse(JSON.stringify(dailyOverrides)),
    dailyExpenses:JSON.parse(JSON.stringify(dailyExpenses)),
    fieldConfig:JSON.parse(JSON.stringify(fieldConfig)),
  });
  if(undoStack.length>20)undoStack.shift();
  updateUndoBtn();
}
function undo(){
  if(!undoStack.length)return;
  const p=undoStack.pop();
  orders=p.orders;fcPeriods=p.fcPeriods;customExpenses=p.customExpenses;
  dailyOverrides=p.dailyOverrides;dailyExpenses=p.dailyExpenses;fieldConfig=p.fieldConfig;
  saveAll();savePeriods();saveCx();saveFields();
  updateUndoBtn();render();
}
function updateUndoBtn(){
  const btn=document.getElementById('undo-btn');
  if(btn){btn.disabled=undoStack.length===0;btn.title=undoStack.length?`Undo (${undoStack.length} step${undoStack.length>1?'s':''} available)`:'Nothing to undo';}
}

// ── STORAGE ───────────────────────────────────────────────────────────────────
function loadData(){
  try{
    const g=k=>{const v=localStorage.getItem(k);return v?JSON.parse(v):null;};
    const ro_=g('hpdc-reviewed');if(ro_)reviewedOrders=new Set(ro_);
    const grs_=g('hpdc-review-state');if(grs_)googleReviewState=grs_;
    googleReviewLink=localStorage.getItem('hpdc-review-link')||'';
    const crd_=localStorage.getItem('hpdc-crd');if(crd_)coreReturnDays=parseInt(crd_)||30;
    const et_=localStorage.getItem('hpdc-etpl');emailTemplate=et_!=null?et_:"Please drop the core off at any UPS location at your earliest convenience.\n\nThank you for your business!\nHeavy Duty Parts Company";
    const fp=g('hpdc-periods'),cx=g('hpdc-cx'),
          dv=g('hpdc-dov'),de=g('hpdc-dexp'),fc=g('hpdc-fields'),sc=g('hpdc-sync'),at=g('hpdc-at');
    // Orders live in the cloud only — never in localStorage
    if(fp) fcPeriods=fp.map(migratePeriod);
    if(cx) customExpenses=cx;
    if(dv) dailyOverrides=dv;
    if(de) dailyExpenses=de;
    fieldConfig=fc?mergeFields(fc):[...DEFAULT_FIELDS];
    if(sc){syncConfig={...syncConfig,...sc};syncConfig.enabled=!!(sc.scriptUrl||sc.binId);}
    if(at!=null) alertThreshold=at;
    const emp_=g('hpdc-emp');if(emp_)employees=emp_;
    const br_=g('hpdc-burn');
    if(br_)burnRates=br_;
    const old=localStorage.getItem('hpdc-fc');
    if(old&&!fcPeriods.length){const v=JSON.parse(old);fcPeriods=[{id:uid(),effectiveDate:'1/1/2025',note:'Migrated',items:DEFAULT_FC_ITEMS.map(x=>({...x,amount:v[{payroll:'payrollWeekly',rent:'rentMonthly',merch:'merchantFeesMonthly',ads:'googleAdsDaily',loan:'ppLoanWeekly'}[x.key]]||x.amount}))}];savePeriods();}
  }catch(err){}
  if(!fcPeriods.length){fcPeriods=[{id:uid(),effectiveDate:today(),note:'Initial setup',items:DEFAULT_FC_ITEMS.map(x=>({...x}))}];savePeriods();}
  // Migrate old fcPeriods to new burnRates if needed
  if(!burnRates.length && fcPeriods.length){
    burnRates=fcPeriods.map(p=>{
      const daily=p.items?p.items.reduce((s,item)=>{
        const a=parseFloat(item.amount)||0;
        return s+(item.freq==='daily'?a:item.freq==='weekly'?a/7:a/30);
      },0):0;
      return{id:uid(),effectiveDate:p.effectiveDate,dailyTotal:Math.round(daily*100)/100,note:p.note||''};
    }).sort((a,b)=>pd(b.effectiveDate)-pd(a.effectiveDate));
    saveBurnRates();
  }
  initNewPeriod();
}
function migratePeriod(p){
  if(p.items)return p;
  return{...p,items:[
    ...(p.payrollWeekly!=null?[{key:'payroll',name:'Payroll',amount:p.payrollWeekly,freq:'weekly'}]:[]),
    ...(p.rentMonthly!=null?[{key:'rent',name:'Rent',amount:p.rentMonthly,freq:'monthly'}]:[]),
    ...(p.merchantFeesMonthly!=null?[{key:'merch',name:'Merchant fees',amount:p.merchantFeesMonthly,freq:'monthly'}]:[]),
    ...(p.googleAdsDaily!=null?[{key:'ads',name:'Google Ads',amount:p.googleAdsDaily,freq:'daily'}]:[]),
    ...(p.ppLoanWeekly!=null?[{key:'loan',name:'PPP / loan',amount:p.ppLoanWeekly,freq:'weekly'}]:[]),
  ]};
}
function mergeFields(saved){
  const m=[...DEFAULT_FIELDS.map(d=>{const s=saved.find(x=>x.id===d.id);return s?{...d,...s,builtin:true}:d;})];
  saved.filter(x=>!x.builtin).forEach(x=>m.push(x));
  return m;
}
function saveAll(){
  try{localStorage.setItem('hpdc-dexp',JSON.stringify(dailyExpenses));localStorage.setItem('hpdc-dov',JSON.stringify(dailyOverrides));localStorage.setItem('hpdc-reviewed',JSON.stringify([...reviewedOrders]));stamp();}catch(e){}
  if(syncConfig.enabled&&syncConfig.scriptUrl)scheduleSync();
}
function savePeriods(){try{localStorage.setItem('hpdc-periods',JSON.stringify(fcPeriods));}catch(e){}}
function dedupOrders(){
  const seen=new Map();
  const deduped=[];
  orders.forEach(o=>{
    const k=String(o.orderNum).toLowerCase().trim();
    if(!k)return;
    if(!seen.has(k)){seen.set(k,deduped.length);deduped.push(o);}
    else{
      // Merge: keep higher _updated, combine reminderLogs, prefer returnedNums from whichever is more complete
      const idx=seen.get(k);
      const ex=deduped[idx];
      const winner=(o._updated||0)>=(ex._updated||0)?o:ex;
      const loser=(o._updated||0)>=(ex._updated||0)?ex:o;
      const mergedRem=[...(new Set([...(winner.reminderLog||[]),...(loser.reminderLog||[])]))].sort();
      const mergedRetNums=[...(new Set([...(winner.returnedNums||[]),...(loser.returnedNums||[])]))];
      deduped[idx]={...winner,reminderLog:mergedRem,returnedNums:mergedRetNums,returnUsed:winner.returnUsed||loser.returnUsed};
    }
  });
  const removed=orders.length-deduped.length;
  if(removed===0){alert('No duplicates found.');return;}
  pushUndo();
  orders=deduped;
  saveAll();
  render();
  alert('Fixed: removed '+removed+' duplicate order'+(removed>1?'s':'')+'. Pull from cloud to sync the cleanup up.');
}
function saveBurnRates(){
  try{
    localStorage.setItem('hpdc-burn',JSON.stringify(burnRates));
    if(syncConfig.enabled&&syncConfig.scriptUrl)scheduleSync();
  }catch(e){}
}
function getEffectiveBurn(dateStr){
  if(!burnRates.length)return 0;
  const d=pd(dateStr);
  const sorted=[...burnRates].sort((a,b)=>pd(b.effectiveDate)-pd(a.effectiveDate));
  const match=sorted.find(r=>pd(r.effectiveDate)<=d);
  return match?parseFloat(match.dailyTotal)||0:parseFloat(sorted[sorted.length-1].dailyTotal)||0;
}
function saveCx(){try{localStorage.setItem('hpdc-cx',JSON.stringify(customExpenses));}catch(e){}}
function saveFields(){try{localStorage.setItem('hpdc-fields',JSON.stringify(fieldConfig));}catch(e){}}
function saveSyncConf(){try{localStorage.setItem('hpdc-sync',JSON.stringify({enabled:syncConfig.enabled,scriptUrl:syncConfig.scriptUrl}));}catch(e){}}
function stamp(){const ts=Date.now();localStorage.setItem('hpdc-local-ts',ts);const el=document.getElementById('last-saved');if(el)el.textContent='Saved '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

// ── CLOUD SYNC ────────────────────────────────────────────────────────────────
function setSyncStatus(s,msg){const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-status');if(dot)dot.className='sync-dot sync-'+s;if(txt)txt.textContent=msg||s;}
function getPayload(){
  let versions=[];try{const v=localStorage.getItem('hpdc-versions');if(v)versions=JSON.parse(v);}catch(ex){}
  const bg=localStorage.getItem('hpdc-bg')||null;
  return{orders,fcPeriods,customExpenses,dailyOverrides,dailyExpenses,fieldConfig,
    burnRates,employees,alertThreshold,coreReturnDays,emailTemplate,
    reviewedOrders:[...reviewedOrders],appPassword,versions,bg,_ts:Date.now()};
}
async function forcePushToCloud(){
  /* READ-ONLY MODE: the app no longer writes to the cloud. The Profitability New sheet is the single source of truth.
     Enter and edit data in the sheet; the app pulls it down. */
  stamp(); setSyncStatus('ok','read-only');
}
async function syncToCloud(){
  // READ-ONLY MODE: "Sync" now only PULLS the latest from the cloud. Data entry happens in the Profitability New sheet.
  if(!syncConfig.scriptUrl){setSyncStatus('err','no script URL');return;}
  syncConfig.enabled=true;saveSyncConf();
  setSyncStatus('busy','refreshing…');
  const changed=await syncFromCloud();
  if(changed)render();
}
async function syncFromCloud(){
  if(!syncConfig.enabled||!syncConfig.scriptUrl)return false;
  setSyncStatus('busy','fetching…');
  try{
    const r=await fetch(syncConfig.scriptUrl);
    if(!r.ok)throw new Error(r.status);
    const rec=await r.json();
    if(rec._ts&&rec.orders){
      // Cloud is the only source of truth — take it directly, no merge
      orders=rec.orders;
      // Never write orders to localStorage
      if(rec.fcPeriods){fcPeriods=rec.fcPeriods.map(migratePeriod);localStorage.setItem('hpdc-periods',JSON.stringify(fcPeriods));}
      if(rec.customExpenses){customExpenses=rec.customExpenses;localStorage.setItem('hpdc-cx',JSON.stringify(customExpenses));}
      if(rec.dailyOverrides){dailyOverrides=rec.dailyOverrides;localStorage.setItem('hpdc-dov',JSON.stringify(dailyOverrides));}
      if(rec.dailyExpenses){dailyExpenses=rec.dailyExpenses;localStorage.setItem('hpdc-dexp',JSON.stringify(dailyExpenses));}
      if(rec.fieldConfig){fieldConfig=mergeFields(rec.fieldConfig);localStorage.setItem('hpdc-fields',JSON.stringify(fieldConfig));}
      // New systems
      if(rec.burnRates){burnRates=rec.burnRates;localStorage.setItem('hpdc-burn',JSON.stringify(burnRates));}
      if(rec.employees){employees=rec.employees;localStorage.setItem('hpdc-emp',JSON.stringify(employees));}
      // Settings
      if(rec.alertThreshold!=null){alertThreshold=rec.alertThreshold;localStorage.setItem('hpdc-at',rec.alertThreshold);}
      if(rec.coreReturnDays!=null){coreReturnDays=rec.coreReturnDays;localStorage.setItem('hpdc-crd',rec.coreReturnDays);}
      if(rec.emailTemplate!=null){emailTemplate=rec.emailTemplate;localStorage.setItem('hpdc-etpl',rec.emailTemplate);}
      if(rec.reviewedOrders){reviewedOrders=new Set(rec.reviewedOrders);localStorage.setItem('hpdc-reviewed',JSON.stringify(rec.reviewedOrders));}
      if(rec.reviewState){
        Object.keys(rec.reviewState).forEach(k=>{
          if(!googleReviewState[k]){googleReviewState[k]=rec.reviewState[k];}
          else{Object.assign(googleReviewState[k],rec.reviewState[k]);if(rec.reviewState[k].sent)googleReviewState[k].sent=true;}
        });
        localStorage.setItem('hpdc-review-state',JSON.stringify(googleReviewState));
      }
      if(rec.appPassword){appPassword=rec.appPassword;localStorage.setItem('hpdc-pass',rec.appPassword);}
      if(rec.versions){localStorage.setItem('hpdc-versions',JSON.stringify(rec.versions));}
      if(rec.bg!=null){if(rec.bg){localStorage.setItem('hpdc-bg',rec.bg);}else{localStorage.removeItem('hpdc-bg');}applyBg();}
      if(rec._incoming){incomingData=rec._incoming;try{localStorage.setItem('hpdc-incoming',JSON.stringify(rec._incoming));}catch(e){}}
      // Sheet-based settings (App Settings tab) — these win over localStorage
      if(rec.settings){
        const s=rec.settings;
        // Background: fetch base64 via ?action=bg when timestamp changes (avoids broken Drive URL in CSS)
        if(s.background_ts){
          const cachedTs=localStorage.getItem('hpdc-bg-ts');
          if(String(s.background_ts)!==cachedTs&&syncConfig.scriptUrl){
            localStorage.removeItem('hpdc-bg-url');
            fetch(syncConfig.scriptUrl+'?action=bg')
              .then(r=>r.json())
              .then(bg=>{if(bg.data){localStorage.setItem('hpdc-bg',bg.data);localStorage.setItem('hpdc-bg-ts',String(bg.ts||s.background_ts));applyBg();}})
              .catch(()=>{});
          }
        }
        if(s.background_url&&!s.background_ts){localStorage.setItem('hpdc-bg-url',s.background_url);applyBg();}
        if(s.burn_rate){const monthly=parseFloat(String(s.burn_rate).replace(/[$,]/g,''));if(!isNaN(monthly)&&monthly>0){burnRates=[{id:'sheet',effectiveDate:'1/1/2020',dailyTotal:monthly/30,note:'From sheet settings'}];localStorage.setItem('hpdc-burn',JSON.stringify(burnRates));}}
        if(s.alert_threshold!=null){alertThreshold=parseFloat(s.alert_threshold)||alertThreshold;localStorage.setItem('hpdc-at',alertThreshold);}
        if(s.core_return_days!=null){coreReturnDays=parseInt(s.core_return_days)||coreReturnDays;localStorage.setItem('hpdc-crd',coreReturnDays);}
        if(s.google_review_link){googleReviewLink=s.google_review_link;localStorage.setItem('hpdc-review-link',s.google_review_link);}
        if(s.email_template){emailTemplate=s.email_template;localStorage.setItem('hpdc-etpl',s.email_template);}
      }
      // Update local timestamp to cloud timestamp so we don't re-pull unnecessarily
      localStorage.setItem('hpdc-local-ts',rec._ts);
    }
    setSyncStatus('ok','synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));return true;
  }catch(e){setSyncStatus('err','sync failed');return false;}
}
async function testScript(){
  if(!syncConfig.scriptUrl){alert('Paste your Google Apps Script URL first.');return;}
  setSyncStatus('busy','testing…');
  try{
    const r=await fetch(syncConfig.scriptUrl);
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    syncConfig.enabled=true;saveSyncConf();
    setSyncStatus('ok','connected');
    alert('Google Drive sync connected! Push your data now.');
  }catch(e){setSyncStatus('err','failed: '+e.message);alert('Could not connect. Make sure the script is deployed as a web app with Anyone access.');}
}
let syncPending=false;
function scheduleSync(){if(!syncConfig.scriptUrl)return;if(syncPending)return;syncPending=true;setTimeout(()=>{syncPending=false;syncToCloud();},1500);}
let syncTimer=null;
function startAutoPoll(){
  if(syncTimer)clearInterval(syncTimer);
  if(!syncConfig.enabled||!syncConfig.scriptUrl)return;
  syncTimer=setInterval(async()=>{
    if(!document.hidden&&!syncPending){
      try{
        const r=await fetch(syncConfig.scriptUrl);
        if(!r.ok)return;
        const rec=await r.json();
        // Always pull every 60s — catches new orders AND edits to existing ones
        const changed=await syncFromCloud();
        if(changed)render();
      }catch(ex){}
    }
  },60000);
}
function exportData(){const b=new Blob([JSON.stringify(getPayload(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hdpc-'+new Date().toISOString().slice(0,10)+'.json';a.click();}
function exportCSV(){
  const rows=[['Date','Order #','Description','Revenue',...fieldConfig.filter(f=>f.active).map(f=>f.label),'Return label','Gross margin']];
  orders.forEach(o=>{rows.push([o.date,o.orderNum,o.description,n(o.revenue),...fieldConfig.filter(f=>f.active).map(f=>n(o[f.id]||0)),o.returnUsed?n(o.returnCost):0,gp(o)]);});
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hdpc-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
}
function importData(){const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const rec=JSON.parse(ev.target.result);pushUndo();if(rec.orders)orders=rec.orders;if(rec.fcPeriods)fcPeriods=rec.fcPeriods.map(migratePeriod);if(rec.customExpenses)customExpenses=rec.customExpenses;if(rec.dailyOverrides)dailyOverrides=rec.dailyOverrides;if(rec.dailyExpenses)dailyExpenses=rec.dailyExpenses;if(rec.fieldConfig)fieldConfig=mergeFields(rec.fieldConfig);saveAll();savePeriods();saveCx();saveFields();render();}catch(err){console.error(err);}};r.readAsText(f);};i.click();}

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
function pd(s){if(!s)return new Date(2000,0,1);const p=s.split('/').map(Number);return p.length===3?new Date(p[2],p[0]-1,p[1]):new Date(new Date().getFullYear(),p[0]-1,p[1]);}
function normDateStr(s){if(!s)return s;const d=pd(s);if(!d||isNaN(d.getTime()))return s;return(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear();}
function dateRanges(){
  const n=new Date(),y=n.getFullYear(),mo=n.getMonth(),da=n.getDate(),dow=n.getDay();
  const wkS=new Date(y,mo,da-(dow===0?6:dow-1));const wkE=new Date(wkS);wkE.setDate(wkS.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return{
    today:{start:new Date(y,mo,da),end:new Date(y,mo,da,23,59,59),label:'Today',sub:n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})},
    week:{start:wkS,end:wkE,label:'This week',sub:`${fmt(wkS)} – ${fmt(wkE)}`},
    month:{start:new Date(y,mo,1),end:new Date(y,mo+1,0,23,59,59),label:'This month',sub:n.toLocaleDateString('en-US',{month:'long',year:'numeric'})},
    year:{start:new Date(y,0,1),end:new Date(y,11,31,23,59,59),label:'This year',sub:String(y)},
  };
}

// ── PERIOD LOOKUPS ────────────────────────────────────────────────────────────
function getPeriod(dateStr){const d=pd(dateStr);const s=[...fcPeriods].filter(p=>pd(p.effectiveDate)<=d).sort((a,b)=>pd(b.effectiveDate)-pd(a.effectiveDate));return s[0]||[...fcPeriods].sort((a,b)=>pd(a.effectiveDate)-pd(b.effectiveDate))[0];}
function currentPeriod(){return[...fcPeriods].sort((a,b)=>pd(b.effectiveDate)-pd(a.effectiveDate))[0];}

// ── FIXED COST RATES ──────────────────────────────────────────────────────────
function getItemDailyRate(item){const a=parseFloat(item.amount)||0;if(item.freq==='daily')return a;if(item.freq==='weekly')return a/7;return a/30;}
function getDayItemRate(date,key){const ov=dailyOverrides[date];if(ov&&key in ov&&ov[key]!==''&&ov[key]!==null)return parseFloat(ov[key])||0;const period=getPeriod(date);const item=period.items.find(x=>x.key===key);return item?getItemDailyRate(item):0;}
function isItemOv(date,key){const ov=dailyOverrides[date];return!!(ov&&key in ov&&ov[key]!==''&&ov[key]!==null);}
function hasAnyOv(date){const ov=dailyOverrides[date];return!!(ov&&Object.keys(ov).length);}
function setDayItemRate(date,key,raw){if(!dailyOverrides[date])dailyOverrides[date]={};if(raw===''||raw===null)delete dailyOverrides[date][key];else dailyOverrides[date][key]=parseFloat(raw)||0;if(!Object.keys(dailyOverrides[date]).length)delete dailyOverrides[date];saveAll();refreshDayNums(date);}
function resetDay(date){pushUndo();delete dailyOverrides[date];saveAll();render();}
function getDayBurnLegacy(date){const period=getPeriod(date);let t=period.items.reduce((s,item)=>s+getDayItemRate(date,item.key),0);getActiveCx(date).forEach(cx=>{t+=getCxRate(date,cx.id);});return t;}
function getDayBurn(date){
  return burnRates.length ? getEffectiveBurn(date) : getDayBurnLegacy(date);
}

// ── CUSTOM EXPENSES ───────────────────────────────────────────────────────────
function getActiveCx(date){const d=pd(date);return customExpenses.filter(x=>{if(x.freq==='onetime')return false;const st=pd(x.startDate),en=x.endDate?pd(x.endDate):null;return st<=d&&(!en||en>=d);});}
function cxDefaultRate(cx){const a=parseFloat(cx.amount)||0;if(cx.freq==='daily')return a;if(cx.freq==='weekly')return a/7;return a/30;}
function getCxRate(date,cxId){const key=`cx_${cxId}`,ov=dailyOverrides[date];if(ov&&key in ov&&ov[key]!==''&&ov[key]!==null)return parseFloat(ov[key])||0;const cx=customExpenses.find(x=>x.id===cxId);return cx?cxDefaultRate(cx):0;}
function isCxOv(date,cxId){const key=`cx_${cxId}`,ov=dailyOverrides[date];return!!(ov&&key in ov&&ov[key]!==''&&ov[key]!==null);}
function setCxRate(date,cxId,raw){const key=`cx_${cxId}`;if(!dailyOverrides[date])dailyOverrides[date]={};if(raw===''||raw===null)delete dailyOverrides[date][key];else dailyOverrides[date][key]=parseFloat(raw)||0;if(!Object.keys(dailyOverrides[date]).length)delete dailyOverrides[date];saveAll();refreshDayNums(date);}

// ── DAILY ONE-TIME EXPENSES ───────────────────────────────────────────────────
let newExpDraft={description:'',amount:'',category:''};
function getDayExpenses(date){return dailyExpenses.filter(x=>x.date===date);}
function getDayExpTotal(date){return getDayExpenses(date).reduce((s,x)=>s+parseFloat(x.amount)||0,0);}
function openAddExp(date){addingExpDate=date;newExpDraft={description:'',amount:'',category:''};render();}
function cancelAddExp(){addingExpDate=null;render();}
function confirmAddExp(date){if(!newExpDraft.description||!newExpDraft.amount)return;pushUndo();dailyExpenses.push({id:uid(),date,description:newExpDraft.description,amount:parseFloat(newExpDraft.amount),category:newExpDraft.category||''});saveAll();addingExpDate=null;render();}
function delDailyExp(id){pushUndo();dailyExpenses=dailyExpenses.filter(x=>x.id!==id);saveAll();render();}
function dexpField(f,v){newExpDraft[f]=v;}

// ── FIELD CONFIG ──────────────────────────────────────────────────────────────
function updateFieldLabel(id,label){pushUndo();const f=fieldConfig.find(x=>x.id===id);if(f){f.label=label;saveFields();}}
function toggleFieldActive(id,active){pushUndo();const f=fieldConfig.find(x=>x.id===id);if(f){f.active=active;saveFields();}}
function addCustomField(){pushUndo();fieldConfig.push({id:'cf_'+uid(),label:'New field',active:true,builtin:false});saveFields();render();}
function removeCustomField(id){pushUndo();fieldConfig=fieldConfig.filter(x=>x.id!==id);saveFields();render();}

// ── ORDER CALCS ───────────────────────────────────────────────────────────────
function vc(o){return fieldConfig.filter(f=>f.active).reduce((s,f)=>s+n(o[f.id]||0),0)+(o.returnUsed?n(o.returnCost):0);}
function gp(o){return n(o.revenue)-vc(o);}
function gpPct(o){return n(o.revenue)>0?(gp(o)/n(o.revenue)*100):0;}
function n(v){return parseFloat(v)||0;}
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const $$=(v,d=0)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:d,maximumFractionDigits:d}).format(v);
const cc=v=>v>=0?'cg':'cr';
const pct=v=>v.toFixed(1)+'%';
function byDate(){const m={};orders.forEach(o=>{const nd=normDateStr(o.date)||o.date;if(!m[nd])m[nd]=[];m[nd].push(o);});return Object.entries(m).sort(([a],[b])=>pd(a)-pd(b));}
function totals(){
  const rev=orders.reduce((s,o)=>s+n(o.revenue),0),vc_=orders.reduce((s,o)=>s+vc(o),0);
  const dated=byDate();
  // Walk every calendar day for accurate fixed cost total
  let fixed=customExpenses.filter(x=>x.freq==='onetime').reduce((s,x)=>s+n(x.amount),0);
  if(dated.length){
    const allOrderDates=orders.map(o=>pd(o.date)).filter(d=>d&&d.getFullYear()>2000);
    const bizStart=new Date(Math.min(...allOrderDates.map(d=>d.getTime())));
    bizStart.setHours(0,0,0,0);
    const lastEntryDate=pd(dated[dated.length-1][0]);
    const todayD=new Date();todayD.setHours(23,59,59);
    const lastDate=lastEntryDate>todayD?lastEntryDate:todayD;
    const cur=new Date(bizStart);
    while(cur<=lastDate){
      const dstr=(cur.getMonth()+1)+'/'+cur.getDate()+'/'+cur.getFullYear();
      fixed+=getDayBurn(dstr);
      cur.setDate(cur.getDate()+1);
    }
  }
  const expTotal=dailyExpenses.reduce((s,x)=>s+n(x.amount),0);
  const pending=orders.filter(o=>o.returnSent&&!isOrderReturned(o)).reduce((s,o)=>s+n(o.returnCost),0);
  return{rev,vc_,fixed,expTotal,net:rev-vc_-fixed-expTotal,pending};
}
function ordersInRange(s,e){return orders.filter(o=>{const d=pd(o.date);return d>=s&&d<=e;});}
function expensesInRange(s,e){return dailyExpenses.filter(x=>{const d=pd(x.date);return d>=s&&d<=e;});}

// ── SUMMARY CALCS ─────────────────────────────────────────────────────────────
function calcSummary(ro,re){
  const dates=[...new Set(ro.map(o=>o.date))];
  const rev=ro.reduce((s,o)=>s+n(o.revenue),0),vc_=ro.reduce((s,o)=>s+vc(o),0);
  const fixed=dates.reduce((s,d)=>s+getDayBurn(d),0);
  const expTotal=re.reduce((s,x)=>s+n(x.amount),0);
  const net=rev-vc_-fixed-expTotal,margin=rev>0?(net/rev)*100:0;
  const vb={};fieldConfig.filter(f=>f.active).forEach(f=>{vb[f.id]={label:f.label,total:ro.reduce((s,o)=>s+n(o[f.id]||0),0)};});
  if(ro.filter(o=>isOrderReturned(o)).length)vb['retShip']={label:'Return shipping',total:ro.filter(o=>isOrderReturned(o)).reduce((s,o)=>s+n(o.returnCost),0)};
  const fb={custom:{}};
  dates.forEach(d=>{const period=getPeriod(d);period.items.forEach(item=>{if(!fb[item.key])fb[item.key]={name:item.name,total:0};fb[item.key].total+=getDayItemRate(d,item.key);});getActiveCx(d).forEach(cx=>{if(!fb.custom[cx.id])fb.custom[cx.id]={name:cx.name,total:0};fb.custom[cx.id].total+=getCxRate(d,cx.id);});});
  let bestDay={date:'—',rev:0};dates.forEach(d=>{const dr=ro.filter(o=>o.date===d).reduce((s,o)=>s+n(o.revenue),0);if(dr>bestDay.rev)bestDay={date:d,rev:dr};});
  // Top products by revenue
  const prodMap={};ro.forEach(o=>{const k=e(o.description.split(' ').slice(0,3).join(' '));if(!prodMap[k])prodMap[k]={desc:o.description,rev:0,count:0};prodMap[k].rev+=n(o.revenue);prodMap[k].count++;});
  const topProds=Object.values(prodMap).sort((a,b)=>b.rev-a.rev).slice(0,5);
  return{ro,dates,rev,vc_,fixed,expTotal,net,margin,avgOrder:ro.length?rev/ro.length:0,vb,fb,bestDay,orderCount:ro.length,dayCount:dates.length,topProds};
}

// ── SUMMARY BAR ───────────────────────────────────────────────────────────────
function updateSummary(){
  const t=totals(),b=getDayBurn(todayShort());
  const set=(id,txt,cls)=>{const el=document.getElementById(id);if(el){el.textContent=txt;if(cls)el.className='sum-val '+cls;}};
  set('sum-rev',$$(t.rev),'cg');set('sum-vc',$$(t.vc_),'cr');set('sum-fix',$$(t.fixed),'co');
  set('sum-exp',t.expTotal>0?$$(t.expTotal):'$0','ca');set('sum-net',$$(t.net),cc(t.net));set('sum-burn',$$(b,2),'cp');
}

// ── PARTIAL DAY REFRESH ───────────────────────────────────────────────────────
function refreshDayNums(changedDate){
  const dated=byDate();let rnet=0;
  dated.forEach(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0),dVc=dayOrders.reduce((s,o)=>s+vc(o),0);
    const dBurn=getDayBurn(date),dExpT=getDayExpTotal(date),dNet=dRev-dVc-dBurn-dExpT;rnet+=dNet;
    const s=sid(date);
    const setEl=(id,t)=>{const el=document.getElementById(id);if(el)el.textContent=t;};
    const setCls=(id,t,c)=>{const el=document.getElementById(id);if(el){el.textContent=t;el.className=c;}};
    setEl(`dburn-${s}`,$$(dBurn,2));
    setEl(`dout-${s}`,'−'+$$(dVc+dBurn+dExpT,2));
    setCls(`dnet-${s}`,(dNet>=0?'+':'')+$$(dNet,2),'pill '+(dNet>=0?'pill-pos':'pill-neg'));
    setCls(`drun-${s}`,$$(rnet,2),'kpi-val '+cc(rnet));
    if(date===changedDate){
      const period=getPeriod(date);period.items.forEach(item=>{const el=document.getElementById(`fc-${s}-${item.key}`);if(el)el.classList.toggle('ov',isItemOv(date,item.key));});
      getActiveCx(date).forEach(cx=>{const el=document.getElementById(`fc-${s}-cx_${cx.id}`);if(el)el.classList.toggle('ov',isCxOv(date,cx.id));});
      const rst=document.getElementById(`dres-${s}`);if(rst)rst.style.display=hasAnyOv(date)?'':' none';
    }
  });
  updateSummary();
}

  if(btn){btn.disabled=true;btn.textContent='⏳ Scanning…';}
  fetch(SCAN_URL,{mode:'no-cors'}).catch(()=>{});
  let tries=0;
  const poll=setInterval(async()=>{
    tries++;
    if(btn)btn.textContent='⏳ Scanning… '+Math.min(tries*10,120)+'s';
    try{
      const changed=await syncFromCloud();
      if(changed){
        const checked=autoCheckIn(incomingData);
        clearInterval(poll);
        if(btn){btn.disabled=false;btn.textContent='🔄 Scan All Returns';}
        render();
        if(checked>0){const b=document.getElementById('scan-btn');if(b){b.style.background='var(--green)';b.textContent='✓ '+checked+' auto checked in';setTimeout(()=>{b.style.background='';b.textContent='🔄 Scan All Returns';},3000);}}
        return;
      }
    }catch(e){}
    if(tries>=18){clearInterval(poll);if(btn){btn.disabled=false;btn.textContent='🔄 Scan All Returns';}render();}
  },10000);
}
function autoCheckIn(data){
  if(!data?.arrived?.length)return 0;
  let count=0;
  data.arrived.forEach(r=>{
    if(!r.tn)return;
    const tn=r.tn.trim();
    orders.forEach(o=>{
      if(!o.returnSent||isOrderReturned(o))return;
      const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
      if(tNums.includes(tn)){
        if(!o.returnedNums)o.returnedNums=[];
        if(!o.returnedNums.includes(tn)){o.returnedNums.push(tn);o.returnUsed=isOrderReturned(o);count++;}
      }
    });
  });
  if(count>0)saveAll();
  return count;
}

  if(view==='daily')return dailyV();if(view==='summary')return summaryV();
  if(view==='production')return productionV();
  if(view==='entry')return entryV();if(view==='labels')return labelsV();if(view==='incoming')return incomingV();
  if(view==='history')return histV();if(view==='settings')return settV();
  if(view==='reviews')return reviewsV();
}

function getReminderTemplate(o,num){
  const name=(o.customerName||'').trim().split(' ')[0]||'Customer';
  const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
  const hdr='Hi '+name+',\n\nOrder #: '+o.orderNum+'\nDescription: '+o.description+'\nShip date: '+o.date+(tNums.length?'\nReturn label: '+tNums.join(', '):'')+'\n\n';
  if(num===1)return hdr+'Just a friendly reminder — we haven\'t received your core return yet.\n\nYour return label was included with your order. You can drop the core off at any UPS location — no packaging needed, just hand it to the driver or drop it in a UPS box.\n\nIf you\'ve already shipped it back, please disregard this message.\n\nThank you for your business!\nHeavy Duty Parts Company';
  if(num===2)return hdr+'This is a follow-up on your core return. We still haven\'t received it.\n\nPlease ship your core back at your earliest convenience using the return label provided. If you need a new label, just reply to this email.\n\nThank you,\nHeavy Duty Parts Company';
  if(num===3)return hdr+'This is your third notice regarding your outstanding core return.\n\nWe need to receive your core immediately. Please drop it off at any UPS location now. Failure to return the core may result in a core charge being applied to your account and will void your warranty.\n\nContact us right away if there is an issue.\n\nHeavy Duty Parts Company';
  return hdr+'FINAL NOTICE — Your core has not been returned despite multiple reminders.\n\nYou must return the core within 7 days of this notice or a core charge will be applied to your account and your warranty will be voided.\n\nThis is your last opportunity to resolve this before further action is taken.\n\nHeavy Duty Parts Company';
}
function sendReminderAndLog(ordId){
  const o=orders.find(x=>x.id===ordId);if(!o)return;
  if(!o.customerEmail){alert('No email address saved for this order. Add one via Edit.');return;}
  const num=(o.reminderLog||[]).length+1;
  const body=getReminderTemplate(o,num);
  const subj='Core Return'+(num>1?' – Follow Up':'')+' – Order #'+o.orderNum;

function toggleEmail(){}
function copyEmail(ordId){const o=orders.find(x=>x.id===ordId);if(!o)return;navigator.clipboard.writeText(getReminderTemplate(o,(o.reminderLog||[]).length+1)).catch(()=>{});}

function pushReviewState_(){
  if(!syncConfig.scriptUrl)return;
  fetch(syncConfig.scriptUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reviewState:googleReviewState})}).catch(()=>{});
}
async function sendReviewEmail(ordId,btn){
  const o=orders.find(x=>x.id===ordId);if(!o)return;
  if(!o.customerEmail){alert('No email for this order.');return;}
  if(!googleReviewLink){alert('Set your Google Review link in Settings first.');sv('settings');return;}
  if(btn){btn.disabled=true;btn.textContent='⏳';}
  const reviewUrl=GAS_BASE+'?action=send_review'+
    '&email='+encodeURIComponent(o.customerEmail)+
    '&name='+encodeURIComponent(o.customerName||'')+
    '&link='+encodeURIComponent(googleReviewLink);
  const w=window.open(reviewUrl,'_blank','width=1,height=1,top=-100,left=-100');
  await new Promise(r=>setTimeout(r,3000));
  try{if(w&&!w.closed)w.close();}catch(e){}
  const d=new Date();
  googleReviewState[o.orderNum]={sent:true,sentDate:(d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear()};
  localStorage.setItem('hpdc-review-state',JSON.stringify(googleReviewState));
  pushReviewState_();
  render();
}
async function sendAllReady(){
  const READY_DAYS=7,LOOKBACK=30;
  const now=new Date();
  const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-LOOKBACK);
  const ready=orders.filter(o=>{
    const rs=googleReviewState[o.orderNum]||{};
    if(rs.sent||rs.skipped)return false;
    const d=pd(o.date);
    if(!d||d.getFullYear()<=2000)return false;
    return Math.floor((now-d)/86400000)>=READY_DAYS&&d>=cutoff&&o.customerEmail;
  });
  if(!ready.length)return;
  if(!confirm('Send review requests to '+ready.length+' customer'+(ready.length>1?'s':'')+' now?'))return;
  for(const o of ready){
    await sendReviewEmail(o.id,null);
    await new Promise(r=>setTimeout(r,600));
  }
}
function skipReview(orderNum){
  googleReviewState[orderNum]=googleReviewState[orderNum]||{};
  googleReviewState[orderNum].skipped=true;
  localStorage.setItem('hpdc-review-state',JSON.stringify(googleReviewState));
  pushReviewState_();
  render();
}
function unskipReview(orderNum){
  if(googleReviewState[orderNum]){
    delete googleReviewState[orderNum].skipped;
    if(!googleReviewState[orderNum].sent)delete googleReviewState[orderNum];
  }
  localStorage.setItem('hpdc-review-state',JSON.stringify(googleReviewState));
  pushReviewState_();
  render();
}

    ${recent.length===0?`<div class="empty"><h3>No orders in the last 30 days</h3></div>`:

    <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">

// ── DAILY LEDGER ──────────────────────────────────────────────────────────────
function dailyV(){
  const dated=byDate();
  if(!dated.length)return`<div class="empty"><h3>Nothing logged yet</h3><p>Add your first shipped order to start tracking.</p><button class="btn-p" onclick="sv('entry')">Add first entry</button></div>`;
  const t=totals();
  let alerts='';
  const totalPending=orders.reduce((s,o)=>s+pendingLabelCount(o),0);
  if(totalPending>0)alerts+=`<div class="alert alert-warn">⚑ ${totalPending} return label${totalPending>1?'s':''} pending — up to ${$$(t.pending,2)} exposure. <button class="btn-s" style="margin-left:8px" onclick="sv('labels')">Core Returns →</button></div>`;
  const lowMarginOrders=orders.filter(o=>gpPct(o)<alertThreshold&&n(o.revenue)>0);
  const unreviewedLow=lowMarginOrders.filter(o=>!reviewedOrders.has(o.id));
  if(unreviewedLow.length)alerts+=`<div class="alert alert-red" id="low-margin-alert" onclick="toggleLowMarginFilter()" style="cursor:pointer;user-select:none">⚠ ${unreviewedLow.length} order${unreviewedLow.length>1?'s':''} below ${alertThreshold}% margin — ${lowMarginFilter?'<strong>showing flagged only — click to show all</strong>':'<strong>click to show only flagged orders</strong>'}. Click <strong>review ✓</strong> on each to clear.</div>`;

  // Apply search + date filter to orders
  const q=ledgerSearch.trim().toLowerCase();
  const dfrom=ledgerDateFrom?pd(ledgerDateFrom):null;
  const dto=ledgerDateTo?pd(ledgerDateTo):null;

  // Filter orders
  const filteredOrders=orders.filter(o=>{
    if(lowMarginFilter&&!(gpPct(o)<alertThreshold&&n(o.revenue)>0))return false;
    if(q&&!(o.orderNum.toLowerCase().includes(q)||o.description.toLowerCase().includes(q)||o.notes.toLowerCase().includes(q)))return false;
    const od=pd(o.date);
    if(dfrom&&od<dfrom)return false;
    if(dto&&od>dto)return false;
    return true;
  });

  const isFiltered=q||dfrom||dto||lowMarginFilter;
  const matchCount=filteredOrders.length;

  // Group filtered orders by date
  const filteredMap={};
  filteredOrders.forEach(o=>{if(!filteredMap[o.date])filteredMap[o.date]=[];filteredMap[o.date].push(o);});
  const filteredDated=Object.entries(filteredMap).sort(([a],[b])=>pd(a)-pd(b));

  const toolbar=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:14px;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <input type="text" id="ledger-search-inp" class="inp-base" value="${e(ledgerSearch)}" placeholder="Search orders — type then press Enter (lmm, chr 3.6, order #…)" style="flex:1;min-width:200px;padding:8px 12px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <button class="btn-p" style="padding:8px 16px;font-size:12px" onclick="runLedgerSearch()">Search</button>
      ${isFiltered?`<button class="btn-s" onclick="clearLedgerSearch()">✕ Clear</button>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;flex-shrink:0">Date range:</span>
      <input type="text" id="ledger-from" class="inp-base" value="${e(ledgerDateFrom)}" placeholder="From M/D/YYYY" style="width:130px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <span style="font-size:12px;color:var(--text3)">—</span>
      <input type="text" id="ledger-to" class="inp-base" value="${e(ledgerDateTo)}" placeholder="To M/D/YYYY" style="width:130px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <input class="ledger-jump inp-base" type="text" id="jump-inp" placeholder="Jump to date (M/D)" style="width:140px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')jumpToDate()">
      <button class="btn-g" style="padding:6px 12px;font-size:12px" onclick="jumpToDate()">Jump</button>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">${isFiltered?`${matchCount} order${matchCount!==1?'s':''} matched`:orders.length+' orders total'}</span>
      <button class="btn-p" style="padding:6px 14px;font-size:12px" onclick="sv('entry')">+ New entry</button>
    </div>
  </div>`;

  if(isFiltered&&!filteredDated.length)
    return alerts+toolbar+`<div class="empty"><h3>No orders matched</h3><p>Try different search terms or a wider date range.</p></div>`;

  let rnet=0;
  const allDated=byDate();
  // Running net walks EVERY calendar day (not just order days) to charge burn on gap days
  const fullRnet={};
  let r=0;
  if(allDated.length){
    const ordMap={};
    allDated.forEach(([date,dayOrders])=>{ordMap[normDateStr(date)]=dayOrders;});
    const allOrderDates=orders.map(o=>pd(o.date)).filter(d=>d&&d.getFullYear()>2000);
    const bizStart=new Date(Math.min(...allOrderDates.map(d=>d.getTime())));
    bizStart.setHours(0,0,0,0);
    const lastEntryDate=pd(allDated[allDated.length-1][0]);
    const todayD=new Date();todayD.setHours(23,59,59);
    const lastDate=lastEntryDate>todayD?lastEntryDate:todayD;
    const cur=new Date(bizStart);
    while(cur<=lastDate){
      const dstr=(cur.getMonth()+1)+'/'+cur.getDate()+'/'+cur.getFullYear();
      const dayOrds=ordMap[dstr]||[];
      const dRev=dayOrds.reduce((s,o)=>s+n(o.revenue),0);
      const dVc=dayOrds.reduce((s,o)=>s+vc(o),0);
      r+=dRev-dVc-getDayBurn(dstr)-getDayExpTotal(dstr);
      if(ordMap[dstr])fullRnet[dstr]=r;
      cur.setDate(cur.getDate()+1);
    }
  }

  const dayData=(isFiltered?filteredDated:allDated).map(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0),dVc=dayOrders.reduce((s,o)=>s+vc(o),0);
    const dBurn=getDayBurn(date),dExpT=getDayExpTotal(date),dNet=dRev-dVc-dBurn-dExpT;
    return{date,dayOrders,dRev,dVc,dBurn,dExpT,dNet,rnet:fullRnet[normDateStr(date)]||0,isFiltered};
  });

  // Auto-expand most recent day if nothing is expanded yet
  const sortedDates=dayData.map(d=>d.date);
  if(expandedDays.size===0&&sortedDates.length){
    expandedDays.add(sortedDates[sortedDates.length-1]); // most recent
  }
  return alerts+toolbar+[...dayData].reverse().map(buildDaySection).join('');
}

function buildDaySection({date,dayOrders,dRev,dVc,dBurn,dExpT,dNet,rnet}){

  const ordRows=dayOrders.map(o=>{

    // Build detail panel
    let detail='';
    if(expanded){
      const activeF=fieldConfig.filter(x=>x.active);
      const costRows=activeF.map(fc=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span style="color:var(--text3)">${e(fc.label)}</span><span style="font-weight:500">${$$(n(o[fc.id]||0),2)}</span></div>`).join('');
      const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
      detail='<div style="padding:10px 16px 12px 24px;background:rgba(0,0,0,.2);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:12px 24px">'
        // Cost breakdown
        +'<div><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Cost breakdown</div>'
        +costRows
        +(o.returnUsed?'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">Return shipping</span><span style="font-weight:500">'+$$(n(o.returnCost),2)+'</span></div>':'')
        +'<div style="display:flex;justify-content:space-between;padding:4px 0;margin-top:2px;border-top:1px solid var(--border2);font-size:12px;font-weight:700"><span>Total variable</span><span class="cr">'+$$(vc(o),2)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;font-weight:700"><span>Gross profit</span><span class="'+cc(gp(o))+'">'+$$(gp(o),2)+' ('+gpPct(o).toFixed(1)+'%)</span></div>'
        +'</div>'
        // Order details
        +'<div><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Order details</div>'
        +(o.customerEmail?'<div style="font-size:12px;margin-bottom:4px;color:var(--text2)">📧 '+e(o.customerEmail)+'</div>':'')
        +(n(o.coreValue)>0?'<div style="font-size:12px;margin-bottom:4px;color:var(--amber);font-weight:600">⚠ Core value at risk: '+$$(n(o.coreValue),2)+'</div>':'')
        +(o.returnSent?'<div style="font-size:12px;margin-bottom:4px;color:'+(isOrderReturned(o)?'var(--green)':'var(--amber)')+'">'+( isOrderReturned(o)?'✓ Core returned':'⚑ Core return pending')+'</div>':'')

  const dayExps=getDayExpenses(date);

    expSection=`<div class="day-exp-section">${dayExps.length?'<div style="padding:5px 16px 0;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px">One-time expenses</div>':''}${expRows}${addForm}</div>`;
  }

    <input type="number" id="fc-${s}-${item.key}" class="fc-inp${isItemOv(date,item.key)?' ov':''}" value="${getDayItemRate(date,item.key).toFixed(2)}" oninput="setDayItemRate('${date}','${item.key}',this.value)">
  </div>`).join('');
  const activeCx=getActiveCx(date);
  const cxInputs=activeCx.length?'<div class="fc-divider"></div>'+activeCx.map(cx=>`<div class="fc-field"><span class="fc-field-lbl" title="${cx.name}">${e(cx.name)}</span><input type="number" id="fc-${s}-cx_${cx.id}" class="fc-inp${isCxOv(date,cx.id)?' ov':''}" value="${getCxRate(date,cx.id).toFixed(2)}" oninput="setCxRate('${date}','${cx.id}',this.value)"></div>`).join(''):'';
  const expNudge=(!dayExps.length&&addingExpDate!==date)?`<button class="btn-s" style="font-size:10px" onclick="event.stopPropagation();openAddExp('${date}')">+ expense</button>`:'';
  const ordHdr=`<div class="ord-hdr"><span class="ord-num">Order #</span><span style="flex:1">Description</span><span class="ord-rev" style="text-align:right">Revenue</span><span class="ord-vc" style="text-align:right">Var costs</span><span class="ord-gp" style="text-align:right">Gross / margin</span><span class="ord-act" style="min-width:80px"></span></div>`;
  return`<div class="day-section${isOpen?' highlighted':''}" id="day-${s}">

// ── SUMMARY VIEW ──────────────────────────────────────────────────────────────
let summaryHistTab='none';

function productionV(){
  const allOrds=orders.filter(o=>o.date);
  function qty(o){return Math.max(1,parseInt(o.quantity)||1);}
  const now=new Date();
  const startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
  const startOfMonth=new Date(now.getFullYear(),now.getMonth(),1);
  const startOfYear=new Date(now.getFullYear(),0,1);
  function inRange(o,from,to){const d=pd(o.date);return d>=from&&d<=(to||now);}
  function qtySumRange(ords,from,to){return ords.filter(o=>inRange(o,from,to)).reduce((s,o)=>s+qty(o),0);}
  const todayStr=(now.getMonth()+1)+'/'+(now.getDate())+'/'+now.getFullYear();
  const totalToday=allOrds.filter(o=>o.date===todayStr||(pd(o.date)&&pd(o.date).toDateString()===now.toDateString())).reduce((s,o)=>s+qty(o),0);
  const totalWeek=qtySumRange(allOrds,startOfWeek);
  const totalMonth=qtySumRange(allOrds,startOfMonth);
  const totalYear=qtySumRange(allOrds,startOfYear);
  const totalAll=allOrds.reduce((s,o)=>s+qty(o),0);
  // Technician totals
  const techs={};
  allOrds.forEach(o=>{
    const t=(o.technician||'').trim()||'Unassigned';
    if(!techs[t])techs[t]={total:0,week:0,month:0,year:0,orders:0};
    const q=qty(o);
    techs[t].total+=q;techs[t].orders++;
    if(inRange(o,startOfWeek))techs[t].week+=q;
    if(inRange(o,startOfMonth))techs[t].month+=q;
    if(inRange(o,startOfYear))techs[t].year+=q;
  });
  const techList=Object.entries(techs).sort((a,b)=>b[1].total-a[1].total);
  // Per-day bar chart (last 30 days)
  const dayMap={};
  allOrds.forEach(o=>{const d=o.date;if(!dayMap[d])dayMap[d]=0;dayMap[d]+=qty(o);});
  const sortedDays=Object.entries(dayMap).sort(([a],[b])=>pd(a)-pd(b)).slice(-30);
  const maxDay=Math.max(...sortedDays.map(([,v])=>v),1);
  // History periods (weekly/monthly/annually)
  if(typeof prodHistTab==='undefined')window.prodHistTab='week';
  const hTab=window.prodHistTab||'week';
  if(typeof prodSelectedTech==='undefined')window.prodSelectedTech=null;
  const selectedTech=window.prodSelectedTech;
  function getLast(cnt,unit){
    const result=[];
    const allDates=allOrds.map(o=>pd(o.date)).filter(Boolean);
    const bizStart=allDates.length?new Date(Math.min(...allDates.map(d=>d.getTime()))):now;
    bizStart.setHours(0,0,0,0);
    for(let i=0;i<cnt;i++){
      let start,end,label;
      if(unit==='week'){
        const base=new Date(now);base.setDate(now.getDate()-now.getDay()-(i*7));
        start=new Date(base);start.setDate(base.getDate()-base.getDay());start.setHours(0,0,0,0);
        end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59);
        label='Wk '+(start.getMonth()+1)+'/'+start.getDate();
      } else if(unit==='month'){
        const d=new Date(now.getFullYear(),now.getMonth()-i,1);
        start=new Date(d.getFullYear(),d.getMonth(),1);
        end=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);
        const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        label=mn[d.getMonth()]+' '+d.getFullYear();
      } else {
        const yr=now.getFullYear()-i;
        start=new Date(yr,0,1);end=new Date(yr,11,31,23,59,59);
        label=String(yr);
      }
      if(end<bizStart)continue;
      const ords=allOrds.filter(o=>inRange(o,start,end));
      const heads=ords.reduce((s,o)=>s+qty(o),0);
      const techBreak={};
      ords.forEach(o=>{const t=(o.technician||'').trim()||'Unassigned';techBreak[t]=(techBreak[t]||0)+qty(o);});
      result.push({label,heads,orders:ords.length,techBreak,start,end});
    }
    return result;
  }
  const periods=getLast(hTab==='year'?5:12,hTab);
  const maxHeads=Math.max(...periods.map(p=>p.heads),1);
  function tabBtn(lbl,tab){
    const on=hTab===tab;
    return '<button data-tab="'+tab+'" onclick="window.prodHistTab=this.dataset.tab;document.getElementById(\'view\').innerHTML=buildView();updateBadge();updateSummary();" style="padding:5px 14px;font-size:12px;font-weight:600;border-radius:var(--r);border:1px solid '+(on?'var(--red)':'var(--border2)')+';background:'+(on?'rgba(204,0,0,.15)':'transparent')+';color:'+(on?'var(--red)':'var(--text2)')+';cursor:pointer;font-family:var(--fh);text-transform:uppercase;letter-spacing:.4px">'+lbl+'</button>';
  }
  function statBox(lbl,val,sub){
    return '<div style="padding:14px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);flex:1;min-width:110px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px;font-weight:600">'+lbl+'</div><div style="font-size:26px;font-weight:800;font-family:var(--fh)">'+val+'</div>'+(sub?'<div style="font-size:10px;color:var(--text3);margin-top:2px">'+sub+'</div>':'')+'</div>';
  }
  let html='<h2 style="font-family:var(--fh);font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px">Production</h2>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">'
    +statBox('Today',totalToday,'heads')
    +statBox('This week',totalWeek,'heads')
    +statBox('This month',totalMonth,'heads')
    +statBox('This year',totalYear,'heads')
    +statBox('All time',totalAll,'total heads')
    +'</div>';
  // History table
  html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:18px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px">History:</span>'
    +tabBtn('Weekly','week')+tabBtn('Monthly','month')+tabBtn('Annually','year')
    +'</div>';
  const techCols=techList.slice(0,4).map(([nm])=>nm);
  const gridCols='120px 1fr 60px 60px'+techCols.map(()=>' 65px').join('');
  html+='<div style="display:grid;grid-template-columns:'+gridCols+';font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:5px 10px;background:var(--bg3);border-radius:6px 6px 0 0;border:1px solid var(--border);gap:4px">'
    +'<span>Period</span><span>Output</span><span style="text-align:right">Heads</span><span style="text-align:right">Orders</span>'
    +techCols.map(nm=>'<span style="text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+e(nm.split(' ')[0])+'</span>').join('')
    +'</div>';
  periods.forEach((p,idx)=>{
    const pct=Math.round(p.heads/maxHeads*100);
    const isNow=idx===0;
    html+='<div style="display:grid;grid-template-columns:'+gridCols+';padding:7px 10px;border:1px solid var(--border);border-top:none;'+(isNow?'background:rgba(204,0,0,.05)':idx%2?'background:rgba(255,255,255,.01)':'')+';align-items:center;gap:4px;font-size:12px">'
      +'<div style="font-weight:'+(isNow?'700':'500')+'">'+p.label+(isNow?' <span style="font-size:9px;background:rgba(204,0,0,.15);color:var(--red);border-radius:3px;padding:1px 5px;font-weight:700">NOW</span>':'')+'</div>'
      +'<div style="display:flex;align-items:center"><div style="flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden"><div style="height:100%;background:'+(isNow?'var(--red)':'#555')+';border-radius:4px;width:'+pct+'%;min-width:'+(p.heads>0?3:0)+'px"></div></div></div>'
      +'<span style="text-align:right;font-weight:700;color:'+(isNow?'var(--red)':'var(--text)')+'">'+p.heads+'</span>'
      +'<span style="text-align:right;color:var(--text3)">'+p.orders+'</span>'
      +techCols.map(nm=>'<span style="text-align:right;color:var(--blue);font-weight:600">'+(p.techBreak[nm]||'—')+'</span>').join('')
      +'</div>';
  });
  html+='</div>';
  // Technician leaderboard
  if(techList.length){
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden">'
      +'<div style="padding:10px 16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">Technician leaderboard</div>'
      +'<div style="display:grid;grid-template-columns:1fr 65px 65px 65px 75px 60px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--border)">'
      +'<span>Technician</span><span style="text-align:right">Week</span><span style="text-align:right">Month</span><span style="text-align:right">Year</span><span style="text-align:right">All time</span><span style="text-align:right">Orders</span></div>'
      +techList.map(([nm,t],idx)=>{
        const pct=totalAll?Math.round(t.total/totalAll*100):0;
        const isSel=selectedTech===nm;
        return '<div data-tech="'+encodeURIComponent(nm)+'" onclick="selectTech(this.dataset.tech)" style="cursor:pointer;'+(isSel?'background:rgba(204,0,0,.06);border-left:3px solid var(--red);':idx%2?'background:rgba(255,255,255,.02)':'')+'">'
          +'<div style="display:grid;grid-template-columns:1fr 65px 65px 65px 75px 60px;padding:8px 14px;align-items:center;font-size:13px">'
          +'<div><div style="font-weight:600">'+e(nm)+(isSel?' <span style="font-size:9px;color:var(--red)">▾</span>':'')+'</div><div style="height:4px;background:var(--bg4);border-radius:2px;margin-top:4px;max-width:140px"><div style="height:100%;background:var(--red);border-radius:2px;width:'+pct+'%"></div></div></div>'
          +'<span style="text-align:right;font-weight:600">'+t.week+'</span>'
          +'<span style="text-align:right;font-weight:600">'+t.month+'</span>'
          +'<span style="text-align:right;font-weight:600">'+t.year+'</span>'
          +'<span style="text-align:right;font-weight:700;font-size:14px">'+t.total+'</span>'
          +'<span style="text-align:right;color:var(--text3)">'+t.orders+'</span>'
          +'</div>'
          +(isSel?buildTechDetail(nm,allOrds,qty,getLast,hTab):'')
          +'</div>';
      }).join('')
      +'</div>';
  }
  return html;
}
