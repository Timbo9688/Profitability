  function coreCount(orderList){return orderList.reduce((s,o)=>{const t=(o.trackingNumbers||[]).filter(x=>x.trim()).length;return s+(t>0?t:1);},0);}
  function coreValueSum(orderList){return orderList.reduce((s,o)=>s+n(o.coreValue),0);}
  function returnedCoreCount(orderList){return orderList.reduce((s,o)=>{const tNums=(o.trackingNumbers||[]).filter(x=>x.trim());const rn=o.returnedNums||[];if(tNums.length>0)return s+rn.filter(r=>tNums.includes(r)).length;return s+(o.returnUsed?1:0);},0);}

  const totalCores=coreCount(wl);
  const inWindowCores=coreCount(inWindow);
  const overdueCores=coreCount(overdue);
  const returnedCores=coreCount(allReturned);
  const returnedValue=coreValueSum(allReturned);
  const retRate=totalCores>0?Math.round(returnedCores/totalCores*100):0;

  // Average days to return for completed returns
  const returnTimes=allReturned.filter(o=>o.date).map(o=>daysAged(o.date));
  const avgDays=returnTimes.length?Math.round(returnTimes.reduce((s,d)=>s+d,0)/returnTimes.length):null;
  // Avg days outstanding for pending
  const pendingDays=allPending.filter(o=>o.date).map(o=>daysAged(o.date));
  const avgPendingDays=pendingDays.length?Math.round(pendingDays.reduce((s,d)=>s+d,0)/pendingDays.length):null;

  const pastDue=allPending.filter(o=>daysAged(o.date)>coreReturnDays);
  const summaryBar=`<div style="display:grid;grid-template-columns:repeat(6,1fr);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:12px">
    <div style="padding:12px 14px;border-right:1px solid var(--border);background:var(--bg2)">

      <div style="font-size:20px;font-weight:800;font-family:var(--fh)">${totalCores}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:1px">${wl.length} order${wl.length!==1?'s':''}</div>
    </div>
    <div style="padding:12px 14px;border-right:1px solid var(--border);background:var(--bg2)">
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px">In window</div>
      <div style="font-size:20px;font-weight:800;font-family:var(--fh);color:var(--green)">${inWindowCores}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:1px">within ${coreReturnDays}d · ${inWindow.length} order${inWindow.length!==1?'s':''}</div>
    </div>
    <div style="padding:12px 14px;border-right:1px solid var(--border);background:var(--bg2)">
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px">Overdue</div>
      <div style="font-size:20px;font-weight:800;font-family:var(--fh);color:#f87171">${overdueCores}</div>
      <div style="font-size:10px;color:var(--amber);margin-top:1px;font-weight:600">${coreValueAtRisk>0?$$(coreValueAtRisk,2)+' at risk':overdue.length+' order'+(overdue.length!==1?'s':'')}</div>
    </div>
    <div style="padding:12px 14px;border-right:1px solid var(--border);background:var(--bg2)">
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px">Returned</div>
      <div style="font-size:20px;font-weight:800;font-family:var(--fh);color:var(--green)">${returnedCores}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:1px">${returnedValue>0?$$(returnedValue,2)+' value recovered':allReturned.length+' order'+(allReturned.length!==1?'s':'')}</div>
    </div>
    <div style="padding:12px 14px;border-right:1px solid var(--border);background:var(--bg2)">
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px">Return rate</div>
      <div style="font-size:20px;font-weight:800;font-family:var(--fh);color:${retRate>=80?'var(--green)':retRate>=50?'var(--amber)':'#f87171'}">${retRate}%</div>
      <div style="font-size:10px;color:var(--text3);margin-top:1px">${voided.length} voided</div>
    </div>
    <div style="padding:12px 14px;background:var(--bg2)">
      <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px">Avg pending age</div>
      <div style="font-size:20px;font-weight:800;font-family:var(--fh);color:${avgPendingDays!=null&&avgPendingDays>coreReturnDays?'#f87171':avgPendingDays!=null&&avgPendingDays>coreReturnDays*.7?'var(--amber)':'var(--text)'}">${avgPendingDays!=null?avgPendingDays+'d':'—'}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:1px">${avgDays!=null?'avg return: '+avgDays+'d':'policy: '+coreReturnDays+'d'}</div>
    </div>
  </div>`;

  // ── Filter + Search bar ────────────────────────────────────────────────────
  function filterBtn(label,val,count,danger=false){
    const on=coreFilter===val;
    const ac=danger?'#f87171':'var(--red)';
    const acBg=danger?'rgba(248,113,113,.12)':'rgba(204,0,0,.15)';
    return `<button onclick="coreFilter='${val}';document.getElementById('view').innerHTML=buildView();updateBadge();updateSummary();" style="padding:5px 14px;font-size:12px;font-weight:600;border-radius:var(--r);border:1px solid ${on?ac:(danger&&count>0?'rgba(248,113,113,.4)':'var(--border2)')};background:${on?acBg:'transparent'};color:${on?ac:(danger&&count>0?'#f87171':'var(--text2)')};cursor:pointer;font-family:var(--fh);text-transform:uppercase;letter-spacing:.4px">${label} <span style="font-size:10px;opacity:.7">(${count})</span></button>`;
  }

  const filterBar=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:10px 12px;margin-bottom:12px">
    <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      ${filterBtn('All','all',wl.length)}
      ${filterBtn('In window','inwindow',inWindow.length)}
      ${filterBtn('Overdue','overdue',overdue.length,true)}
      ${filterBtn('Returned','returned',allReturned.length)}
      <div style="margin-left:auto;display:flex;gap:6px;align-items:center">
        ${(()=>{const allPendingNums=allPending.reduce((s,o)=>{const rn=o.returnedNums||[];return s+(o.trackingNumbers||[]).filter(t=>t.trim()&&!rn.includes(t)).length;},0);return allPendingNums>0?`<button class="btn-g" style="font-size:11px;padding:5px 12px;white-space:nowrap" onclick="checkAllTracking(true)">↗ Track all ${allPendingNums} pending</button>`:''})()}
        <input type="text" id="core-search-inp" class="inp-base" value="${e(coreSearch)}" placeholder="Search order #, description, tracking #…" style="min-width:200px;padding:6px 10px;font-size:12px" onkeydown="if(event.key==='Enter')runCoreSearch()">
        <button class="btn-p" style="padding:6px 14px;font-size:12px" onclick="runCoreSearch()">Search</button>
        ${isFiltered?`<button class="btn-s" onclick="clearCoreSearch()">✕</button>`:''}
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;flex-shrink:0">Date range:</span>
      <input type="text" id="core-from" class="inp-base" value="${e(coreDateFrom)}" placeholder="From M/D/YYYY" style="width:120px;padding:5px 8px;font-size:12px" onkeydown="if(event.key==='Enter')runCoreSearch()">
      <span style="font-size:11px;color:var(--text3)">—</span>
      <input type="text" id="core-to" class="inp-base" value="${e(coreDateTo)}" placeholder="To M/D/YYYY" style="width:120px;padding:5px 8px;font-size:12px" onkeydown="if(event.key==='Enter')runCoreSearch()">
    </div>
  </div>`;

  let html=summaryBar+filterBar;
  if(!wl.length){return html+`<div class="empty"><h3>No cores tracked yet</h3><p>Add a return label to an order to start tracking.</p></div>`;}

  // Apply view filter
  let viewOrders;
  if(coreFilter==='inwindow') viewOrders=inWindow.filter(matchesFilter);
  else if(coreFilter==='overdue') viewOrders=overdue.filter(matchesFilter);
  else if(coreFilter==='returned') viewOrders=allReturned.filter(matchesFilter);
  else viewOrders=wl.filter(matchesFilter);

  // ── Aging Core Report ──
  const aging=(coreFilter==='returned'?[]:overdue).filter(o=>matchesFilter(o)).sort((a,b)=>daysAged(b.date)-daysAged(a.date));
  if(aging.length){
    html+=`<div class="alert alert-red" style="margin-bottom:8px">
      ⚠ <strong>${aging.length} aging core${aging.length>1?'s':''}</strong> — label sent 45+ days ago with no return. These need immediate follow-up.
    </div>`;
    html+=`<div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">Aging cores (45+ days)</div>`;

    html+=`<div style="display:flex;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);gap:8px">
      <span style="flex:0 0 60px">Date</span>
      <span style="flex:0 0 70px">Order #</span>
      <span style="flex:1">Description</span>
      <span style="flex:0 0 100px;text-align:center">Status</span>
      <span style="flex:0 0 130px"></span>
    </div>`;
    aging.forEach(o=>{
      const days=daysAged(o.date);
      const severity=days>=90?'#f87171':days>=60?'#fb923c':'#fbbf24';
      const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
      const rn=o.returnedNums||[];
      const showEmail=showEmailFor.has(o.id);
      const emailLines=buildEmailLines(o);

      // Build per-number track rows
      const trackRows=tNums.length
        ? tNums.map(t=>{
            const ret=rn.includes(t);
            return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)">
              <input type="checkbox" ${ret?'checked':''} data-oid="${o.id}" data-trk="${t}" onchange="handleTrackChk(this)" style="accent-color:var(--green);width:13px;height:13px;cursor:pointer;flex-shrink:0">
              <span style="font-family:monospace;font-size:11px;color:var(--text2);flex:1">${e(t)}</span>
              <span style="font-size:10px;font-weight:600;color:${ret?'var(--green)':'var(--amber)'};white-space:nowrap;min-width:54px;text-align:right">${ret?'✓ returned':'pending'}</span>
              <button data-t="${t}" onclick="event.stopPropagation();openUPS([this.dataset.t])" style="font-size:10px;color:var(--blue);background:transparent;border:1px solid rgba(59,130,246,.35);border-radius:3px;padding:2px 7px;cursor:pointer;white-space:nowrap;flex-shrink:0">Track ↗</button>
            </div>`;
          }).join('')
        : '<span style="font-size:11px;color:var(--text3)">No tracking numbers — add via edit order</span>';

      html+=`<div style="border-bottom:1px solid var(--border);background:rgba(204,0,0,.04)">
        <div style="display:flex;align-items:center;padding:8px 14px;gap:8px">
          <span style="flex:0 0 60px;font-size:12px;color:var(--text2)">${o.date}</span>
          <span style="flex:0 0 70px;font-size:12px;font-weight:600">#${e(o.orderNum)}</span>
          <span style="flex:1;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(o.description)}</span>
          <span style="flex:0 0 100px;text-align:center">
            <span style="font-size:14px;font-weight:800;font-family:var(--fh);color:${severity};display:block;line-height:1">${days-coreReturnDays}d overdue</span>
            <span style="font-size:9px;color:var(--text3)">${days} days old</span>
          </span>
          <span style="flex:0 0 auto;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end">
            <button class="btn-grn" style="font-size:10px;padding:3px 8px" onclick="markUsed('${o.id}')">✓ returned</button>
            <button class="btn-s" style="font-size:10px;padding:3px 8px;${showEmail?'color:var(--green);border-color:var(--green)':''}" onclick="toggleEmail('${o.id}')">${showEmail?'hide':'✉ remind'}</button>
            ${days>=90?`<button class="btn-d" style="font-size:10px;padding:3px 8px" onclick="writeOffCore('${o.id}')" title="Core not returned 90+ days — void warranty">⚠ void</button>`:''}
            <button class="btn-s" style="font-size:10px;padding:3px 8px" onclick="editOrd('${o.id}')">edit</button>
          </span>
        </div>
        <div style="padding:4px 14px 8px 32px;background:rgba(0,0,0,.1)">
          ${trackRows}
        </div>
        ${showEmail?`<div style="padding:0 14px 12px 14px">
          ${o.customerEmail?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:7px 10px;background:var(--bg3);border-radius:6px;border:1px solid var(--border2)">
            <span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;flex-shrink:0">Send to:</span>
            <span style="font-size:13px;font-weight:600;color:var(--text);flex:1">${e(o.customerEmail)}</span>
            <button class="btn-s" style="font-size:10px" onclick="navigator.clipboard.writeText('${e(o.customerEmail)}')">Copy email</button>
          </div>`:'<div style="padding:4px 0 8px;font-size:11px;color:var(--text3)">No customer email saved — add it via edit order</div>'}
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Copy &amp; paste this into your email:</div>
          <pre style="background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;font-size:11px;color:var(--text2);white-space:pre-wrap;font-family:inherit;line-height:1.6;word-break:break-word;">${e(emailLines)}</pre>
          <button class="btn-s" id="copy-btn-${o.id}" style="margin-top:6px;font-size:11px" onclick="copyEmail('${o.id}')">Copy to clipboard</button>
          ${buildReminderLog(o)}
        </div>`:''}
      </div>`;
    });
    html+=`</div>`;
  }

  // Main list based on filter
  const viewInWindow=viewOrders.filter(o=>!isOrderReturned(o)&&!o.warrantyVoided&&daysAged(o.date)<=coreReturnDays);
  const viewOverdue=viewOrders.filter(o=>!isOrderReturned(o)&&!o.warrantyVoided&&daysAged(o.date)>coreReturnDays);
  const viewReturned=viewOrders.filter(o=>isOrderReturned(o)&&!o.warrantyVoided);
  const viewVoided=viewOrders.filter(o=>o.warrantyVoided);

  if(coreFilter!=='returned'){
    const totalPendingNums=viewInWindow.reduce((s,o)=>s+pendingLabelCount(o),0);
    if(allPending.length>0)html+=`<div class="alert a-warn">⚑ ${totalPendingNums} label${totalPendingNums!==1?'s':''} pending across ${allPending.length} order${allPending.length!==1?'s':''} — up to ${$$(pAmt,2)} exposure.</div>`;
    if(viewInWindow.length)html+=lblSec('Outstanding — not yet returned',viewInWindow,false);
    else if(!aging.length&&coreFilter==='outstanding')html+=`<div style="padding:20px;text-align:center;color:var(--green);font-weight:600">✓ No outstanding cores</div>`;
  }
  if(viewReturned.length){
    const rTotal=viewReturned.reduce((s,o)=>s+n(o.returnCost),0);
    html+=`<hr class="divider">`;
    html+=lblSec(`Returned — ${$$(rTotal,2)} recovered`,viewReturned,true);
  }
  if(viewVoided.length){
    html+=`<hr class="divider"><div style="font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">⚠ Warranty voided (${viewVoided.length})</div>`;
    html+=viewVoided.map(o=>`<div class="lbl-card used" style="border-color:rgba(204,0,0,.3)"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:14px">#${e(o.orderNum)}</div><div style="font-size:12px;color:var(--text3)">${o.date} · ${e(o.description)}</div></div><span class="badge" style="background:rgba(204,0,0,.15);color:#f87171;border:1px solid rgba(204,0,0,.3)">WARRANTY VOID</span></div><div style="margin-top:6px;font-size:11px;color:var(--text3)">Core not returned after 90+ days — warranty voided.</div><button class="btn-s" style="margin-top:6px;font-size:10px" data-oid="${o.id}" onclick="(function(id){pushUndo();const x=orders.find(o=>o.id===id);x.warrantyVoided=false;x.returnUsed=false;x.returnedNums=[];saveAll();render();})(this.dataset.oid)">undo write-off</button></div>`).join('');
  }
  if(!viewInWindow.length&&!viewReturned.length&&!viewVoided.length&&!aging.length)html+=`<div style="padding:30px;text-align:center;color:var(--text3)">No orders match your current filter.</div>`;
  return html;
}
function checkAllTracking(pendingOnly=true){
  // Collect all untracked tracking numbers from pending cores
  const source=pendingOnly
    ? orders.filter(o=>o.returnSent&&!isOrderReturned(o)&&!o.warrantyVoided)
    : orders.filter(o=>o.returnSent);
  const allNums=[];
  source.forEach(o=>{
    const rn=o.returnedNums||[];
    (o.trackingNumbers||[]).filter(t=>t.trim()).forEach(t=>{
      if(!pendingOnly||!rn.includes(t))allNums.push(t.trim());
    });
  });
  if(!allNums.length){
    alert(pendingOnly?'No pending tracking numbers found. All cores may already be marked returned.':'No tracking numbers found.');
    return;
  }
  // Open one tab per number — UPS bulk URL doesn't work reliably
  if(allNums.length>10){
    if(!confirm('This will open '+allNums.length+' UPS tracking tabs — one per tracking number. Continue?'))return;
  }
  allNums.forEach(t=>window.open('https://www.ups.com/track?tracknum='+encodeURIComponent(t),'_blank'));
}
// setTracking replaced by trackingNumbers array
function lcard(o,isUsed){
  const showEmail=showEmailFor.has(o.id);
  const emailLines=buildEmailLines(o);
  const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
  const rn=o.returnedNums||[];
  const allRet=isOrderReturned(o);
  const oid=o.id;

  // Build tracking rows using a helper to avoid quote issues
  let trackSection='';
  if(tNums.length){
    let numRows='';
    tNums.forEach(function(t){
      const ret=rn.includes(t);
      const chk='<input type="checkbox" '+(ret?'checked ':'')+'data-oid="'+oid+'" data-trk="'+t+'" onclick="event.stopPropagation()" onchange="handleTrackChk(this)" style="accent-color:var(--green);width:14px;height:14px;cursor:pointer;flex-shrink:0">';
      const trackBtn='<button data-t="'+t+'" onclick="event.stopPropagation();openUPS([this.dataset.t])" style="font-size:11px;color:var(--blue);background:transparent;border:1px solid rgba(59,130,246,.35);border-radius:4px;padding:3px 8px;cursor:pointer;white-space:nowrap;flex-shrink:0">Track ↗</button>';
      numRows+='<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)">'+chk+'<span style="font-family:monospace;font-size:12px;flex:1;color:var(--text2)">'+e(t)+'</span>'+trackBtn+'<span style="font-size:10px;font-weight:600;color:'+(ret?'var(--green)':'var(--amber)')+';white-space:nowrap;flex-shrink:0;min-width:60px;text-align:right">'+(ret?'✓ returned':'pending')+'</span></div>';
    });
    const summary=allRet?'<span style="font-size:11px;font-weight:600;color:var(--green)">✓ All '+tNums.length+' cores returned</span>':'<span style="font-size:11px;font-weight:600;color:var(--amber)">'+rn.length+' of '+tNums.length+' returned</span>';
    trackSection='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Tracking numbers</span>'+summary+'</div>'+numRows+'</div>';
  } else {
    const chk='<input type="checkbox" '+(allRet?'checked ':'')+'data-oid="'+oid+'" onclick="event.stopPropagation()" onchange="handleCoreChk(this)" style="accent-color:var(--green);width:15px;height:15px;cursor:pointer">';
    trackSection='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><label style="display:flex;align-items:center;gap:8px;cursor:pointer">'+chk+'<span style="font-size:13px;font-weight:600;color:'+(allRet?'var(--green)':'var(--amber)')+'">'+( allRet?'✓ Core returned':'Awaiting core return')+'</span></label></div>';
  }

  const to=o.customerEmail?e(o.customerEmail):'';
  const emailSection=showEmail?('<div style="width:100%;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'+(to?'<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:6px 10px;background:var(--bg3);border-radius:5px;border:1px solid var(--border2)"><span style="font-size:10px;color:var(--text3);text-transform:uppercase;font-weight:600;flex-shrink:0">Send to:</span><span style="font-size:13px;font-weight:600;color:var(--text);flex:1">'+to+'</span><button class="btn-s" style="font-size:10px" data-email="'+to+'" onclick="event.stopPropagation();navigator.clipboard.writeText(this.dataset.email)">Copy</button></div>':'<div style="padding:2px 0 8px;font-size:11px;color:var(--text3)">No customer email saved — add via edit order</div>')+'<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:6px">Copy &amp; paste into your email:</div><pre class="email-tpl">'+e(emailLines)+'</pre><button class="btn-s" id="copy-btn-'+oid+'" style="margin-top:6px" data-oid="'+oid+'" onclick="event.stopPropagation();copyEmail(this.dataset.oid)">Copy to clipboard</button></div>'):'';

  const dAge=daysAged(o.date);
  const daysLeft=coreReturnDays-dAge;
  const dueLabel=allRet?'':(daysLeft>0?'<span style="font-size:10px;font-weight:600;color:var(--green);margin-left:8px">Due in '+daysLeft+'d</span>':(daysLeft===0?'<span style="font-size:10px;font-weight:600;color:var(--amber);margin-left:8px">Due today</span>':'<span style="font-size:10px;font-weight:600;color:#f87171;margin-left:8px">'+Math.abs(daysLeft)+'d overdue</span>'));

function handleTrackChk(el){toggleTrackReturned(el.dataset.oid,el.dataset.trk,el.checked);}

function lblSec(title,list,isUsed){return`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">${title}</div>`+list.sort((a,b)=>isUsed?pd(b.date)-pd(a.date):pd(a.date)-pd(b.date)).map(o=>lcard(o,isUsed)).join('');}
function setLblCost(id,v){const o=orders.find(x=>x.id===id);if(o){o.returnCost=v;saveAll();}}
function markUsed(id){const o=orders.find(x=>x.id===id);if(!o)return;pushUndo();const t=(o.trackingNumbers||[]).filter(x=>x.trim());if(t.length>0){o.returnedNums=[...t];}o.returnUsed=true;saveAll();render();}
function unmark(id){const o=orders.find(x=>x.id===id);if(o){pushUndo();o.returnUsed=false;o.returnedNums=[];saveAll();render();}}
// Per-tracking-number return helpers
function isOrderReturned(o){
  if(!o.returnSent)return false;
  if((o.trackingNumbers||[]).filter(t=>t.trim()).length>0){
    const rn=o.returnedNums||[];
    return o.trackingNumbers.filter(t=>t.trim()).every(t=>rn.includes(t));
  }
  return o.returnUsed;
}
function pendingLabelCount(o){
  if(!o.returnSent)return 0;
  const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
  if(tNums.length>0){
    const rn=o.returnedNums||[];
    return tNums.filter(t=>!rn.includes(t)).length;
  }
  return o.returnUsed?0:1;
}
function toggleTrackReturned(ordId,trackNum,checked){
  const o=orders.find(x=>x.id===ordId);if(!o)return;
  pushUndo();
  if(!o.returnedNums)o.returnedNums=[];
  if(checked){if(!o.returnedNums.includes(trackNum))o.returnedNums.push(trackNum);}
  else{o.returnedNums=o.returnedNums.filter(n=>n!==trackNum);}
  // sync returnUsed for orders with no tracking numbers
  if((o.trackingNumbers||[]).filter(t=>t.trim()).length===0)o.returnUsed=checked;
  else o.returnUsed=isOrderReturned(o);
  saveAll();render();
}
function toggleCoreReturned(id,checked){
  // fallback for orders with no tracking numbers
  const o=orders.find(x=>x.id===id);if(!o)return;
  pushUndo();o.returnUsed=checked;saveAll();render();
}
function markReviewed(id){
  if(reviewedOrders.has(id))reviewedOrders.delete(id);
  else reviewedOrders.add(id);
  saveAll();render();
}

function buildAudit(dated,sortedP){
  if(!dated.length)return`<p style="font-size:13px;color:var(--text3)">No entries yet.</p>`;
  const pDays={};dated.forEach(([d])=>{const p=getPeriod(d);if(!pDays[p.id])pDays[p.id]={p,days:[]};pDays[p.id].days.push(d);});
  let grand=0,html=`<div class="audit-box">`;
  sortedP.forEach(p=>{if(!pDays[p.id])return;const{days}=pDays[p.id];const burn=p.items.reduce((s,x)=>s+getItemDailyRate(x),0);const pt=burn*days.length;grand+=pt;html+=`<div class="a-phdr">Period ${p.effectiveDate}${p.note?' — '+e(p.note):''} (${days.length} days)</div>`;p.items.forEach(x=>{const d=getItemDailyRate(x);html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:11px">${$$(d,2)}/day × ${days.length}</span><span class="co">${$$(d*days.length,2)}</span></div>`;});html+=`<div class="a-row" style="font-weight:700"><span>Period subtotal</span><span></span><span class="co">${$$(pt,2)}</span></div>`;});
  const actCx=customExpenses.filter(x=>x.freq!=='onetime');if(actCx.length){html+=`<div class="a-phdr">Custom expenses</div>`;actCx.forEach(x=>{const da=dated.filter(([d])=>{const dt=pd(d),st=pd(x.startDate),en=x.endDate?pd(x.endDate):null;return st<=dt&&(!en||en>=dt);}).length;if(!da)return;const dly=x.freq==='daily'?n(x.amount):x.freq==='weekly'?n(x.amount)/7:n(x.amount)/30;const amt=dly*da;grand+=amt;html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:11px">${$$(dly,2)}/day × ${da}</span><span class="co">${$$(amt,2)}</span></div>`;});} 
  const ot=customExpenses.filter(x=>x.freq==='onetime');ot.forEach(x=>{grand+=n(x.amount);html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:11px">one-time</span><span class="co">${$$(n(x.amount),2)}</span></div>`;});
  const totalExp=dailyExpenses.reduce((s,x)=>s+n(x.amount),0);if(totalExp){grand+=totalExp;html+=`<div class="a-row" style="font-weight:700"><span>One-time daily exp</span><span></span><span class="ca">${$$(totalExp,2)}</span></div>`;}
  html+=`<div class="a-total"><span>Total accrued</span><span class="co">${$$(grand,2)}</span></div></div>`;return html;
}

function autoSaveVersion(){
  // Silent version save — no alert, used for automatic backups
  const snap={
    _ts:Date.now(),
    _label:'Auto-backup — '+new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    _auto:true,
    orders:JSON.parse(JSON.stringify(orders)),
    fcPeriods:JSON.parse(JSON.stringify(fcPeriods)),
    customExpenses:JSON.parse(JSON.stringify(customExpenses)),
    dailyOverrides:JSON.parse(JSON.stringify(dailyOverrides)),
    dailyExpenses:JSON.parse(JSON.stringify(dailyExpenses)),
    fieldConfig:JSON.parse(JSON.stringify(fieldConfig)),
  };
  let versions=[];
  try{const v=localStorage.getItem('hpdc-versions');if(v)versions=JSON.parse(v);}catch(e){}
  // Remove oldest auto-backups if over limit, always keep manual saves
  const autos=versions.filter(v=>v._auto);
  const manuals=versions.filter(v=>!v._auto);
  // Keep last 8 auto + all manuals (up to 10 total)
  const trimmedAutos=autos.slice(0,7); // we're adding one more, so keep 7
  versions=[snap,...trimmedAutos,...manuals].slice(0,10);
  localStorage.setItem('hpdc-versions',JSON.stringify(versions));
  entriesSinceBackup=0;
  localStorage.setItem('hpdc-esb','0');
}
function saveVersion(){
  const snap={
    _ts:Date.now(),
    _label:new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'}),
    orders:JSON.parse(JSON.stringify(orders)),
    fcPeriods:JSON.parse(JSON.stringify(fcPeriods)),
    customExpenses:JSON.parse(JSON.stringify(customExpenses)),
    dailyOverrides:JSON.parse(JSON.stringify(dailyOverrides)),
    dailyExpenses:JSON.parse(JSON.stringify(dailyExpenses)),
    fieldConfig:JSON.parse(JSON.stringify(fieldConfig)),
  };
  let versions=[];
  try{const v=localStorage.getItem('hpdc-versions');if(v)versions=JSON.parse(v);}catch(e){}
  versions.unshift(snap);
  if(versions.length>10)versions=versions.slice(0,10); // keep 10 versions
  localStorage.setItem('hpdc-versions',JSON.stringify(versions));
  if(view==='settings')render();
  alert('Version saved: '+snap._label);
}
function restoreVersion(ts){
  let versions=[];
  try{const v=localStorage.getItem('hpdc-versions');if(v)versions=JSON.parse(v);}catch(e){}
  const snap=versions.find(v=>v._ts===ts);
  if(!snap)return;
  pushUndo();
  orders=snap.orders;
  if(snap.fcPeriods)fcPeriods=snap.fcPeriods;
  if(snap.customExpenses)customExpenses=snap.customExpenses;
  if(snap.dailyOverrides)dailyOverrides=snap.dailyOverrides;
  if(snap.dailyExpenses)dailyExpenses=snap.dailyExpenses;
  if(snap.fieldConfig)fieldConfig=mergeFields(snap.fieldConfig);
  saveAll();savePeriods();saveCx();saveFields();
  render();
  alert('Restored to version: '+snap._label+'. Use Undo to go back if needed.');
}
function deleteVersion(ts){
  let versions=[];

  localStorage.setItem('hpdc-versions',JSON.stringify(versions));

}

function dailyV(){
  const dated=byDate();
  if(!dated.length)return`<div class="empty"><h3>Nothing logged yet</h3><p>Add your first shipped order to start tracking.</p><button class="btn-p" onclick="sv('entry')">Add first entry</button></div>`;
  const t=totals();
  let alerts='';
  const totalPending=orders.reduce((s,o)=>s+pendingLabelCount(o),0);
  if(totalPending>0)alerts+=`<div class="alert alert-warn">⚑ ${totalPending} return label${totalPending>1?'s':''} pending — up to ${$$(t.pending,2)} exposure. <button class="btn-s" style="margin-left:8px" onclick="sv('labels')">Core Returns →</button></div>`;
  const lowMarginOrders=orders.filter(o=>gpPct(o)<alertThreshold&&n(o.revenue)>0);
  const unreviewedLow=lowMarginOrders.filter(o=>!reviewedOrders.has(o.id));
  if(unreviewedLow.length)alerts+=`<div class="alert alert-red" id="low-margin-alert" onclick="toggleLowMarginFilter()" style="cursor:pointer;user-select:none">⚠ ${unreviewedLow.length} order${unreviewedLow.length>1?'s':''} below ${alertThreshold}% margin — ${lowMarginFilter?'<strong>showing flagged only — click to show all</strong>':'<strong>click to show only flagged orders</strong>'}. Click <strong>review ✓</strong> on each to clear.</div>`;

  // Apply search + date filter to orders
  const q=ledgerSearch.trim().toLowerCase();
  const dfrom=ledgerDateFrom?pd(ledgerDateFrom):null;
  const dto=ledgerDateTo?pd(ledgerDateTo):null;

  // Filter orders
  const filteredOrders=orders.filter(o=>{
    if(lowMarginFilter&&!(gpPct(o)<alertThreshold&&n(o.revenue)>0))return false;
    if(q&&!(o.orderNum.toLowerCase().includes(q)||o.description.toLowerCase().includes(q)||o.notes.toLowerCase().includes(q)))return false;
    const od=pd(o.date);
    if(dfrom&&od<dfrom)return false;
    if(dto&&od>dto)return false;
    return true;
  });

  const isFiltered=q||dfrom||dto||lowMarginFilter;
  const matchCount=filteredOrders.length;

  // Group filtered orders by date
  const filteredMap={};
  filteredOrders.forEach(o=>{if(!filteredMap[o.date])filteredMap[o.date]=[];filteredMap[o.date].push(o);});
  const filteredDated=Object.entries(filteredMap).sort(([a],[b])=>pd(a)-pd(b));

  const toolbar=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:14px;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <input type="text" id="ledger-search-inp" class="inp-base" value="${e(ledgerSearch)}" placeholder="Search orders — type then press Enter (lmm, chr 3.6, order #…)" style="flex:1;min-width:200px;padding:8px 12px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <button class="btn-p" style="padding:8px 16px;font-size:12px" onclick="runLedgerSearch()">Search</button>
      ${isFiltered?`<button class="btn-s" onclick="clearLedgerSearch()">✕ Clear</button>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;flex-shrink:0">Date range:</span>
      <input type="text" id="ledger-from" class="inp-base" value="${e(ledgerDateFrom)}" placeholder="From M/D/YYYY" style="width:130px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <span style="font-size:12px;color:var(--text3)">—</span>
      <input type="text" id="ledger-to" class="inp-base" value="${e(ledgerDateTo)}" placeholder="To M/D/YYYY" style="width:130px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <input class="ledger-jump inp-base" type="text" id="jump-inp" placeholder="Jump to date (M/D)" style="width:140px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')jumpToDate()">
      <button class="btn-g" style="padding:6px 12px;font-size:12px" onclick="jumpToDate()">Jump</button>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">${isFiltered?`${matchCount} order${matchCount!==1?'s':''} matched`:orders.length+' orders total'}</span>
      <button class="btn-p" style="padding:6px 14px;font-size:12px" onclick="sv('entry')">+ New entry</button>
    </div>
  </div>`;

  if(isFiltered&&!filteredDated.length)
    return alerts+toolbar+`<div class="empty"><h3>No orders matched</h3><p>Try different search terms or a wider date range.</p></div>`;

  let rnet=0;
  const allDated=byDate();
  // Running net must include ALL days, not just filtered — calculate full running net first
  const fullRnet={};
  let r=0;
  allDated.forEach(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0),dVc=dayOrders.reduce((s,o)=>s+vc(o),0);
    r+=dRev-dVc-getDayBurn(date)-getDayExpTotal(date);
    fullRnet[date]=r;
  });

  const dayData=(isFiltered?filteredDated:allDated).map(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0),dVc=dayOrders.reduce((s,o)=>s+vc(o),0);
    const dBurn=getDayBurn(date),dExpT=getDayExpTotal(date),dNet=dRev-dVc-dBurn-dExpT;
    return{date,dayOrders,dRev,dVc,dBurn,dExpT,dNet,rnet:fullRnet[date]||0,isFiltered};
  });

  // Auto-expand most recent day if nothing is expanded yet
  const sortedDates=dayData.map(d=>d.date);
  if(expandedDays.size===0&&sortedDates.length){
    expandedDays.add(sortedDates[sortedDates.length-1]); // most recent
  }
  return alerts+toolbar+[...dayData].reverse().map(buildDaySection).join('');
}

function toggleDay(date){
  if(expandedDays.has(date))expandedDays.delete(date);
  else expandedDays.add(date);
  document.getElementById('view').innerHTML=dailyV();
  updateSummary();updateBadge();updateUndoBtn();
}
function toggleLowMarginFilter(){
  lowMarginFilter=!lowMarginFilter;
  // Clear other filters when activating this one
  if(lowMarginFilter){ledgerSearch='';ledgerDateFrom='';ledgerDateTo='';}
  document.getElementById('view').innerHTML=dailyV();
  updateSummary();updateBadge();updateUndoBtn();
}
function runLedgerSearch(){

  ledgerSearch=document.getElementById('ledger-search-inp')?.value||'';
  ledgerDateFrom=document.getElementById('ledger-from')?.value||'';
  ledgerDateTo=document.getElementById('ledger-to')?.value||'';
  document.getElementById('view').innerHTML=dailyV();
  updateSummary();updateBadge();updateUndoBtn();
}
function clearLedgerSearch(){
  ledgerSearch='';ledgerDateFrom='';ledgerDateTo='';lowMarginFilter=false;
  document.getElementById('view').innerHTML=dailyV();
  updateSummary();updateBadge();updateUndoBtn();
}

function jumpToDate(){
  const val=(document.getElementById('jump-inp')?.value||'').trim();if(!val)return;
  const el=document.getElementById('day-'+sid(val));
  if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.add('highlighted');setTimeout(()=>el.classList.remove('highlighted'),2500);}
}

function buildDaySection({date,dayOrders,dRev,dVc,dBurn,dExpT,dNet,rnet}){
  const s=sid(date),hasOv=hasAnyOv(date);
  const isOpen=expandedDays.has(date);
  const ordRows=dayOrders.map(o=>{
    const lowM=gpPct(o)<alertThreshold&&n(o.revenue)>0;
    const oid=o.id;

        const reviewBtn=lowM?'<button class="btn-s" style="font-size:10px;padding:2px 7px;'+(reviewedOrders.has(oid)?'color:var(--green);border-color:var(--green)':'color:var(--amber);border-color:var(--amber)')+'" onclick="markReviewed(\''+oid+'\')">'+( reviewedOrders.has(oid)?'✓ rev':'review')+'</button>':'';
    const expanded=expandedOrds.has(oid);
    // Build detail panel
    let detail='';
    if(expanded){
      const activeF=fieldConfig.filter(x=>x.active);
      const costRows=activeF.map(fc=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span style="color:var(--text3)">${e(fc.label)}</span><span style="font-weight:500">${$$(n(o[fc.id]||0),2)}</span></div>`).join('');
      const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
      detail='<div style="padding:10px 16px 12px 24px;background:rgba(0,0,0,.2);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:12px 24px">'
        // Cost breakdown
        +'<div><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Cost breakdown</div>'
        +costRows
        +(o.returnUsed?'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">Return shipping</span><span style="font-weight:500">'+$$(n(o.returnCost),2)+'</span></div>':'')
        +'<div style="display:flex;justify-content:space-between;padding:4px 0;margin-top:2px;border-top:1px solid var(--border2);font-size:12px;font-weight:700"><span>Total variable</span><span class="cr">'+$$(vc(o),2)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;font-weight:700"><span>Gross profit</span><span class="'+cc(gp(o))+'">'+$$(gp(o),2)+' ('+gpPct(o).toFixed(1)+'%)</span></div>'
        +'</div>'
        // Order details
        +'<div><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Order details</div>'
        +(o.customerName?'<div style="font-size:12px;margin-bottom:4px;font-weight:600">👤 '+e(o.customerName)+'</div>':'')
    +(o.technician?'<div style="font-size:12px;margin-bottom:4px;color:var(--blue)">🔧 '+e(o.technician)+' · '+(parseInt(o.quantity)||1)+' head'+(parseInt(o.quantity)>1?'s':'')+'</div>':'')
    +(o.customerEmail?'<div style="font-size:12px;margin-bottom:4px;color:var(--text2)">📧 '+e(o.customerEmail)+'</div>':'')
        +(n(o.coreValue)>0?'<div style="font-size:12px;margin-bottom:4px;color:var(--amber);font-weight:600">⚠ Core value at risk: '+$$(n(o.coreValue),2)+'</div>':'')
        +(o.returnSent?'<div style="font-size:12px;margin-bottom:4px;color:'+(isOrderReturned(o)?'var(--green)':'var(--amber)')+'">'+( isOrderReturned(o)?'✓ Core returned':'⚑ Core return pending')+'</div>':'')
        +(tNums.length?'<div style="font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Tracking</div>'+tNums.map(t=>'<div style="font-family:monospace;font-size:11px;color:var(--text2);margin-bottom:2px">'+e(t)+'</div>').join(''):'')
        +(o.notes?'<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic">'+e(o.notes)+'</div>':'')
        +'</div>'
        +'</div>';
    }
    return '<div class="ord-row'+(lowM?' low-margin':'') +'" style="cursor:pointer" onclick="toggleOrdExpand(\''+oid+'\')">'+
      '<span class="ord-num">#'+e(o.orderNum)+'</span>'
      +'<span class="ord-desc">'+e(o.description)+(o.customerName?' <span style="font-size:10px;color:var(--text3)">· '+e(o.customerName)+'</span>':'')+(o.technician?' <span style="font-size:10px;color:var(--blue)">🔧'+e(o.technician)+'</span>':'')+'</span>'
      +'<span class="ord-rev">'+$$(n(o.revenue),2)+'</span>'
      +'<span class="ord-vc cr">−'+$$(vc(o),2)+'</span>'
      +'<span class="ord-gp '+cc(gp(o))+'">'+$$(gp(o),2)+' <span style="font-size:10px;opacity:.7">'+gpPct(o).toFixed(0)+'%</span></span>'
      +'<span class="ord-act" style="flex:0 0 auto;display:flex;gap:3px;justify-content:flex-end">'
      +reviewBtn
      +'<button class="btn-s" onclick="event.stopPropagation();editOrd(\''+oid+'\')">edit</button>'
      +'<button class="btn-d" onclick="event.stopPropagation();delOrd(\''+oid+'\')">×</button>'
      +'</span>'
      +'</div>'
      +detail;
  }).join('');


  const dayExps=getDayExpenses(date);

  const expRows=dayExps.map(x=>`<div class="exp-row"><span class="exp-desc">${e(x.description)}</span><span class="exp-cat">${e(x.category)}</span><span class="exp-amt cr">−${$$(n(x.amount),2)}</span><span style="flex:0 0 32px;display:flex;justify-content:flex-end"><button class="btn-d" onclick="delDailyExp('${x.id}')">×</button></span></div>`).join('');
  const addForm=addingExpDate===date?`<div class="exp-add-row">
    <input type="text" class="inp-base" placeholder="Description" style="flex:1;min-width:120px" oninput="dexpField('description',this.value)">
    <input type="number" class="inp-base" placeholder="Amount $" style="width:100px" oninput="dexpField('amount',this.value)">
    <input type="text" class="inp-base" placeholder="Category (optional)" style="width:120px" oninput="dexpField('category',this.value)">
    <button class="btn-p" style="padding:5px 14px;font-size:12px" onclick="confirmAddExp('${date}')">Add</button>
    <button class="btn-g" style="padding:5px 12px;font-size:12px" onclick="cancelAddExp()">Cancel</button>
  </div>`:`<div style="padding:8px 16px"><button class="btn-g" style="font-size:12px;padding:6px 14px" onclick="event.stopPropagation();openAddExp('${date}')">+ Add expense</button></div>`;
  const expSection=`<div class="day-exp-section">${dayExps.length?'<div style="padding:5px 16px 0;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px">One-time expenses</div>':''}${expRows}${addForm}</div>`;

  const period=getPeriod(date);
  const coreInputs=period.items.map(item=>`<div class="fc-field">
    <span class="fc-field-lbl" title="${item.name}">${e(item.name)}</span>
    <input type="number" id="fc-${s}-${item.key}" class="fc-inp${isItemOv(date,item.key)?' ov':''}" value="${getDayItemRate(date,item.key).toFixed(2)}" oninput="setDayItemRate('${date}','${item.key}',this.value)">
  </div>`).join('');
  const activeCx=getActiveCx(date);
  const cxInputs=activeCx.length?'<div class="fc-divider"></div>'+activeCx.map(cx=>`<div class="fc-field"><span class="fc-field-lbl" title="${cx.name}">${e(cx.name)}</span><input type="number" id="fc-${s}-cx_${cx.id}" class="fc-inp${isCxOv(date,cx.id)?' ov':''}" value="${getCxRate(date,cx.id).toFixed(2)}" oninput="setCxRate('${date}','${cx.id}',this.value)"></div>`).join(''):'';
  const expNudge=(!dayExps.length&&addingExpDate!==date)?`<button class="btn-s" style="font-size:10px" onclick="event.stopPropagation();openAddExp('${date}')">+ expense</button>`:'';
  const ordHdr=`<div class="ord-hdr"><span class="ord-num">Order #</span><span style="flex:1">Description</span><span class="ord-rev" style="text-align:right">Revenue</span><span class="ord-vc" style="text-align:right">Var costs</span><span class="ord-gp" style="text-align:right">Gross / margin</span><span class="ord-act" style="min-width:80px"></span></div>`;
  return`<div class="day-section${isOpen?' highlighted':''}" id="day-${s}">
    <div class="day-head" onclick="toggleDay('${date}')" style="cursor:pointer;user-select:none">
      <span class="day-date-lbl">${date}</span>
      <div class="day-kpis">
        <div class="kpi"><span class="kpi-lbl">Revenue in</span><span class="kpi-val cg">${$$(dRev,2)}</span></div>
        <div class="kpi"><span class="kpi-lbl">Total out</span><span class="kpi-val cr" id="dout-${s}">−${$$(dVc+dBurn+dExpT,2)}</span></div>
        <div class="kpi"><span class="kpi-lbl">Net today</span><span class="pill ${dNet>=0?'pill-pos':'pill-neg'}" id="dnet-${s}">${dNet>=0?'+':''} ${$$(dNet,2)}</span></div>
        <div class="kpi"><span class="kpi-lbl">Running</span><span class="kpi-val ${cc(rnet)}" id="drun-${s}">${$$(rnet,2)}</span></div>
      </div>
      <div class="fc-row" style="gap:6px;margin-left:auto">
        <span style="font-size:18px;color:var(--text3);line-height:1">${isOpen?'▾':'▸'}</span>
      </div>
    </div>
    ${isOpen?`
    <div style="padding:6px 14px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px"><button class="btn-p" style="font-size:12px;padding:5px 14px" onclick="event.stopPropagation();addForDate('${date}')">+ New order</button><span style="font-size:11px;color:var(--text3)">Date pre-fills as ${date} — change it in the form if needed</span></div>
    <div class="day-orders">${ordHdr}${ordRows}</div>
    ${expSection}
    <div class="day-fc">
      <span class="fc-section-lbl">Fixed</span>
      <div class="fc-fields">${coreInputs}${cxInputs}</div>
      <div class="fc-right">
        <div><span class="fc-total-lbl">Total</span><span class="fc-total-val" id="dburn-${s}">${$$(dBurn,2)}</span></div>
        <button class="fc-reset" id="dres-${s}" style="display:${hasOv?'':' none'}" onclick="event.stopPropagation();resetDay('${date}')">↺ reset</button>
      </div>
    </div>`:''}
  </div>`;
}
function addForDate(d){entryDatePreset=d;sv('entry');}

</script>
</body>
</html>
