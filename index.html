<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profitability Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f5f5f4;--bg3:#e7e5e4;
  --text:#1c1917;--text2:#57534e;--text3:#a8a29e;
  --border:#e7e5e4;--border2:#d6d3d1;
  --green:#15803d;--red:#b91c1c;--orange:#c2410c;
  --purple:#6d28d9;--amber:#b45309;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1917;--bg2:#292524;--bg3:#3c3837;
  --text:#fafaf9;--text2:#a8a29e;--text3:#78716c;
  --border:#3c3837;--border2:#57534e;
  --green:#4ade80;--red:#f87171;--orange:#fb923c;
  --purple:#a78bfa;--amber:#fbbf24;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--bg);line-height:1.5;}
.app{max-width:1100px;margin:0 auto;}
.topbar{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--border);}
.topbar-row1{display:flex;justify-content:space-between;align-items:center;padding:10px 20px 0;gap:12px;flex-wrap:wrap;}
.topbar-row1 h1{font-size:15px;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:3px;flex-shrink:0;}
.sync-idle{background:var(--border2);}
.sync-ok{background:var(--green);}
.sync-busy{background:var(--amber);animation:pulse .8s infinite;}
.sync-err{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.undo-btn{background:transparent;border:1px solid var(--border2);border-radius:var(--r);padding:4px 10px;cursor:pointer;font-size:12px;color:var(--text2);font-family:inherit;display:flex;align-items:center;gap:4px;}
.undo-btn:hover:not(:disabled){background:var(--bg2);}
.undo-btn:disabled{opacity:.35;cursor:default;}
.summary-bar{display:grid;grid-template-columns:repeat(6,1fr);border-top:1px solid var(--border);margin-top:8px;}
.sum-cell{padding:8px 14px;border-right:1px solid var(--border);}
.sum-cell:last-child{border-right:none;}
.sum-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.sum-val{font-size:17px;font-weight:700;line-height:1.2;}
.sum-sub{font-size:10px;color:var(--text3);}
.nav{display:flex;gap:4px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav button{padding:5px 13px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;font-size:13px;background:transparent;color:var(--text2);font-family:inherit;}
.nav button.active{border-color:var(--border2);background:var(--bg);color:var(--text);font-weight:500;}
.nav button:hover:not(.active){background:var(--bg3);}
.bcnt{display:inline-block;background:var(--red);color:#fff;border-radius:10px;padding:0 5px;font-size:10px;margin-left:4px;line-height:16px;vertical-align:middle;}
.content{padding:16px 20px;}
.cg{color:var(--green);}.cr{color:var(--red);}.co{color:var(--orange);}.cp{color:var(--purple);}.ca{color:var(--amber);}

/* ledger toolbar */
.ledger-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.ledger-jump{border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:130px;}
.ledger-jump:focus{outline:none;border-color:#a78bfa;}

/* day blocks */
.day-section{border:1px solid var(--border);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;}
.day-section.highlighted{border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.2);}
.day-head{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);flex-wrap:wrap;}
.day-date-lbl{font-size:16px;font-weight:700;flex-shrink:0;min-width:52px;}
.day-kpis{display:flex;gap:20px;flex:1;flex-wrap:wrap;}
.kpi{display:flex;flex-direction:column;gap:1px;}
.kpi-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;}
.kpi-val{font-size:15px;font-weight:600;}
.day-orders{border-top:1px solid var(--border);}
.ord-hdr{display:flex;align-items:center;padding:5px 14px;background:var(--bg2);font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;gap:8px;border-bottom:1px solid var(--border);}
.ord-row{display:flex;align-items:center;padding:7px 14px;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.ord-row:last-child{border-bottom:none;}
.ord-num{flex:0 0 48px;font-size:11px;color:var(--text3);}
.ord-desc{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;}
.ord-rev{flex:0 0 82px;text-align:right;}
.ord-vc{flex:0 0 82px;text-align:right;}
.ord-gp{flex:0 0 88px;text-align:right;font-weight:600;}
.ord-act{flex:0 0 64px;display:flex;gap:3px;justify-content:flex-end;}
.lbl-warn{font-size:10px;color:var(--amber);margin-left:4px;font-style:normal;}
.day-exp-section{border-top:1px solid var(--border);background:var(--bg);}
.exp-row{display:flex;align-items:center;padding:6px 14px;border-bottom:1px solid var(--border);font-size:13px;gap:8px;}
.exp-row:last-of-type{border-bottom:none;}
.exp-desc{flex:1;color:var(--text2);}
.exp-cat{flex:0 0 100px;font-size:11px;color:var(--text3);}
.exp-amt{flex:0 0 88px;text-align:right;font-weight:500;}
.exp-add-row{display:flex;align-items:center;gap:8px;padding:8px 14px;flex-wrap:wrap;}
.exp-add-row input{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);}
.exp-add-row input:focus{outline:none;border-color:#a78bfa;}
.day-fc{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-top:1px solid var(--border);flex-wrap:wrap;}
.fc-section-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;padding-top:14px;}
.fc-fields{display:flex;gap:8px;flex:1;flex-wrap:wrap;align-items:flex-start;}
.fc-field{display:flex;flex-direction:column;gap:3px;}
.fc-field-lbl{font-size:10px;color:var(--text3);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:84px;}
.fc-inp{width:82px;border:1px solid var(--border2);border-radius:6px;padding:5px 7px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);text-align:right;}
.fc-inp:focus{outline:none;border-color:#a78bfa;box-shadow:0 0 0 2px rgba(167,139,250,.15);}
.fc-inp.ov{border-color:var(--amber);color:var(--amber);font-weight:600;}
.fc-divider{width:1px;background:var(--border);align-self:stretch;margin:0 4px;flex-shrink:0;}
.fc-right{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;}
.fc-total-lbl{font-size:10px;color:var(--text3);}
.fc-total-val{font-size:15px;font-weight:600;color:var(--orange);}
.fc-reset{background:transparent;border:1px solid var(--border);border-radius:5px;padding:2px 8px;cursor:pointer;font-size:11px;color:var(--text3);font-family:inherit;}
.fc-reset:hover{background:var(--bg2);}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;}
.pill-pos{background:#dcfce7;color:#15803d;}
.pill-neg{background:#fee2e2;color:#b91c1c;}
@media(prefers-color-scheme:dark){.pill-pos{background:#14532d;color:#4ade80;}.pill-neg{background:#450a0a;color:#f87171;}}

/* period items editor */
.pi-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.pi-row:last-child{border-bottom:none;}
.pi-name{flex:1;min-width:120px;border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);}
.pi-amt{width:90px;border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);text-align:right;}
.pi-freq{border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);}
.pi-rate{font-size:12px;color:var(--text3);width:80px;text-align:right;flex-shrink:0;}
.pi-name:focus,.pi-amt:focus,.pi-freq:focus{outline:none;border-color:#a78bfa;}
.period-editor{background:var(--bg2);border-radius:var(--rl);padding:18px;margin-bottom:16px;}
.period-editor-items{border:1px solid var(--border);border-radius:var(--r);padding:4px 14px;background:var(--bg);margin-bottom:12px;}

/* summary */
.sum-cards{display:flex;flex-direction:column;gap:16px;}
.sum-card{border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;}
.sum-card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);}
.sum-card-title{font-size:15px;font-weight:700;}
.sum-card-sub{font-size:12px;color:var(--text3);}
.sum-card-body{padding:14px 16px;}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
@media(max-width:600px){.sum-grid{grid-template-columns:1fr 1fr;}}
.sum-metric{background:var(--bg2);border-radius:var(--r);padding:12px 14px;}
.sm-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.sm-val{font-size:20px;font-weight:700;line-height:1.2;}
.sm-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.sum-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px;}
.sum-bar-lbl{font-size:12px;color:var(--text2);width:110px;flex-shrink:0;}
.sum-bar-track{flex:1;background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;}
.sum-bar-fill{height:100%;border-radius:4px;}
.sum-bar-amt{font-size:12px;font-weight:500;width:90px;text-align:right;flex-shrink:0;}
.sum-bar-pct{font-size:11px;color:var(--text3);width:38px;text-align:right;flex-shrink:0;}
.sum-stats{display:flex;gap:20px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);}
.sum-stats strong{color:var(--text);font-weight:600;}
.sum-breakdown{display:flex;gap:24px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
.breakdown-col{flex:1;min-width:180px;}
.bk-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.bk-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.bk-lbl{color:var(--text2);}.bk-val{font-weight:500;}
.no-data{padding:40px 16px;text-align:center;color:var(--text3);font-size:13px;}

/* forms */
.form-wrap{max-width:640px;}
.s-title{font-size:16px;font-weight:600;margin-bottom:4px;}
.s-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.6;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
@media(max-width:500px){.frow{grid-template-columns:1fr;}}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:12px;color:var(--text2);font-weight:500;}
.fg input,.fg select{border:1px solid var(--border2);border-radius:var(--r);padding:8px 10px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);width:100%;}
.fg input:focus,.fg select:focus{outline:none;border-color:#a78bfa;box-shadow:0 0 0 3px rgba(167,139,250,.15);}
.preview{background:var(--bg2);border-radius:var(--r);padding:12px 16px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;}
.pv-i{display:flex;flex-direction:column;gap:2px;}
.pv-lbl{font-size:11px;color:var(--text3);}
.pv-val{font-size:18px;font-weight:600;}
.ret-box{background:var(--bg2);border-radius:var(--r);padding:14px;margin-top:14px;}
.chk-row{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin-bottom:8px;}
.chk-row input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#7c3aed;}

/* settings */
.ss{margin-bottom:28px;}
.ss-title{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.period-item{border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;}
.period-item.cur{border-color:#a78bfa;}
.period-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.cur-badge{font-size:11px;background:#ede9fe;color:#5b21b6;border-radius:20px;padding:2px 8px;font-weight:600;}
@media(prefers-color-scheme:dark){.cur-badge{background:#3b0764;color:#c4b5fd;}}
.period-items-list{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--text2);}
.period-items-list span{color:var(--text);font-weight:500;}
.cx-card{border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.cx-card.ended{opacity:.6;}
.cx-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.cx-field{display:flex;flex-direction:column;gap:3px;}
.cx-field label{font-size:11px;color:var(--text3);font-weight:500;}
.cx-field input,.cx-field select{border:1px solid var(--border2);border-radius:6px;padding:6px 8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);}
.cx-field input:focus,.cx-field select:focus{outline:none;border-color:#a78bfa;}
.fc-config-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);}
.fc-config-row:last-child{border-bottom:none;}
.fc-lbl-inp{border:1px solid var(--border2);border-radius:6px;padding:5px 8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:180px;}
.fc-lbl-inp:focus{outline:none;border-color:#a78bfa;}
.sync-box{background:var(--bg2);border-radius:var(--rl);padding:16px;margin-bottom:12px;}
.sync-inp{border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:100%;margin-top:4px;}
.sync-inp:focus{outline:none;border-color:#a78bfa;}
.audit-box{background:var(--bg2);border-radius:var(--rl);padding:16px;}
.a-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border);gap:8px;}
.a-row:last-of-type{border-bottom:none;}
.a-phdr{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:6px 0 3px;margin-top:4px;}
.a-total{display:flex;justify-content:space-between;font-size:15px;font-weight:600;padding-top:10px;margin-top:4px;border-top:1px solid var(--border2);}

/* labels */
.lbl-card{border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:10px;}
.lbl-card.used{opacity:.55;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;}
.bdg-p{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa;}
.bdg-u{background:#fef2f2;color:#b91c1c;border:1px solid #fca5a5;}
@media(prefers-color-scheme:dark){.bdg-p{background:#431407;color:#fb923c;border-color:#7c2d12;}.bdg-u{background:#450a0a;color:#f87171;border-color:#7f1d1d;}}

/* history */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:1px solid var(--border);}
thead th{padding:6px 8px;font-weight:500;color:var(--text3);white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--bg2);}
tbody td{padding:7px 8px;}
.right{text-align:right;}

/* misc */
.warn{background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:13px;color:#9a3412;}
.info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:var(--r);padding:12px 14px;margin-bottom:14px;font-size:13px;color:#1e40af;line-height:1.6;}
@media(prefers-color-scheme:dark){.warn{background:#431407;border-color:#7c2d12;color:#fb923c;}.info-box{background:#1e3a5f;border-color:#1e40af;color:#93c5fd;}}
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty h3{font-size:16px;color:var(--text2);margin-bottom:8px;}
.empty p{font-size:13px;margin-bottom:20px;}
.btn-p{background:#7c3aed;border:none;color:#fff;padding:9px 20px;border-radius:var(--r);cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;}
.btn-p:hover{background:#6d28d9;}
.btn-g{background:transparent;border:1px solid var(--border2);padding:8px 16px;border-radius:var(--r);cursor:pointer;font-size:13px;color:var(--text2);font-family:inherit;}
.btn-g:hover{background:var(--bg2);}
.btn-s{background:transparent;border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;color:var(--text2);font-family:inherit;}
.btn-s:hover{background:var(--bg2);}
.btn-d{background:transparent;border:1px solid #fca5a5;border-radius:5px;padding:3px 8px;cursor:pointer;font-size:11px;color:var(--red);font-family:inherit;}
.btn-grn{background:transparent;border:1px solid #6ee7b7;border-radius:5px;padding:4px 12px;cursor:pointer;font-size:12px;color:var(--green);font-family:inherit;font-weight:500;}
.btn-grn:hover{background:#d1fae5;}
@media(prefers-color-scheme:dark){.btn-grn:hover{background:#064e3b;}}
.fc{display:flex;align-items:center;gap:8px;}
.trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.tag{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500;background:var(--bg3);color:var(--text2);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-row1">
      <h1>Profitability Tracker</h1>
      <div class="topbar-right">
        <button class="undo-btn" id="undo-btn" onclick="undo()" disabled>↩ Undo</button>
        <span style="font-size:12px;color:var(--text3);display:flex;align-items:center;gap:3px">
          <span class="sync-dot sync-idle" id="sync-dot"></span>
          <span id="sync-status">local</span>
        </span>
        <span style="font-size:12px;color:var(--text3)" id="last-saved"></span>
      </div>
    </div>
    <div class="summary-bar">
      <div class="sum-cell"><div class="sum-lbl">Total revenue</div><div class="sum-val cg" id="sum-rev">—</div></div>
      <div class="sum-cell"><div class="sum-lbl">Variable costs</div><div class="sum-val cr" id="sum-vc">—</div></div>
      <div class="sum-cell"><div class="sum-lbl">Fixed costs</div><div class="sum-val co" id="sum-fix">—</div></div>
      <div class="sum-cell"><div class="sum-lbl">Other expenses</div><div class="sum-val ca" id="sum-exp">—</div><div class="sum-sub">one-time</div></div>
      <div class="sum-cell"><div class="sum-lbl">Net profit</div><div class="sum-val" id="sum-net">—</div></div>
      <div class="sum-cell"><div class="sum-lbl">Today's burn</div><div class="sum-val cp" id="sum-burn">—</div><div class="sum-sub">fixed / day</div></div>
    </div>
    <nav class="nav" id="nav">
      <button class="active" onclick="sv('daily')">Daily ledger</button>
      <button onclick="sv('summary')">Summary</button>
      <button onclick="sv('entry')">New entry</button>
      <button onclick="sv('labels')" id="nav-labels">Labels</button>
      <button onclick="sv('history')">History</button>
      <button onclick="sv('settings')">Settings</button>
    </nav>
  </div>
  <div class="content" id="view"></div>
</div>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let orders=[], fcPeriods=[], customExpenses=[], dailyOverrides={};
let dailyExpenses=[], fieldConfig=[], syncConfig={enabled:false,apiKey:'',binId:''};
let undoStack=[];
let view='daily', editId=null, f=fresh(), newPeriodDraft=null, newCxDraft=null;
let entryDatePreset=null, addingExpDate=null;

const DEFAULT_FIELDS=[
  {id:'headsCost',   label:'Heads cost',    active:true, builtin:true},
  {id:'coreCost',    label:'Core cost',     active:true, builtin:true},
  {id:'dnjParts',    label:'DNJ parts',     active:true, builtin:true},
  {id:'shipping',    label:'Shipping',      active:true, builtin:true},
  {id:'newHeadCost', label:'New head cost', active:true, builtin:true},

function today()      {const d=new Date();return`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;}
function todayShort() {const d=new Date();return`${d.getMonth()+1}/${d.getDate()}`;}
function sid(d)       {return d.replace(/\//g,'_');}
function uid()        {return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function fresh(){

// ── Undo ───────────────────────────────────────────────────────────────────────
function pushUndo(){
  undoStack.push({
    orders:JSON.parse(JSON.stringify(orders)),
    fcPeriods:JSON.parse(JSON.stringify(fcPeriods)),
    customExpenses:JSON.parse(JSON.stringify(customExpenses)),
    dailyOverrides:JSON.parse(JSON.stringify(dailyOverrides)),
    dailyExpenses:JSON.parse(JSON.stringify(dailyExpenses)),
    fieldConfig:JSON.parse(JSON.stringify(fieldConfig)),
  });
  if(undoStack.length>20)undoStack.shift();
  updateUndoBtn();
}
function undo(){
  if(!undoStack.length)return;
  const prev=undoStack.pop();
  orders=prev.orders; fcPeriods=prev.fcPeriods; customExpenses=prev.customExpenses;
  dailyOverrides=prev.dailyOverrides; dailyExpenses=prev.dailyExpenses; fieldConfig=prev.fieldConfig;
  saveAll();savePeriods();saveCx();saveFields();
  updateUndoBtn();render();
}
function updateUndoBtn(){
  const btn=document.getElementById('undo-btn');
  if(btn){btn.disabled=undoStack.length===0;btn.title=undoStack.length?`Undo (${undoStack.length} step${undoStack.length>1?'s':''} available)`:'Nothing to undo';}
}

// ── Storage ────────────────────────────────────────────────────────────────────
function loadData(){
  try{
    const g=k=>{const v=localStorage.getItem(k);return v?JSON.parse(v):null;};
    const o=g('hpdc-orders'),fp=g('hpdc-periods'),cx=g('hpdc-cx'),
          dv=g('hpdc-dov'),de=g('hpdc-dexp'),fc=g('hpdc-fields'),sc=g('hpdc-sync');

    if(old&&!fcPeriods.length){const v=JSON.parse(old);fcPeriods=[{id:uid(),effectiveDate:'1/1/2025',note:'Migrated',items:DEFAULT_FC_ITEMS.map(x=>({...x,amount:v[{payroll:'payrollWeekly',rent:'rentMonthly',merch:'merchantFeesMonthly',ads:'googleAdsDaily',loan:'ppLoanWeekly'}[x.key]]||x.amount}))}];savePeriods();}
  }catch(err){console.error(err);}

  initNewPeriod();
}

function migratePeriod(p){
  if(p.items)return p;
  return{...p,items:[
    ...(p.payrollWeekly!=null?[{key:'payroll',name:'Payroll',amount:p.payrollWeekly,freq:'weekly'}]:[]),
    ...(p.rentMonthly!=null?[{key:'rent',name:'Rent',amount:p.rentMonthly,freq:'monthly'}]:[]),
    ...(p.merchantFeesMonthly!=null?[{key:'merch',name:'Merchant fees',amount:p.merchantFeesMonthly,freq:'monthly'}]:[]),
    ...(p.googleAdsDaily!=null?[{key:'ads',name:'Google Ads',amount:p.googleAdsDaily,freq:'daily'}]:[]),
    ...(p.ppLoanWeekly!=null?[{key:'loan',name:'PPP / loan',amount:p.ppLoanWeekly,freq:'weekly'}]:[]),
  ]};
}
function mergeFields(saved){
  const m=[...DEFAULT_FIELDS.map(d=>{const s=saved.find(x=>x.id===d.id);return s?{...d,...s,builtin:true}:d;})];
  saved.filter(x=>!x.builtin).forEach(x=>m.push(x));
  return m;
}

// ── Cloud sync ─────────────────────────────────────────────────────────────────
function setSyncStatus(s,msg){const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-status');if(dot)dot.className='sync-dot sync-'+s;if(txt)txt.textContent=msg||s;}
function getPayload(){return{orders,fcPeriods,customExpenses,dailyOverrides,dailyExpenses,fieldConfig,_ts:Date.now()};}
async function syncToCloud(){
  if(!syncConfig.enabled||!syncConfig.apiKey||!syncConfig.binId)return;
  setSyncStatus('busy','syncing…');
  try{const r=await fetch(`https://api.jsonbin.io/v3/b/${syncConfig.binId}`,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':syncConfig.apiKey},body:JSON.stringify(getPayload())});if(!r.ok)throw new Error(r.status);setSyncStatus('ok','synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));}
  catch(e){setSyncStatus('err','sync failed');}
}
async function syncFromCloud(){
  if(!syncConfig.enabled||!syncConfig.apiKey||!syncConfig.binId)return false;
  setSyncStatus('busy','fetching…');
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${syncConfig.binId}/latest`,{headers:{'X-Master-Key':syncConfig.apiKey}});
    if(!r.ok)throw new Error(r.status);
    const j=await r.json(),rec=j.record||j;
    if(rec._ts&&rec.orders){
      if(rec.orders)orders=rec.orders;
      if(rec.fcPeriods)fcPeriods=rec.fcPeriods.map(migratePeriod);
      if(rec.customExpenses)customExpenses=rec.customExpenses;
      if(rec.dailyOverrides)dailyOverrides=rec.dailyOverrides;
      if(rec.dailyExpenses)dailyExpenses=rec.dailyExpenses;
      if(rec.fieldConfig)fieldConfig=mergeFields(rec.fieldConfig);
      localStorage.setItem('hpdc-orders',JSON.stringify(orders));localStorage.setItem('hpdc-periods',JSON.stringify(fcPeriods));
      localStorage.setItem('hpdc-cx',JSON.stringify(customExpenses));localStorage.setItem('hpdc-dov',JSON.stringify(dailyOverrides));
      localStorage.setItem('hpdc-dexp',JSON.stringify(dailyExpenses));localStorage.setItem('hpdc-fields',JSON.stringify(fieldConfig));
    }
    setSyncStatus('ok','synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));return true;
  }catch(e){setSyncStatus('err','sync failed');return false;}
}
async function createBin(){
  if(!syncConfig.apiKey){alert('Enter your API key first.');return;}
  setSyncStatus('busy','creating…');
  try{const r=await fetch('https://api.jsonbin.io/v3/b',{method:'POST',headers:{'Content-Type':'application/json','X-Master-Key':syncConfig.apiKey,'X-Bin-Name':'HPDC Tracker'},body:JSON.stringify(getPayload())});if(!r.ok)throw new Error(r.status);const j=await r.json();syncConfig.binId=j.metadata?.id||'';syncConfig.enabled=true;saveSyncConf();render();setSyncStatus('ok','created');alert('Bin created! ID: '+syncConfig.binId+'\nShare with your team.');}
  catch(e){setSyncStatus('err','failed: '+e.message);}
}
let syncPending=false;
function scheduleSync(){if(syncPending)return;syncPending=true;setTimeout(()=>{syncPending=false;syncToCloud();},1500);}
let syncTimer=null;
function startAutoPoll(){if(syncTimer)clearInterval(syncTimer);if(!syncConfig.enabled)return;syncTimer=setInterval(async()=>{if(!document.hidden){const c=await syncFromCloud();if(c)render();}},90000);}

function exportData(){const b=new Blob([JSON.stringify(getPayload(),null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='hpdc-'+new Date().toISOString().slice(0,10)+'.json';a.click();}

// ── Date helpers ───────────────────────────────────────────────────────────────
function pd(s){if(!s)return new Date(2000,0,1);const p=s.split('/').map(Number);return p.length===3?new Date(p[2],p[0]-1,p[1]):new Date(new Date().getFullYear(),p[0]-1,p[1]);}
function dateRanges(){
  const n=new Date(),y=n.getFullYear(),mo=n.getMonth(),da=n.getDate(),dow=n.getDay();
  const wkS=new Date(y,mo,da-(dow===0?6:dow-1));const wkE=new Date(wkS);wkE.setDate(wkS.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return{
    today: {start:new Date(y,mo,da),       end:new Date(y,mo,da,23,59,59),  label:'Today',      sub:n.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})},
    week:  {start:wkS,                      end:wkE,                         label:'This week',  sub:`${fmt(wkS)} – ${fmt(wkE)}`},
    month: {start:new Date(y,mo,1),         end:new Date(y,mo+1,0,23,59,59),label:'This month', sub:n.toLocaleDateString('en-US',{month:'long',year:'numeric'})},
    year:  {start:new Date(y,0,1),          end:new Date(y,11,31,23,59,59), label:'This year',  sub:String(y)},
  };
}

// ── Period lookups ─────────────────────────────────────────────────────────────
function getPeriod(dateStr){
  const d=pd(dateStr);
  const s=[...fcPeriods].filter(p=>pd(p.effectiveDate)<=d).sort((a,b)=>pd(b.effectiveDate)-pd(a.effectiveDate));
  return s[0]||[...fcPeriods].sort((a,b)=>pd(a.effectiveDate)-pd(b.effectiveDate))[0];
}
function currentPeriod(){return[...fcPeriods].sort((a,b)=>pd(b.effectiveDate)-pd(a.effectiveDate))[0];}

// ── Fixed cost rates (dynamic from period.items) ───────────────────────────────
function getItemDailyRate(item){
  const a=parseFloat(item.amount)||0;
  if(item.freq==='daily')  return a;
  if(item.freq==='weekly') return a/7;
  return a/30;
}
function getDayItemRate(date,key){
  const ov=dailyOverrides[date];
  if(ov&&key in ov&&ov[key]!==''&&ov[key]!==null)return parseFloat(ov[key])||0;
  const period=getPeriod(date);
  const item=period.items.find(x=>x.key===key);
  return item?getItemDailyRate(item):0;
}
function isItemOv(date,key){const ov=dailyOverrides[date];return!!(ov&&key in ov&&ov[key]!==''&&ov[key]!==null);}
function hasAnyOv(date){const ov=dailyOverrides[date];return!!(ov&&Object.keys(ov).length);}
function setDayItemRate(date,key,raw){
  if(!dailyOverrides[date])dailyOverrides[date]={};
  if(raw===''||raw===null)delete dailyOverrides[date][key];
  else dailyOverrides[date][key]=parseFloat(raw)||0;
  if(!Object.keys(dailyOverrides[date]).length)delete dailyOverrides[date];
  saveAll();refreshDayNums(date);
}
function resetDay(date){pushUndo();delete dailyOverrides[date];saveAll();render();}
function getDayBurn(date){
  const period=getPeriod(date);
  let t=period.items.reduce((s,item)=>s+getDayItemRate(date,item.key),0);
  getActiveCx(date).forEach(cx=>{t+=getCxRate(date,cx.id);});
  return t;
}

// ── Custom expenses per day ────────────────────────────────────────────────────
function getActiveCx(date){const d=pd(date);return customExpenses.filter(x=>{if(x.freq==='onetime')return false;const st=pd(x.startDate),en=x.endDate?pd(x.endDate):null;return st<=d&&(!en||en>=d);});}
function cxDefaultRate(cx){const a=parseFloat(cx.amount)||0;if(cx.freq==='daily')return a;if(cx.freq==='weekly')return a/7;return a/30;}
function getCxRate(date,cxId){const key=`cx_${cxId}`,ov=dailyOverrides[date];if(ov&&key in ov&&ov[key]!==''&&ov[key]!==null)return parseFloat(ov[key])||0;const cx=customExpenses.find(x=>x.id===cxId);return cx?cxDefaultRate(cx):0;}
function isCxOv(date,cxId){const key=`cx_${cxId}`,ov=dailyOverrides[date];return!!(ov&&key in ov&&ov[key]!==''&&ov[key]!==null);}
function setCxRate(date,cxId,raw){const key=`cx_${cxId}`;if(!dailyOverrides[date])dailyOverrides[date]={};if(raw===''||raw===null)delete dailyOverrides[date][key];else dailyOverrides[date][key]=parseFloat(raw)||0;if(!Object.keys(dailyOverrides[date]).length)delete dailyOverrides[date];saveAll();refreshDayNums(date);}

// ── Daily one-time expenses ────────────────────────────────────────────────────
let newExpDraft={description:'',amount:'',category:''};
function getDayExpenses(date){return dailyExpenses.filter(x=>x.date===date);}
function getDayExpTotal(date){return getDayExpenses(date).reduce((s,x)=>s+parseFloat(x.amount)||0,0);}
function openAddExp(date){addingExpDate=date;newExpDraft={description:'',amount:'',category:''};render();}
function cancelAddExp(){addingExpDate=null;render();}
function confirmAddExp(date){if(!newExpDraft.description){alert('Enter a description.');return;}if(!newExpDraft.amount){alert('Enter an amount.');return;}pushUndo();dailyExpenses.push({id:uid(),date,description:newExpDraft.description,amount:parseFloat(newExpDraft.amount),category:newExpDraft.category||''});saveAll();addingExpDate=null;render();}
function delDailyExp(id){pushUndo();dailyExpenses=dailyExpenses.filter(x=>x.id!==id);saveAll();render();}
function dexpField(f,v){newExpDraft[f]=v;}

// ── Field config ───────────────────────────────────────────────────────────────
function updateFieldLabel(id,label){pushUndo();const f=fieldConfig.find(x=>x.id===id);if(f){f.label=label;saveFields();}}
function toggleFieldActive(id,active){pushUndo();const f=fieldConfig.find(x=>x.id===id);if(f){f.active=active;saveFields();}}
function addCustomField(){pushUndo();fieldConfig.push({id:'cf_'+uid(),label:'New field',active:true,builtin:false});saveFields();render();}
function removeCustomField(id){pushUndo();fieldConfig=fieldConfig.filter(x=>x.id!==id);saveFields();render();}

// ── Order calculations ─────────────────────────────────────────────────────────
function vc(o){return fieldConfig.filter(f=>f.active).reduce((s,f)=>s+n(o[f.id]||0),0)+(o.returnUsed?n(o.returnCost):0);}
function gp(o){return n(o.revenue)-vc(o);}
function n(v) {return parseFloat(v)||0;}
function e(s) {return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const $$=(v,d=0)=>new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',minimumFractionDigits:d,maximumFractionDigits:d}).format(v);
const cc=v=>v>=0?'cg':'cr';
const pct=v=>v.toFixed(1)+'%';
function byDate(){const m={};orders.forEach(o=>{if(!m[o.date])m[o.date]=[];m[o.date].push(o);});return Object.entries(m).sort(([a],[b])=>pd(a)-pd(b));}
function totals(){
  const rev=orders.reduce((s,o)=>s+n(o.revenue),0),vc_=orders.reduce((s,o)=>s+vc(o),0);
  const dated=byDate();
  const fixed=dated.reduce((s,[d])=>s+getDayBurn(d),0)+customExpenses.filter(x=>x.freq==='onetime').reduce((s,x)=>s+n(x.amount),0);
  const expTotal=dailyExpenses.reduce((s,x)=>s+n(x.amount),0);
  const pending=orders.filter(o=>o.returnSent&&!o.returnUsed).reduce((s,o)=>s+n(o.returnCost),0);
  return{rev,vc_,fixed,expTotal,net:rev-vc_-fixed-expTotal,pending};
}
function ordersInRange(s,e){return orders.filter(o=>{const d=pd(o.date);return d>=s&&d<=e;});}
function expensesInRange(s,e){return dailyExpenses.filter(x=>{const d=pd(x.date);return d>=s&&d<=e;});}

// ── Summary helpers ────────────────────────────────────────────────────────────
function calcSummary(ro,re){
  const dates=[...new Set(ro.map(o=>o.date))];
  const rev=ro.reduce((s,o)=>s+n(o.revenue),0),vc_=ro.reduce((s,o)=>s+vc(o),0);
  const fixed=dates.reduce((s,d)=>s+getDayBurn(d),0);
  const expTotal=re.reduce((s,x)=>s+n(x.amount),0);
  const net=rev-vc_-fixed-expTotal,margin=rev>0?(net/rev)*100:0;
  const vb={};fieldConfig.filter(f=>f.active).forEach(f=>{vb[f.id]={label:f.label,total:ro.reduce((s,o)=>s+n(o[f.id]||0),0)};});
  if(ro.filter(o=>o.returnUsed).length)vb['retShip']={label:'Return shipping',total:ro.filter(o=>o.returnUsed).reduce((s,o)=>s+n(o.returnCost),0)};
  const fb={custom:{}};
  dates.forEach(d=>{
    const period=getPeriod(d);
    period.items.forEach(item=>{if(!fb[item.key])fb[item.key]={name:item.name,total:0};fb[item.key].total+=getDayItemRate(d,item.key);});
    getActiveCx(d).forEach(cx=>{if(!fb.custom[cx.id])fb.custom[cx.id]={name:cx.name,total:0};fb.custom[cx.id].total+=getCxRate(d,cx.id);});
  });
  let bestDay={date:'—',rev:0};dates.forEach(d=>{const dr=ro.filter(o=>o.date===d).reduce((s,o)=>s+n(o.revenue),0);if(dr>bestDay.rev)bestDay={date:d,rev:dr};});
  return{ro,dates,rev,vc_,fixed,expTotal,net,margin,avgOrder:ro.length?rev/ro.length:0,vb,fb,bestDay,orderCount:ro.length,dayCount:dates.length};
}

// ── Summary bar ────────────────────────────────────────────────────────────────
function updateSummary(){
  const t=totals(),b=getDayBurn(todayShort());
  const set=(id,txt,cls)=>{const el=document.getElementById(id);if(el){el.textContent=txt;if(cls)el.className='sum-val '+cls;}};
  set('sum-rev',$$(t.rev),'cg');set('sum-vc',$$(t.vc_),'cr');set('sum-fix',$$(t.fixed),'co');
  set('sum-exp',t.expTotal>0?$$(t.expTotal):'$0','ca');set('sum-net',$$(t.net),cc(t.net));set('sum-burn',$$(b,2),'cp');
}

// ── Partial day refresh ────────────────────────────────────────────────────────
function refreshDayNums(changedDate){
  const dated=byDate();let rnet=0;
  dated.forEach(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0);
    const dVc=dayOrders.reduce((s,o)=>s+vc(o),0);
    const dBurn=getDayBurn(date),dExpT=getDayExpTotal(date);
    const dNet=dRev-dVc-dBurn-dExpT;rnet+=dNet;
    const s=sid(date);
    const setEl=(id,t)=>{const el=document.getElementById(id);if(el)el.textContent=t;};
    const setCls=(id,t,c)=>{const el=document.getElementById(id);if(el){el.textContent=t;el.className=c;}};
    setEl(`dburn-${s}`,$$(dBurn,2));
    setEl(`dout-${s}`,'−'+$$(dVc+dBurn+dExpT,2));
    setCls(`dnet-${s}`,(dNet>=0?'+':'')+$$(dNet,2),'pill '+(dNet>=0?'pill-pos':'pill-neg'));
    setCls(`drun-${s}`,$$(rnet,2),'kpi-val '+cc(rnet));
    if(date===changedDate){
      const period=getPeriod(date);
      period.items.forEach(item=>{const el=document.getElementById(`fc-${s}-${item.key}`);if(el)el.classList.toggle('ov',isItemOv(date,item.key));});
      getActiveCx(date).forEach(cx=>{const el=document.getElementById(`fc-${s}-cx_${cx.id}`);if(el)el.classList.toggle('ov',isCxOv(date,cx.id));});
      const rst=document.getElementById(`dres-${s}`);if(rst)rst.style.display=hasAnyOv(date)?'':'none';
    }
  });
  updateSummary();
}

// ── DAILY LEDGER ───────────────────────────────────────────────────────────────
function dailyV(){
  const dated=byDate();
  if(!dated.length)return`<div class="empty"><h3>Nothing logged yet</h3><p>Add your first shipped order.</p><button class="btn-p" onclick="sv('entry')">Add first entry</button></div>`;

  let rnet=0;
  const dayData=dated.map(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0),dVc=dayOrders.reduce((s,o)=>s+vc(o),0);

}

        </div>
        <div class="cx-field"><label>Start date</label><input type="text" value="${x.startDate}" placeholder="MM/DD/YYYY" oninput="cxUp('${x.id}','startDate',this.value)"></div>
        <div class="cx-field"><label>End date (blank = active)</label><input type="text" value="${x.endDate||''}" placeholder="MM/DD/YYYY" oninput="cxUp('${x.id}','endDate',this.value||null)"></div>
        <div class="cx-field" style="align-self:flex-end"><label style="opacity:0">.</label><button class="btn-d" style="padding:7px 14px;font-size:13px;border-radius:var(--r)" onclick="delCx('${x.id}')">Remove</button></div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:4px">${isE?`Ended ${x.endDate}`:`Active from ${x.startDate}${x.endDate?' to '+x.endDate:''} — appears in fixed costs on the ledger`}</div>
    </div>`;
  }).join('');

  // Field config
  const fieldHtml=`<div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px">
    ${fieldConfig.map(f=>`<div class="fc-config-row">
      <input type="checkbox" ${f.active?'checked':''} onchange="toggleFieldActive('${f.id}',this.checked)" title="Toggle on/off">
      <span style="font-size:11px;color:var(--text3);width:52px;flex-shrink:0">${f.builtin?'built-in':'custom'}</span>
      <input class="fc-lbl-inp" type="text" value="${e(f.label)}" placeholder="Field name" oninput="updateFieldLabel('${f.id}',this.value)">
      ${!f.builtin?`<button class="btn-d" onclick="removeCustomField('${f.id}')">remove</button>`:'<span style="width:52px"></span>'}
    </div>`).join('')}
  </div>
  <button class="btn-g" onclick="addCustomField()">+ Add field</button>`;

  // Sync
  const syncHtml=`<div class="sync-box">
    <div style="font-size:13px;font-weight:500;margin-bottom:10px">JSONBin.io cloud sync</div>
    <div class="info-box" style="margin-bottom:12px">Create a free account at <a href="https://jsonbin.io" target="_blank">jsonbin.io</a> → copy your API key → paste it below → click "Create new bin". Share the Bin ID with your team. Data syncs on every save and every 90 seconds.</div>
    <div style="margin-bottom:10px"><div style="font-size:12px;color:var(--text2);margin-bottom:4px">API key (never sent to cloud)</div><input type="password" class="sync-inp" value="${syncConfig.apiKey}" placeholder="$2b$10$..." oninput="syncConfig.apiKey=this.value"></div>
    <div style="margin-bottom:10px"><div style="font-size:12px;color:var(--text2);margin-bottom:4px">Bin ID</div><input type="text" class="sync-inp" value="${syncConfig.binId}" placeholder="paste from jsonbin.io" oninput="syncConfig.binId=this.value;syncConfig.enabled=!!this.value;saveSyncConf();"></div>
    <div class="fc" style="gap:8px;flex-wrap:wrap">
      <button class="btn-p" style="font-size:13px;padding:8px 16px" onclick="createBin()">Create new bin</button>
      <button class="btn-g" style="font-size:13px;padding:8px 16px" onclick="syncToCloud()">Push now</button>
      <button class="btn-g" style="font-size:13px;padding:8px 16px" onclick="syncFromCloud().then(c=>{if(c)render();})">Pull now</button>
    </div>
    ${syncConfig.enabled?`<div style="font-size:12px;color:var(--green);margin-top:8px">✓ Sync enabled — bin: ${syncConfig.binId}</div>`:'<div style="font-size:12px;color:var(--text3);margin-top:8px">Not configured yet.</div>'}
  </div>
  <div class="fc" style="gap:10px;flex-wrap:wrap;margin-top:8px">
    <button class="btn-g" onclick="exportData()">Export JSON backup</button>
    <button class="btn-g" onclick="importData()">Import JSON backup</button>
    <button class="btn-d" style="padding:8px 16px;border-radius:var(--r);font-size:13px" onclick="clearAllData()">Clear all entries</button>
  </div>
  <p style="font-size:12px;color:var(--text3);margin-top:6px">Clear all entries removes every order, one-time expense, and daily override — but keeps your rate periods, field config, and settings. Use ↩ Undo right after if you clear by mistake.</p>`;

  return`<div style="max-width:640px">
    <div class="ss">
      <div class="ss-title">Fixed cost rates</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Each period is a snapshot of your rates with an effective date. Rename any item, change amounts, add new line items, or remove ones you no longer have. Only entries on or after the effective date use these new rates — past data stays untouched.</p>
      <div class="period-editor">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px">New rate period</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Edit the items below — rename anything, change amounts, add or remove lines</div>
        <div class="period-editor-items">${piRows}</div>
        <button class="btn-s" style="margin-bottom:14px" onclick="addPI()">+ Add line item</button>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
          <span style="font-size:13px;color:var(--text2)">Daily burn with these rates: <strong class="cp" id="pd-burn">${$$(draftBurn,2)}/day</strong></span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">Effective from (required)</div>
            <input type="text" id="pd-date" value="${np.effectiveDate||today()}" placeholder="MM/DD/YYYY" oninput="newPeriodDraft.effectiveDate=this.value" style="border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:130px;">
          </div>
          <div><div style="font-size:12px;color:var(--text2);margin-bottom:4px">Note (optional)</div>
            <input type="text" id="pd-note" value="${e(np.note||'')}" placeholder="e.g. switched to mortgage" oninput="newPeriodDraft.note=this.value" style="border:1px solid var(--border2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);width:220px;">
          </div>
          <div style="align-self:flex-end"><button class="btn-p" style="padding:8px 18px;font-size:13px" onclick="savePeriod()">Save new rate period</button></div>
        </div>
      </div>
    </div>
    <div class="ss"><div class="ss-title">Rate history</div>${periodHistory}</div>
    <div class="ss">
      <div class="ss-title">Custom expenses</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Extra costs not in the core rates above. These appear as editable fields in the fixed cost row on every day they're active.</p>
      ${cxHtml||`<p style="font-size:13px;color:var(--text3);margin-bottom:12px">None added yet.</p>`}
      <div id="ncx-area">${newCxDraft?buildCxForm():''}</div>
      ${!newCxDraft?`<button class="btn-g" onclick="startCx()">+ Add custom expense</button>`:''}
    </div>
    <div class="ss"><div class="ss-title">Entry fields</div><p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Rename, toggle, or add cost fields to the order entry form.</p>${fieldHtml}</div>
    <div class="ss"><div class="ss-title">Cloud sync & sharing</div>${syncHtml}</div>
    <div class="ss"><div class="ss-title">Fixed cost audit</div><p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">Charges accrued against your logged entries, by period.</p>${buildAudit(dated,sortedP)}</div>
  </div>`;
}

// Period draft helpers (no re-render for typing)
function updPI(key,field,val){
  const item=newPeriodDraft?.items.find(x=>x.key===key);if(!item)return;
  item[field]=field==='amount'?parseFloat(val)||0:val;
  const rateEl=document.getElementById(`pi-rate-${key}`);if(rateEl)rateEl.textContent=`${$$(getItemDailyRate(item),2)}/day`;
  const burnEl=document.getElementById('pd-burn');if(burnEl){const b=newPeriodDraft.items.reduce((s,x)=>s+getItemDailyRate(x),0);burnEl.textContent=`${$$(b,2)}/day`;}
}
function addPI(){newPeriodDraft.items.push({key:'fc_'+uid(),name:'New item',amount:0,freq:'monthly'});render();}
function removePI(key){if(newPeriodDraft.items.length<=1){alert("A period must have at least one item.");return;}newPeriodDraft.items=newPeriodDraft.items.filter(x=>x.key!==key);render();}
function savePeriod(){
  if(!newPeriodDraft?.effectiveDate){alert('Enter an effective date.');return;}
  pushUndo();
  fcPeriods.push({id:uid(),effectiveDate:newPeriodDraft.effectiveDate,note:newPeriodDraft.note||'',items:newPeriodDraft.items.map(x=>({...x}))});
  savePeriods();initNewPeriod();sv('settings');
}
function delPeriod(id){if(fcPeriods.length<=1){return;}pushUndo();fcPeriods=fcPeriods.filter(p=>p.id!==id);savePeriods();render();}

function cxUp(id,field,val){const x=customExpenses.find(c=>c.id===id);if(!x)return;if(field==='endDate')x.endDate=val||null;else x[field]=val;saveCx();}
function startCx(){newCxDraft={name:'',amount:'',freq:'monthly',startDate:today()};render();}
function buildCxForm(){const d=newCxDraft||{};return`<div style="background:var(--bg2);border-radius:var(--rl);padding:16px;margin-bottom:12px"><div style="font-size:13px;font-weight:600;margin-bottom:12px">New expense</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px"><div class="fg"><label>Name</label><input type="text" value="${e(d.name||'')}" placeholder="e.g. Line of credit" oninput="newCxDraft.name=this.value"></div><div class="fg"><label>Amount ($)</label><input type="number" value="${d.amount||''}" placeholder="500" oninput="newCxDraft.amount=this.value"></div><div class="fg"><label>Frequency</label><select onchange="newCxDraft.freq=this.value"><option value="daily" ${d.freq==='daily'?'selected':''}>/day</option><option value="weekly" ${d.freq==='weekly'?'selected':''}>/week</option><option value="monthly" ${d.freq==='monthly'?'selected':''}>/month</option><option value="onetime" ${d.freq==='onetime'?'selected':''}>one-time</option></select></div><div class="fg"><label>Start date</label><input type="text" value="${d.startDate||today()}" placeholder="MM/DD/YYYY" oninput="newCxDraft.startDate=this.value"></div></div><div class="fc" style="gap:8px"><button class="btn-p" style="padding:8px 18px;font-size:13px" onclick="saveCxDraft()">Add</button><button class="btn-g" onclick="newCxDraft=null;render()">Cancel</button></div></div>`;}
function saveCxDraft(){if(!newCxDraft?.name){alert('Enter a name.');return;}if(!newCxDraft.amount){alert('Enter an amount.');return;}pushUndo();customExpenses.push({id:uid(),name:newCxDraft.name,amount:newCxDraft.amount,freq:newCxDraft.freq,startDate:newCxDraft.startDate||today(),endDate:null});saveCx();newCxDraft=null;sv('settings');}
function delCx(id){pushUndo();customExpenses=customExpenses.filter(x=>x.id!==id);saveCx();render();}

function buildAudit(dated,sortedP){
  if(!dated.length)return`<p style="font-size:13px;color:var(--text3)">No entries yet.</p>`;
  const pDays={};dated.forEach(([d])=>{const p=getPeriod(d);if(!pDays[p.id])pDays[p.id]={p,days:[]};pDays[p.id].days.push(d);});
  let grand=0,html=`<div class="audit-box">`;
  sortedP.forEach(p=>{if(!pDays[p.id])return;const{days}=pDays[p.id];const burn=p.items.reduce((s,x)=>s+getItemDailyRate(x),0);const pt=burn*days.length;grand+=pt;html+=`<div class="a-phdr">Period ${p.effectiveDate}${p.note?' — '+e(p.note):''} (${days.length} days)</div>`;p.items.forEach(x=>{const d=getItemDailyRate(x);html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:12px">${$$(d,2)}/day × ${days.length}</span><span class="co">${$$(d*days.length,2)}</span></div>`;});html+=`<div class="a-row" style="font-weight:600"><span>Period subtotal</span><span></span><span class="co">${$$(pt,2)}</span></div>`;});
  const actCx=customExpenses.filter(x=>x.freq!=='onetime');if(actCx.length){html+=`<div class="a-phdr">Custom expenses</div>`;actCx.forEach(x=>{const da=dated.filter(([d])=>{const dt=pd(d),st=pd(x.startDate),en=x.endDate?pd(x.endDate):null;return st<=dt&&(!en||en>=dt);}).length;if(!da)return;const dly=x.freq==='daily'?n(x.amount):x.freq==='weekly'?n(x.amount)/7:n(x.amount)/30;const amt=dly*da;grand+=amt;html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:12px">${$$(dly,2)}/day × ${da}</span><span class="co">${$$(amt,2)}</span></div>`;});}
  const ot=customExpenses.filter(x=>x.freq==='onetime');ot.forEach(x=>{grand+=n(x.amount);html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:12px">one-time</span><span class="co">${$$(n(x.amount),2)}</span></div>`;});
  const totalExp=dailyExpenses.reduce((s,x)=>s+n(x.amount),0);if(totalExp){grand+=totalExp;html+=`<div class="a-row" style="font-weight:600"><span>One-time daily expenses</span><span></span><span class="ca">${$$(totalExp,2)}</span></div>`;}
  html+=`<div class="a-total"><span>Total accrued</span><span class="co">${$$(grand,2)}</span></div></div>`;
  return html;
}

// ── Order actions ──────────────────────────────────────────────────────────────
function submitEntry(){if(!f.revenue){alert('Revenue is required.');return;}pushUndo();if(editId){orders=orders.map(o=>o.id===editId?{...f,id:editId}:o);editId=null;}else orders.push({...f,id:uid()});saveAll();f=fresh();sv('daily');}
function cancelEntry(){editId=null;f=fresh();sv('daily');}
function editOrd(id){const o=orders.find(x=>x.id===id);if(o){f={...o};editId=id;sv('entry');}}
function clearAllData(){pushUndo();orders=[];dailyExpenses=[];dailyOverrides={};saveAll();render();}
function delOrd(id){pushUndo();orders=orders.filter(o=>o.id!==id);saveAll();render();}

// ── Boot ───────────────────────────────────────────────────────────────────────
loadData();
if(syncConfig.enabled&&syncConfig.apiKey&&syncConfig.binId){syncFromCloud().then(c=>{if(c)render();startAutoPoll();});}
else{render();}
</script>
</body>
</html>
