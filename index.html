function buildTechDetail(techName,allOrds,qty,getLast,hTab){
  const techOrds=allOrds.filter(o=>(o.technician||'').trim()===techName);
  if(!techOrds.length)return '<div style="padding:12px 14px;color:var(--text3);font-size:12px">No orders yet.</div>';
  const now=new Date();
  const startOfWeek=new Date(now);startOfWeek.setDate(now.getDate()-now.getDay());startOfWeek.setHours(0,0,0,0);
  const startOfMonth=new Date(now.getFullYear(),now.getMonth(),1);
  const startOfYear=new Date(now.getFullYear(),0,1);
  function inR(o,from){const d=pd(o.date);return d>=from&&d<=now;}
  const tw=techOrds.filter(o=>inR(o,startOfWeek)).reduce((s,o)=>s+qty(o),0);
  const tm=techOrds.filter(o=>inR(o,startOfMonth)).reduce((s,o)=>s+qty(o),0);
  const ty=techOrds.filter(o=>inR(o,startOfYear)).reduce((s,o)=>s+qty(o),0);
  const ta=techOrds.reduce((s,o)=>s+qty(o),0);
  const periods=getLast(hTab==='year'?5:12,hTab);
  const maxH=Math.max(...periods.map(p=>techOrds.filter(o=>{const d=pd(o.date);return d>=p.start&&d<=p.end;}).reduce((s,o)=>s+qty(o),0)),1);
  let html='<div style="background:rgba(0,0,0,.2);border-top:1px solid var(--border);padding:12px 14px">';
  html+='<div style="font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">'+e(techName)+' — Individual history</div>';
  html+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">';
  [['Week',tw],['Month',tm],['Year',ty],['All time',ta]].forEach(([l,v])=>{
    html+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;flex:1;min-width:80px"><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">'+l+'</div><div style="font-size:20px;font-weight:800;font-family:var(--fh)">'+v+'</div></div>';
  });
  html+='</div>';
  html+='<div style="margin-bottom:12px"><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:6px">Output per period</div>';
  periods.forEach((p,i)=>{
    const heads=techOrds.filter(o=>{const d=pd(o.date);return d>=p.start&&d<=p.end;}).reduce((s,o)=>s+qty(o),0);
    const pct=Math.round(heads/maxH*100);
    html+='<div style="display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:3px">'
      +'<span style="width:68px;flex-shrink:0;font-weight:'+(i===0?'700':'400')+';color:'+(i===0?'var(--text)':'var(--text2)')+'">'+p.label+'</span>'
      +'<div style="flex:1;height:14px;background:var(--bg4);border-radius:3px;overflow:hidden"><div style="height:100%;background:'+(i===0?'var(--red)':'#555')+';border-radius:3px;width:'+pct+'%;min-width:'+(heads>0?3:0)+'px"></div></div>'
      +'<span style="width:28px;text-align:right;font-weight:700;color:'+(i===0?'var(--red)':'var(--text)')+'">'+heads+'</span>'
      +'</div>';
  });
  html+='</div>';
  const recent=techOrds.sort((a,b)=>pd(b.date)-pd(a.date)).slice(0,10);
  html+='<div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:6px">Recent orders</div>';
  html+='<div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden">';
  recent.forEach((o,i)=>{
    html+='<div style="display:flex;align-items:center;gap:8px;padding:5px 10px;border-bottom:1px solid var(--border);font-size:11px;'+(i%2?'background:rgba(255,255,255,.02)':'')+'">'

function summaryV(){
  if(!orders.length)return`<div class="empty"><h3>No data yet</h3></div>`;
  const ranges=dateRanges();
  // break even
  const b=getDayBurn(todayShort());
  const avgVC=orders.length?orders.reduce((s,o)=>s+vc(o),0)/orders.length:0;
  const avgRev=orders.length?orders.reduce((s,o)=>s+n(o.revenue),0)/orders.length:0;
  const avgGP=avgRev-avgVC;
  const ordersNeeded=avgGP>0?Math.ceil(b/avgGP):'∞';
  const revNeeded=avgGP>0?b/(avgGP/avgRev)*100:0;
  const beHtml=`<div class="breakeven-box">
    <div class="be-title">Break-even today (based on averages)</div>
    <div class="be-grid">
      <div class="be-metric"><div class="be-lbl">Daily burn</div><div class="be-val co">${$$(b,2)}</div></div>
      <div class="be-metric"><div class="be-lbl">Orders needed</div><div class="be-val cp">${ordersNeeded}</div></div>
      <div class="be-metric"><div class="be-lbl">Revenue needed</div><div class="be-val cg">${revNeeded>0?$$(b/(avgGP/avgRev)):'—'}</div></div>
    </div>
  </div>`;
  // ── History toggle ──────────────────────────────────────────────────────────
  const histTab=summaryHistTab||'none';
  function getLast(cnt,unit){
    const result=[];
    const allDates=orders.map(o=>pd(o.date)).filter(Boolean);
    const bizStart=allDates.length?new Date(Math.min(...allDates.map(d=>d.getTime()))):new Date();
    bizStart.setHours(0,0,0,0);
    const nowD=new Date();nowD.setHours(23,59,59);
    for(let i=0;i<cnt;i++){
      let start,end,label;
      if(unit==='week'){
        const base=new Date(nowD);base.setDate(nowD.getDate()-nowD.getDay()-(i*7));
        start=new Date(base);start.setDate(base.getDate()-base.getDay());start.setHours(0,0,0,0);
        end=new Date(start);end.setDate(start.getDate()+6);end.setHours(23,59,59);
        label='Wk '+(start.getMonth()+1)+'/'+start.getDate();
      } else if(unit==='month'){
        const d=new Date(nowD.getFullYear(),nowD.getMonth()-i,1);
        start=new Date(d.getFullYear(),d.getMonth(),1);
        end=new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);
        const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        label=mn[d.getMonth()]+' '+d.getFullYear();
      } else {
        const yr=nowD.getFullYear()-i;
        start=new Date(yr,0,1);end=new Date(yr,11,31,23,59,59);
        label=String(yr);
      }
      if(end<bizStart)continue;
      const effStart=start<bizStart?new Date(bizStart):new Date(start);
      const effEnd=end>nowD?new Date(nowD):new Date(end);
      const ro=ordersInRange(start,end),re=expensesInRange(start,end);
      const rev=ro.reduce((s,o)=>s+n(o.revenue),0);
      const varC=ro.reduce((s,o)=>s+vc(o),0);
      let fixC=0;const cur=new Date(effStart);cur.setHours(0,0,0,0);
      while(cur<=effEnd){const ds=(cur.getMonth()+1)+'/'+cur.getDate()+'/'+cur.getFullYear();fixC+=getDayBurn(ds);cur.setDate(cur.getDate()+1);}
      const expC=re.reduce((s,x)=>s+n(x.amount),0);
      const net=rev-varC-fixC-expC;
      result.push({label,rev,varC,fixC,net,orders:ro.length});
    }
    return result;
  }
  function hBtn(lbl,tab){
    const on=histTab===tab;
    return '<button data-tab="'+tab+'" onclick="setSumHistTab(this.dataset.tab)" style="padding:5px 14px;font-size:12px;font-weight:600;border-radius:var(--r);border:1px solid '+(on?'var(--red)':'var(--border2)')+';background:'+(on?'rgba(204,0,0,.15)':'transparent')+';color:'+(on?'var(--red)':'var(--text2)')+';cursor:pointer;font-family:var(--fh);text-transform:uppercase;letter-spacing:.4px">'+lbl+'</button>';
  }
  function hTable(periods){
    const maxRev=Math.max(...periods.map(p=>p.rev),1);
    return '<div style="border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-top:10px">'
      +'<div style="display:grid;grid-template-columns:90px 1fr 90px 90px 90px 70px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--border);gap:4px">'
      +'<span>Period</span><span>Revenue bar</span><span style="text-align:right">Revenue</span><span style="text-align:right">Var costs</span><span style="text-align:right">Net</span><span style="text-align:right">Orders</span></div>'
      +periods.map(p=>'<div style="display:grid;grid-template-columns:90px 1fr 90px 90px 90px 70px;padding:7px 14px;border-bottom:1px solid var(--border);align-items:center;gap:4px;font-size:12px">'
        +'<span style="font-weight:600;font-size:11px">'+p.label+'</span>'
        +'<div style="height:6px;background:var(--bg4);border-radius:3px"><div style="height:100%;background:'+(p.net>=0?'var(--green)':'#f87171')+';border-radius:3px;width:'+Math.round(p.rev/maxRev*100)+'%;min-width:'+(p.rev>0?2:0)+'px"></div></div>'
        +'<span style="text-align:right;font-weight:600;color:var(--green)">'+(p.rev>0?$$(p.rev,0):'—')+'</span>'
        +'<span style="text-align:right;color:#f87171">'+(p.varC>0?'−'+$$(p.varC,0):'—')+'</span>'
        +'<span style="text-align:right;font-weight:700;color:'+(p.net>=0?'var(--green)':'#f87171')+'">'+(p.rev>0?(p.net>=0?'+':'')+$$(p.net,0):'—')+'</span>'
        +'<span style="text-align:right;color:var(--text3)">'+p.orders+'</span>'
        +'</div>').join('')
      +'</div>';
  }
  let histHtml='';
  if(histTab==='week')histHtml=hTable(getLast(12,'week'));
  else if(histTab==='month')histHtml=hTable(getLast(12,'month'));
  else if(histTab==='year')histHtml=hTable(getLast(5,'year'));
  const histSection=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:14px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:${histTab!=='none'?'10':'0'}px">
      <span style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-right:4px">History:</span>
      ${hBtn('Weekly','week')}${hBtn('Monthly','month')}${hBtn('Annually','year')}
      ${histTab!=='none'?'<button data-tab="none" onclick="setSumHistTab(this.dataset.tab)" style="padding:5px 10px;font-size:11px;background:transparent;border:1px solid var(--border);border-radius:var(--r);color:var(--text3);cursor:pointer">✕</button>':''}
    </div>
    ${histHtml}
  </div>`;
  return beHtml+histSection+`<div class="sum-cards">${['today','week','month','year'].map(k=>{const r=ranges[k];return buildSumCard(r,ordersInRange(r.start,r.end),expensesInRange(r.start,r.end),r.start,r.end);}).join('')}</div>`;
}

let chartInstances={};
function buildSumCard(range,ro,re){
  const head=`<div class="sum-card-head"><span class="sum-card-title">${range.label}</span><span class="sum-card-sub">${range.sub}</span></div>`;

  const vbRows=Object.values(sm.vb).filter(x=>x.total>0).map(x=>`<div class="bk-row"><span class="bk-lbl">${e(x.label)}</span><span class="bk-val">${$$(x.total,2)}</span></div>`).join('');
  const fbRows=Object.entries(sm.fb).filter(([k])=>k!=='custom').filter(([,x])=>x.total>0).map(([,x])=>`<div class="bk-row"><span class="bk-lbl">${e(x.name)}</span><span class="bk-val">${$$(x.total,2)}</span></div>`).join('')+Object.values(sm.fb.custom).filter(x=>x.total>0).map(x=>`<div class="bk-row"><span class="bk-lbl">${e(x.name)}</span><span class="bk-val">${$$(x.total,2)}</span></div>`).join('');
  const topProdRows=sm.topProds.map((p,i)=>`<div class="bk-row"><span class="bk-lbl">${i+1}. ${e(p.desc.substring(0,28))}</span><span class="bk-val cg">${$$(p.rev,2)}</span></div>`).join('');
  const expRows=re.length?re.map(x=>`<div class="bk-row"><span class="bk-lbl">${e(x.description)}</span><span class="bk-val">${$$(n(x.amount),2)}</span></div>`).join(''):'';
  const chartId='chart-'+range.label.replace(/\s/g,'');
  // Build chart data from dated orders in range
  const dateDates=[...new Set(ro.map(o=>o.date))].sort((a,b)=>pd(a)-pd(b));
  const chartRevData=dateDates.map(d=>ro.filter(o=>o.date===d).reduce((s,o)=>s+n(o.revenue),0));
  const chartNetData=dateDates.map(d=>{const dRev=ro.filter(o=>o.date===d).reduce((s,o)=>s+n(o.revenue),0);const dVc=ro.filter(o=>o.date===d).reduce((s,o)=>s+vc(o),0);return dRev-dVc-getDayBurn(d)-getDayExpTotal(d);});
  setTimeout(()=>{
    const canvas=document.getElementById(chartId);if(!canvas)return;
    if(chartInstances[chartId])chartInstances[chartId].destroy();
    chartInstances[chartId]=new Chart(canvas,{type:'bar',data:{labels:dateDates,datasets:[{label:'Revenue',data:chartRevData,backgroundColor:'rgba(34,197,94,.5)',borderColor:'#22c55e',borderWidth:1},{label:'Net',data:chartNetData,backgroundColor:chartNetData.map(v=>v>=0?'rgba(34,197,94,.3)':'rgba(204,0,0,.3)'),borderColor:chartNetData.map(v=>v>=0?'#22c55e':'#CC0000'),borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#b0b0b0',font:{size:11}}}},scales:{x:{ticks:{color:'#666',font:{size:10}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#666',font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:'rgba(255,255,255,.05)'}}}}});
  },50);
  return`<div class="sum-card">
    ${head}
    <div class="sum-card-body">
      <div class="sum-grid">
        ${sm_m('Revenue',$$(sm.rev),'cg',sm.orderCount+' orders')}
        ${sm_m('Variable costs',$$(sm.vc_),'cr',pct(r?sm.vc_/r*100:0)+' of rev')}
        ${sm_m('Fixed costs',$$(sm.fixed),'co',sm.dayCount+' day'+(sm.dayCount!==1?'s':''))}
        ${sm_m('Net profit',$$(sm.net),cc(sm.net),pct(Math.abs(sm.margin))+' margin')}
      </div>
      <div class="chart-wrap"><canvas id="${chartId}"></canvas></div>
      ${bar('Revenue',sm.rev,'#22c55e',100)}
      ${bar('Variable costs',sm.vc_,'#f87171',r?sm.vc_/r*100:0)}
      ${bar('Fixed costs',sm.fixed,'#f97316',r?sm.fixed/r*100:0)}
      ${sm.expTotal>0?bar('One-time exp',sm.expTotal,'#eab308',r?sm.expTotal/r*100:0):''}
      ${bar(sm.net>=0?'Net profit':'Net loss',Math.abs(sm.net),sm.net>=0?'#22c55e':'#CC0000',r?Math.abs(sm.net)/r*100:0)}
      <div class="sum-stats">
        <div>Avg order <strong>${$$(sm.avgOrder,2)}</strong></div>
        <div>Best day <strong>${sm.bestDay.date} (${$$(sm.bestDay.rev,2)})</strong></div>
        <div>Margin <strong>${pct(sm.margin)}</strong></div>

    </div>
  </div>`;
}

// ── LABELS ────────────────────────────────────────────────────────────────────
function daysAged(dateStr){
  const filed=pd(dateStr);
  const today=new Date();today.setHours(0,0,0,0);
  return Math.floor((today-filed)/(1000*60*60*24));
}

function labelsV(){
  const inTransitTNs=new Set((incomingData?.incoming||[]).map(r=>r.tn?.trim()).filter(Boolean));
  const arrivedTNs=new Set((incomingData?.arrived||[]).map(r=>r.tn?.trim()).filter(Boolean));
  let scanAge=null;
  if(incomingData?.computedAt){try{const m=Math.round((Date.now()-new Date(incomingData.computedAt))/60000);scanAge=m<2?'just now':m<60?m+'m ago':Math.round(m/60)+'h ago';}catch(ex){scanAge=incomingData.computedAt;}}

  const withLabels=orders.filter(o=>o.returnSent&&!o.warrantyVoided);
  const overdue=[],inTransit=[],inWindow=[],returned=[],arrived=[];
  withLabels.forEach(o=>{
    if(isOrderReturned(o)){returned.push(o);return;}
    const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
    if(tNums.length&&tNums.some(t=>arrivedTNs.has(t))){arrived.push(o);return;}
    if(tNums.length&&tNums.some(t=>inTransitTNs.has(t))){inTransit.push(o);return;}
    daysAged(o.date)>coreReturnDays?overdue.push(o):inWindow.push(o);
  });
  const voided=orders.filter(o=>o.warrantyVoided);
  overdue.sort((a,b)=>daysAged(b.date)-daysAged(a.date));

  if(!withLabels.length&&!voided.length)return`<div class="empty"><h3>No cores tracked yet</h3><p>Add a return label to an order to start tracking.</p></div>`;

  const coreValueAtRisk=overdue.reduce((s,o)=>s+n(o.coreValue),0);

  let html=`<div style="display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 16px;margin-bottom:14px">
    <div>
      <div style="font-size:13px;font-weight:600;color:var(--text)">Scan return labels to check UPS status</div>
      <div style="font-size:11px;color:var(--text3);margin-top:2px">${scanAge?'Last scan: '+scanAge+' · Delivered cores auto-checked in':'No scan data yet — hit Scan to check UPS'}</div>
    </div>
    <button id="scan-btn" onclick="scanAllReturns(this)" style="background:var(--red);border:none;color:#fff;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;cursor:pointer">🔄 Scan All Returns</button>
  </div>`;

  if(arrived.length){
    html+=`<div style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.3);border-radius:var(--rl);padding:12px 16px;margin-bottom:14px">
      <div style="font-weight:700;color:var(--green);margin-bottom:6px">✅ ${arrived.length} core${arrived.length>1?'s':''} delivered — checking in…</div>
      ${arrived.map(o=>`<div style="font-size:12px;color:var(--text2);padding:2px 0">Order #${e(o.orderNum)} · ${e(o.description)}</div>`).join('')}
    </div>`;
  }

  if(overdue.length){
    html+=`<div style="font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">⚠ Overdue — ${overdue.length} core${overdue.length>1?'s':''} past ${coreReturnDays} days${coreValueAtRisk>0?' · '+$$(coreValueAtRisk,2)+' at risk':''}</div>`;
    html+=overdue.map(o=>coreCard(o,'overdue',inTransitTNs)).join('');
  }

  if(inTransit.length){
    html+=`<div style="font-size:10px;font-weight:700;color:#60a5fa;text-transform:uppercase;letter-spacing:.7px;margin:${overdue.length?'16px':0} 0 8px">📦 In Transit — ${inTransit.length} core${inTransit.length>1?'s':''} on the way back</div>`;
    html+=inTransit.map(o=>coreCard(o,'in_transit',inTransitTNs)).join('');
  }

  if(inWindow.length){
    html+=`<div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:${overdue.length||inTransit.length?'16px':0} 0 8px">⏳ Pending — ${inWindow.length} within ${coreReturnDays}-day window</div>`;
    html+=inWindow.map(o=>coreCard(o,'in_window',inTransitTNs)).join('');
  }

  if(returned.length){
    const showR=expandedCores.has('__returned__');
    html+=`<hr style="border:none;border-top:1px solid var(--border);margin:16px 0"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${showR?'8px':'0'}"><div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.7px">✓ Returned — ${returned.length} core${returned.length>1?'s':''}</div><button class="btn-s" onclick="event.stopPropagation();toggleCoreExpand('__returned__')" style="font-size:11px">${showR?'▲ Hide':'▼ Show'}</button></div>`;
    if(showR)html+=returned.sort((a,b)=>pd(b.date)-pd(a.date)).map(o=>coreCard(o,'returned',inTransitTNs)).join('');
  }

  if(voided.length){
    html+=`<div style="margin-top:16px"><div style="font-size:10px;font-weight:700;color:#f87171;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px">⚠ Warranty Voided (${voided.length})</div>${voided.map(o=>`<div style="background:var(--bg2);border:1px solid rgba(204,0,0,.3);border-radius:var(--rl);padding:12px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">Order #${e(o.orderNum)}</div><div style="font-size:12px;color:var(--text3)">${o.date} · ${e(o.description)}</div></div><button class="btn-s" style="font-size:10px" data-oid="${o.id}" onclick="(function(id){pushUndo();const x=orders.find(o=>o.id===id);x.warrantyVoided=false;x.returnUsed=false;x.returnedNums=[];saveAll();render();})(this.dataset.oid)">undo write-off</button></div>`).join('')}</div>`;
  }

  return html;
}

function coreCard(o,status,inTransitTNs){
  const oid=o.id;
  const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
  const rn=o.returnedNums||[];
  const remLog=o.reminderLog||[];
  const dAge=daysAged(o.date);
  const isReturned=status==='returned';
  const border=isReturned?'rgba(34,197,94,.2)':status==='overdue'?'rgba(248,113,113,.3)':status==='in_transit'?'rgba(59,130,246,.2)':'var(--border)';

  const badge=isReturned
    ?`<span style="font-size:10px;font-weight:700;background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3);border-radius:4px;padding:2px 8px">RETURNED</span>`
    :status==='overdue'
    ?`<span style="font-size:10px;font-weight:700;background:rgba(248,113,113,.12);color:#f87171;border:1px solid rgba(248,113,113,.3);border-radius:4px;padding:2px 8px">${dAge-coreReturnDays}d OVERDUE</span>`
    :status==='in_transit'
    ?`<span style="font-size:10px;font-weight:700;background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.3);border-radius:4px;padding:2px 8px">IN TRANSIT</span>`
    :`<span style="font-size:10px;font-weight:700;background:var(--bg3);color:var(--text3);border:1px solid var(--border2);border-radius:4px;padding:2px 8px">${coreReturnDays-dAge}d left</span>`;

  // Per-TN tracking status from live GAS check
  let anyLabelNotUsed=false, anyInTransit=false;
  let trackSection='';
  if(tNums.length){
    const rows=tNums.map(t=>{
      const isRet=rn.includes(t);
      if(isRet){
        return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05)">`
          +`<span style="font-family:monospace;font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(t)}</span>`
          +`<input type="checkbox" checked data-oid="${oid}" data-trk="${e(t)}" onclick="event.stopPropagation()" onchange="handleTrackChk(this)" style="accent-color:var(--green);width:14px;height:14px;cursor:pointer;flex-shrink:0">`
          +`<span style="font-size:11px;font-weight:600;color:var(--green);flex-shrink:0">✓ returned</span>`
          +`</div>`;
      }
      const cached=trackingCache.get(t);
      let statusHtml='', checkBtn='';
      if(cached?.loading){
        statusHtml=`<span style="font-size:11px;color:var(--text3)">⏳ Checking…</span>`;
      } else if(cached?.ok===false){
        statusHtml=`<span style="font-size:11px;color:#f87171">Error — try again</span>`;
        checkBtn=`<button data-tn="${e(t)}" onclick="event.stopPropagation();checkTrackingNum(this.dataset.tn,this)" style="font-size:11px;background:transparent;border:1px solid var(--border2);border-radius:4px;padding:2px 8px;cursor:pointer;color:var(--text3);flex-shrink:0">Retry</button>`;
      } else if(cached){
        const typ=cached.type||'';
        if(typ==='M'){anyLabelNotUsed=true;statusHtml=`<span style="font-size:11px;font-weight:600;color:var(--amber)">Label created — not yet used</span>`;}
        else if(typ==='I'||typ==='P'){anyInTransit=true;statusHtml=`<span style="font-size:11px;font-weight:600;color:#60a5fa">📦 In transit${cached.eta?' — ETA '+cached.eta:''}</span>`;}
        else if(typ==='D'){statusHtml=`<span style="font-size:11px;font-weight:600;color:var(--green)">✅ Delivered — mark returned below</span>`;}
        else{statusHtml=`<span style="font-size:11px;color:var(--text3)">${e(cached.desc||'Unknown status')}</span>`;}
        checkBtn=`<button data-tn="${e(t)}" onclick="event.stopPropagation();checkTrackingNum(this.dataset.tn,this)" style="font-size:11px;background:transparent;border:1px solid rgba(59,130,246,.25);border-radius:4px;padding:2px 7px;cursor:pointer;color:var(--text3);flex-shrink:0">Recheck</button>`;
      } else {
        // from batch scan
        const isIT=inTransitTNs&&inTransitTNs.has(t);
        if(isIT){anyInTransit=true;statusHtml=`<span style="font-size:11px;font-weight:600;color:#60a5fa">📦 In transit</span>`;}
        else{statusHtml=`<span style="font-size:11px;color:var(--text3)">pending</span>`;}
        checkBtn=`<button data-tn="${e(t)}" onclick="event.stopPropagation();checkTrackingNum(this.dataset.tn,this)" style="font-size:11px;background:var(--red);color:#fff;border:none;border-radius:4px;padding:3px 10px;cursor:pointer;font-weight:600;flex-shrink:0">Check</button>`;
      }
      return`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05)">`
        +`<span style="font-family:monospace;font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(t)}</span>`
        +statusHtml
        +checkBtn
        +(!isRet?`<input type="checkbox" data-oid="${oid}" data-trk="${e(t)}" onclick="event.stopPropagation()" onchange="handleTrackChk(this)" style="accent-color:var(--green);width:14px;height:14px;cursor:pointer;flex-shrink:0">`:'')
        +`</div>`;
    }).join('');
    trackSection=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)">${rows}</div>`;
  } else {
    trackSection=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" ${isReturned?'checked':''} data-oid="${oid}" onclick="event.stopPropagation()" onchange="handleCoreChk(this)" style="accent-color:var(--green);width:15px;height:15px;cursor:pointer"><span style="font-size:13px;color:${isReturned?'var(--green)':'var(--amber)'};font-weight:600">${isReturned?'✓ Core returned':'Mark as returned'}</span></label></div>`;
  }

  let reminderSection='';
  if(status==='overdue'){
    const nextNum=remLog.length+1;
    const remHistory=remLog.length
      ?`<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:8px"><span style="font-size:11px;color:var(--text3)">Sent:</span>${remLog.map((d,i)=>`<span style="font-size:11px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--green)">${['1st','2nd','3rd'][i]||(i+1)+'th'} ${d}</span>`).join('')}<button style="font-size:10px;background:transparent;border:1px solid var(--border);border-radius:3px;padding:1px 6px;cursor:pointer;color:var(--text3)" data-id="${oid}" data-idx="${remLog.length-1}" onclick="event.stopPropagation();removeReminder(this.dataset.id,parseInt(this.dataset.idx))">undo last</button></div>`
      :'';
    let sendBtn='';
    if(anyInTransit&&!anyLabelNotUsed){
      sendBtn=`<div style="font-size:12px;color:#60a5fa;font-weight:600">📦 Core is in transit — no reminder needed</div>`;
    } else if(anyLabelNotUsed||!tNums.length){
      const hasToken=!!(reminderToken||localStorage.getItem('hpdc-rtoken'));
      if(hasToken){
        sendBtn=`<button data-id="${oid}" onclick="event.stopPropagation();sendReminderFromGAS(this.dataset.id,this)" style="background:var(--red);border:none;color:#fff;padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;cursor:pointer">✉ Send Reminder from sales@</button><span style="font-size:10px;color:var(--green);margin-left:8px">Sends automatically · auto-logs</span>`;
      } else {
        sendBtn=`<button data-id="${oid}" onclick="event.stopPropagation();sendReminderAndLog(this.dataset.id)" style="background:var(--red);border:none;color:#fff;padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;cursor:pointer">✉ Send Reminder</button><span style="font-size:10px;color:var(--text3);margin-left:8px">Opens email · <a href="javascript:void(0)" onclick="event.stopPropagation();sv('settings')" style="color:var(--amber)">Add reminder token in Settings</a> to auto-send from sales@</span>`;
      }
    } else {
      // Not yet checked — show Check buttons above, remind button grayed
      const hasToken=!!(reminderToken||localStorage.getItem('hpdc-rtoken'));
      if(hasToken){
        sendBtn=`<button data-id="${oid}" onclick="event.stopPropagation();sendReminderFromGAS(this.dataset.id,this)" style="background:var(--red);border:none;color:#fff;padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;cursor:pointer">✉ Send Reminder from sales@</button><span style="font-size:10px;color:var(--text3);margin-left:8px">Check label status first to confirm it hasn't shipped</span>`;
      } else {
        sendBtn=`<button data-id="${oid}" onclick="event.stopPropagation();sendReminderAndLog(this.dataset.id)" style="background:var(--red);border:none;color:#fff;padding:8px 18px;border-radius:var(--r);font-size:13px;font-weight:700;font-family:var(--fh);text-transform:uppercase;letter-spacing:.5px;cursor:pointer">✉ Send Reminder</button>`;
      }
    }
    reminderSection=`<div style="margin-top:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r)">${remHistory}<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">${sendBtn}</div></div>`;
  } else if(remLog.length){
    // Not overdue but has reminder history — show it anyway
    reminderSection=`<div style="margin-top:10px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r)"><div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap"><span style="font-size:11px;color:var(--text3)">Reminders sent:</span>${remLog.map((d,i)=>`<span style="font-size:11px;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;color:var(--green)">${['1st','2nd','3rd'][i]||(i+1)+'th'} ${d}</span>`).join('')}</div></div>`;
  }

  return`<div style="background:var(--bg2);border:1px solid ${border};border-radius:var(--rl);padding:14px 16px;margin-bottom:8px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:15px;font-family:var(--fh)">Order #${e(o.orderNum)}</div>
        <div style="font-size:13px;color:var(--text2);margin-top:1px">${e(o.description)}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${o.customerName?e(o.customerName)+' · ':''} Shipped ${o.date}${o.customerEmail?' · 📧 '+e(o.customerEmail):''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;margin-left:12px">
        ${badge}
        ${n(o.coreValue)>0&&!isReturned?`<span style="font-size:10px;color:var(--amber);font-weight:600">⚠ ${$$(n(o.coreValue),2)} at risk</span>`:''}
      </div>
    </div>
    ${trackSection}
    ${reminderSection}
    <div style="display:flex;gap:6px;align-items:center;margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05)">
      <label style="font-size:11px;color:var(--text3)">Return cost $</label>
      <input type="number" value="${e(String(o.returnCost||''))}" placeholder="0.00" style="width:90px;border:1px solid var(--border2);border-radius:var(--r);padding:4px 8px;font-size:12px;background:var(--bg3);color:var(--text)" data-oid="${oid}" onclick="event.stopPropagation()" oninput="setLblCost(this.dataset.oid,this.value)">
      <button class="btn-s" style="margin-left:auto" data-oid="${oid}" onclick="event.stopPropagation();editOrd(this.dataset.oid)">edit order</button>
    </div>
  </div>`;
}

function checkAllTracking(){}
function lcard(o,isUsed){return coreCard(o,isOrderReturned(o)?'returned':daysAged(o.date)>coreReturnDays?'overdue':'in_window',new Set());}
function buildReminderLog(){}
function handleTrackChk(el){toggleTrackReturned(el.dataset.oid,el.dataset.trk,el.checked);}
function handleCoreChk(el){toggleCoreReturned(el.dataset.oid,el.checked);}

function lblSec(title,list,isUsed){
  return list.map(o=>lcard(o,isUsed)).join('');
}


function setLblCost(id,v){const o=orders.find(x=>x.id===id);if(o){o.returnCost=v;saveAll();}}
function markUsed(id){const o=orders.find(x=>x.id===id);if(!o)return;pushUndo();const t=(o.trackingNumbers||[]).filter(x=>x.trim());if(t.length>0){o.returnedNums=[...t];}o.returnUsed=true;saveAll();render();}
function unmark(id){const o=orders.find(x=>x.id===id);if(o){pushUndo();o.returnUsed=false;o.returnedNums=[];saveAll();render();}}
// Per-tracking-number return helpers
function isOrderReturned(o){
  if(!o.returnSent)return false;
  if((o.trackingNumbers||[]).filter(t=>t.trim()).length>0){
    const rn=o.returnedNums||[];
    return o.trackingNumbers.filter(t=>t.trim()).every(t=>rn.includes(t));
  }
  return o.returnUsed;
}
function pendingLabelCount(o){
  if(!o.returnSent)return 0;
  const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
  if(tNums.length>0){
    const rn=o.returnedNums||[];
    return tNums.filter(t=>!rn.includes(t)).length;
  }
  return o.returnUsed?0:1;
}
function toggleTrackReturned(ordId,trackNum,checked){
  const o=orders.find(x=>x.id===ordId);if(!o)return;
  pushUndo();
  if(!o.returnedNums)o.returnedNums=[];
  if(checked){if(!o.returnedNums.includes(trackNum))o.returnedNums.push(trackNum);}
  else{o.returnedNums=o.returnedNums.filter(n=>n!==trackNum);}
  // sync returnUsed for orders with no tracking numbers
  if((o.trackingNumbers||[]).filter(t=>t.trim()).length===0)o.returnUsed=checked;
  else o.returnUsed=isOrderReturned(o);
  saveAll();render();
}
function toggleCoreReturned(id,checked){
  // fallback for orders with no tracking numbers
  const o=orders.find(x=>x.id===id);if(!o)return;
  pushUndo();o.returnUsed=checked;saveAll();render();
}
function markReviewed(id){
  if(reviewedOrders.has(id))reviewedOrders.delete(id);
  else reviewedOrders.add(id);
  saveAll();render();
}

let searchQuery='';
let showEmailFor=new Set();
let expandedOrds=new Set();
let expandedCores=new Set();
let expandedDays=new Set(); // dates (strings) that are expanded
let emailTemplate='';
let ledgerSearch='';
let coreSearch='';
let coreDateFrom='';
let coreDateTo='';
let coreFilter='all';
let coreReturnDays=30; // return policy window in days
let ledgerDateFrom='';
let ledgerDateTo='';
let lowMarginFilter=false;
let reviewedOrders=new Set();
let googleReviewState={};  // { [orderNum]: { sent, sentDate, skipped } }
let googleReviewLink='';
function histV(){
  const q=searchQuery.trim().toLowerCase();
  const filtered=q
    ?[...orders].filter(o=>
        o.orderNum.toLowerCase().includes(q)||
        o.description.toLowerCase().includes(q)||
        o.date.toLowerCase().includes(q)||
        o.notes.toLowerCase().includes(q)
      )
    :[...orders];

  const searchBar=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <input type="text" class="inp-base" value="${e(searchQuery)}" placeholder="Search order #, description, date…" style="flex:1;min-width:200px;padding:9px 12px;font-size:14px" onkeydown="if(event.key==='Enter')runSearch()" id="search-inp">
    ${q?`<button class="btn-s" onclick="searchQuery='';render()">✕ Clear</button>`:''}
    <span style="font-size:12px;color:var(--text3)">${filtered.length} of ${orders.length} orders</span>
  </div>`;

  if(!filtered.length)return`<h2 class="s-title">Search & History</h2>`+searchBar+`<div class="empty"><h3>${q?'No results':'No entries yet'}</h3><p>${q?'Try a different search term.':'Add your first shipment entry.'}</p></div>`;

  const rows=[...filtered].reverse().map(o=>{
    const margin=n(o.revenue)>0?(gp(o)/n(o.revenue)*100):0;
    const low=margin<alertThreshold&&n(o.revenue)>0;
    return`<tr style="${low?'background:rgba(204,0,0,.06)':''}">
      <td style="white-space:nowrap">${e(o.date)}</td>
      <td style="font-weight:600">${e(o.orderNum)}</td>
      <td class="trunc" style="max-width:160px;color:var(--text2)">${e(o.description)}</td>
      <td class="right cg" style="font-weight:600">${$$(n(o.revenue),2)}</td>
      ${fieldConfig.filter(f=>f.active).map(f=>`<td class="right" style="color:var(--text3)">${$$(n(o[f.id]||0),2)}</td>`).join('')}
      <td class="right" style="white-space:nowrap">${o.returnSent?(o.returnUsed?`<span class="badge bdg-u">${$$(n(o.returnCost),2)}</span>`:`<span class="badge bdg-p">pending${n(o.returnCost)>0?' ('+$$(n(o.returnCost),2)+')':''}</span>`):`<span style="color:var(--text3)" title="No core required">—</span>`}</td>
      <td class="right" style="font-weight:700"><span class="${cc(gp(o))}">${$$(gp(o),2)}</span><span style="font-size:10px;color:${low?'var(--red)':'var(--text3)'};margin-left:3px">${margin.toFixed(0)}%</span></td>
      <td><button class="btn-s" onclick="editOrd('${o.id}')">edit</button></td>
    </tr>`;
  }).join('');

  return`<h2 class="s-title">Search & History</h2>${searchBar}
  <div class="table-wrap"><table>
    <thead><tr>
      <th>Date</th><th>Order</th><th>Description</th><th class="right">Revenue</th>
      ${fieldConfig.filter(f=>f.active).map(f=>`<th class="right">${e(f.label)}</th>`).join('')}
      <th class="right">Return</th><th class="right">Gross / margin</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}
function runSearch(){searchQuery=document.getElementById('search-inp')?.value||'';document.getElementById('view').innerHTML=histV();updateSummary();}

function changePass(){const el=document.getElementById('new-pw');if(!el?.value){return;}appPassword=el.value;localStorage.setItem(PASS_KEY,appPassword);el.value='';alert('Password updated.');}
function updPI(key,field,val){const item=newPeriodDraft?.items.find(x=>x.key===key);if(!item)return;item[field]=field==='amount'?parseFloat(val)||0:val;const rEl=document.getElementById(`pi-rate-${key}`);if(rEl)rEl.textContent=`${$$(getItemDailyRate(item),2)}/day`;const bEl=document.getElementById('pd-burn');if(bEl){const b=newPeriodDraft.items.reduce((s,x)=>s+getItemDailyRate(x),0);bEl.textContent=`${$$(b,2)}/day`;}}
function addPI(){newPeriodDraft.items.push({key:'fc_'+uid(),name:'New item',amount:0,freq:'monthly'});render();}
function removePI(key){if(newPeriodDraft.items.length<=1)return;newPeriodDraft.items=newPeriodDraft.items.filter(x=>x.key!==key);render();}
function savePeriod(){if(!newPeriodDraft?.effectiveDate){alert('Enter an effective date.');return;}pushUndo();fcPeriods.push({id:uid(),effectiveDate:newPeriodDraft.effectiveDate,note:newPeriodDraft.note||'',items:newPeriodDraft.items.map(x=>({...x}))});savePeriods();initNewPeriod();sv('settings');}
function delPeriod(id){if(fcPeriods.length<=1)return;pushUndo();fcPeriods=fcPeriods.filter(p=>p.id!==id);savePeriods();render();}
function cxUp(id,field,val){const x=customExpenses.find(c=>c.id===id);if(!x)return;if(field==='endDate')x.endDate=val||null;else x[field]=val;saveCx();}
function startCx(){newCxDraft={name:'',amount:'',freq:'monthly',startDate:today()};render();}

function buildAudit(dated,sortedP){
  if(!dated.length)return`<p style="font-size:13px;color:var(--text3)">No entries yet.</p>`;
  const pDays={};dated.forEach(([d])=>{const p=getPeriod(d);if(!pDays[p.id])pDays[p.id]={p,days:[]};pDays[p.id].days.push(d);});
  let grand=0,html=`<div class="audit-box">`;
  sortedP.forEach(p=>{if(!pDays[p.id])return;const{days}=pDays[p.id];const burn=p.items.reduce((s,x)=>s+getItemDailyRate(x),0);const pt=burn*days.length;grand+=pt;html+=`<div class="a-phdr">Period ${p.effectiveDate}${p.note?' — '+e(p.note):''} (${days.length} days)</div>`;p.items.forEach(x=>{const d=getItemDailyRate(x);html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:11px">${$$(d,2)}/day × ${days.length}</span><span class="co">${$$(d*days.length,2)}</span></div>`;});html+=`<div class="a-row" style="font-weight:700"><span>Period subtotal</span><span></span><span class="co">${$$(pt,2)}</span></div>`;});
  const actCx=customExpenses.filter(x=>x.freq!=='onetime');if(actCx.length){html+=`<div class="a-phdr">Custom expenses</div>`;actCx.forEach(x=>{const da=dated.filter(([d])=>{const dt=pd(d),st=pd(x.startDate),en=x.endDate?pd(x.endDate):null;return st<=dt&&(!en||en>=dt);}).length;if(!da)return;const dly=x.freq==='daily'?n(x.amount):x.freq==='weekly'?n(x.amount)/7:n(x.amount)/30;const amt=dly*da;grand+=amt;html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:11px">${$$(dly,2)}/day × ${da}</span><span class="co">${$$(amt,2)}</span></div>`;});} 
  const ot=customExpenses.filter(x=>x.freq==='onetime');ot.forEach(x=>{grand+=n(x.amount);html+=`<div class="a-row"><span style="color:var(--text2)">${e(x.name)}</span><span style="color:var(--text3);font-size:11px">one-time</span><span class="co">${$$(n(x.amount),2)}</span></div>`;});
  const totalExp=dailyExpenses.reduce((s,x)=>s+n(x.amount),0);if(totalExp){grand+=totalExp;html+=`<div class="a-row" style="font-weight:700"><span>One-time daily exp</span><span></span><span class="ca">${$$(totalExp,2)}</span></div>`;}
  html+=`<div class="a-total"><span>Total accrued</span><span class="co">${$$(grand,2)}</span></div></div>`;return html;
}

function dailyV(){
  const dated=byDate();
  if(!dated.length)return`<div class="empty"><h3>Nothing logged yet</h3><p>Add your first shipped order to start tracking.</p><button class="btn-p" onclick="sv('entry')">Add first entry</button></div>`;
  const t=totals();
  let alerts='';
  const totalPending=orders.reduce((s,o)=>s+pendingLabelCount(o),0);
  if(totalPending>0)alerts+=`<div class="alert alert-warn">⚑ ${totalPending} return label${totalPending>1?'s':''} pending — up to ${$$(t.pending,2)} exposure. <button class="btn-s" style="margin-left:8px" onclick="sv('labels')">Core Returns →</button></div>`;
  const lowMarginOrders=orders.filter(o=>gpPct(o)<alertThreshold&&n(o.revenue)>0);
  const unreviewedLow=lowMarginOrders.filter(o=>!reviewedOrders.has(o.id));
  if(unreviewedLow.length)alerts+=`<div class="alert alert-red" id="low-margin-alert" onclick="toggleLowMarginFilter()" style="cursor:pointer;user-select:none">⚠ ${unreviewedLow.length} order${unreviewedLow.length>1?'s':''} below ${alertThreshold}% margin — ${lowMarginFilter?'<strong>showing flagged only — click to show all</strong>':'<strong>click to show only flagged orders</strong>'}. Click <strong>review ✓</strong> on each to clear.</div>`;

  // Apply search + date filter to orders
  const q=ledgerSearch.trim().toLowerCase();
  const dfrom=ledgerDateFrom?pd(ledgerDateFrom):null;
  const dto=ledgerDateTo?pd(ledgerDateTo):null;

  // Filter orders
  const filteredOrders=orders.filter(o=>{
    if(lowMarginFilter&&!(gpPct(o)<alertThreshold&&n(o.revenue)>0))return false;
    if(q&&!(o.orderNum.toLowerCase().includes(q)||o.description.toLowerCase().includes(q)||o.notes.toLowerCase().includes(q)))return false;
    const od=pd(o.date);
    if(dfrom&&od<dfrom)return false;
    if(dto&&od>dto)return false;
    return true;
  });

  const isFiltered=q||dfrom||dto||lowMarginFilter;
  const matchCount=filteredOrders.length;

  // Group filtered orders by date
  const filteredMap={};
  filteredOrders.forEach(o=>{if(!filteredMap[o.date])filteredMap[o.date]=[];filteredMap[o.date].push(o);});
  const filteredDated=Object.entries(filteredMap).sort(([a],[b])=>pd(a)-pd(b));

  const toolbar=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;margin-bottom:14px;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
      <input type="text" id="ledger-search-inp" class="inp-base" value="${e(ledgerSearch)}" placeholder="Search orders — type then press Enter (lmm, chr 3.6, order #…)" style="flex:1;min-width:200px;padding:8px 12px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <button class="btn-p" style="padding:8px 16px;font-size:12px" onclick="runLedgerSearch()">Search</button>
      ${isFiltered?`<button class="btn-s" onclick="clearLedgerSearch()">✕ Clear</button>`:''}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;flex-shrink:0">Date range:</span>
      <input type="text" id="ledger-from" class="inp-base" value="${e(ledgerDateFrom)}" placeholder="From M/D/YYYY" style="width:130px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <span style="font-size:12px;color:var(--text3)">—</span>
      <input type="text" id="ledger-to" class="inp-base" value="${e(ledgerDateTo)}" placeholder="To M/D/YYYY" style="width:130px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')runLedgerSearch()">
      <input class="ledger-jump inp-base" type="text" id="jump-inp" placeholder="Jump to date (M/D)" style="width:140px;padding:6px 10px;font-size:13px" onkeydown="if(event.key==='Enter')jumpToDate()">
      <button class="btn-g" style="padding:6px 12px;font-size:12px" onclick="jumpToDate()">Jump</button>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">${isFiltered?`${matchCount} order${matchCount!==1?'s':''} matched`:orders.length+' orders total'}</span>
      <button class="btn-p" style="padding:6px 14px;font-size:12px" onclick="sv('entry')">+ New entry</button>
    </div>
  </div>`;

  if(isFiltered&&!filteredDated.length)
    return alerts+toolbar+`<div class="empty"><h3>No orders matched</h3><p>Try different search terms or a wider date range.</p></div>`;

  let rnet=0;
  const allDated=byDate();
  // Running net walks EVERY calendar day (not just order days) to charge burn on gap days
  const fullRnet={};
  let r=0;
  if(allDated.length){
    const ordMap={};
    allDated.forEach(([date,dayOrders])=>{ordMap[normDateStr(date)]=dayOrders;});
    const allOrderDates=orders.map(o=>pd(o.date)).filter(d=>d&&d.getFullYear()>2000);
    const bizStart=new Date(Math.min(...allOrderDates.map(d=>d.getTime())));
    bizStart.setHours(0,0,0,0);
    const lastEntryDate=pd(allDated[allDated.length-1][0]);
    const todayD=new Date();todayD.setHours(23,59,59);
    const lastDate=lastEntryDate>todayD?lastEntryDate:todayD;
    const cur=new Date(bizStart);
    while(cur<=lastDate){
      const dstr=(cur.getMonth()+1)+'/'+cur.getDate()+'/'+cur.getFullYear();
      const dayOrds=ordMap[dstr]||[];
      const dRev=dayOrds.reduce((s,o)=>s+n(o.revenue),0);
      const dVc=dayOrds.reduce((s,o)=>s+vc(o),0);
      r+=dRev-dVc-getDayBurn(dstr)-getDayExpTotal(dstr);
      if(ordMap[dstr])fullRnet[dstr]=r;
      cur.setDate(cur.getDate()+1);
    }
  }

  const dayData=(isFiltered?filteredDated:allDated).map(([date,dayOrders])=>{
    const dRev=dayOrders.reduce((s,o)=>s+n(o.revenue),0),dVc=dayOrders.reduce((s,o)=>s+vc(o),0);
    const dBurn=getDayBurn(date),dExpT=getDayExpTotal(date),dNet=dRev-dVc-dBurn-dExpT;
    return{date,dayOrders,dRev,dVc,dBurn,dExpT,dNet,rnet:fullRnet[normDateStr(date)]||0,isFiltered};
  });

  // Auto-expand most recent day if nothing is expanded yet
  const sortedDates=dayData.map(d=>d.date);
  if(expandedDays.size===0&&sortedDates.length){
    expandedDays.add(sortedDates[sortedDates.length-1]); // most recent
  }
  return alerts+toolbar+[...dayData].reverse().map(buildDaySection).join('');
}

function buildDaySection({date,dayOrders,dRev,dVc,dBurn,dExpT,dNet,rnet}){

    let detail='';

      const costRows=activeF.map(fc=>`<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span style="color:var(--text3)">${e(fc.label)}</span><span style="font-weight:500">${$$(n(o[fc.id]||0),2)}</span></div>`).join('');
      const tNums=(o.trackingNumbers||[]).filter(t=>t.trim());
      detail='<div style="padding:10px 16px 12px 24px;background:rgba(0,0,0,.2);border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:12px 24px">'
        // Cost breakdown
        +'<div><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Cost breakdown</div>'
        +costRows
        +(o.returnUsed?'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px"><span style="color:var(--text3)">Return shipping</span><span style="font-weight:500">'+$$(n(o.returnCost),2)+'</span></div>':'')
        +'<div style="display:flex;justify-content:space-between;padding:4px 0;margin-top:2px;border-top:1px solid var(--border2);font-size:12px;font-weight:700"><span>Total variable</span><span class="cr">'+$$(vc(o),2)+'</span></div>'
        +'<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px;font-weight:700"><span>Gross profit</span><span class="'+cc(gp(o))+'">'+$$(gp(o),2)+' ('+gpPct(o).toFixed(1)+'%)</span></div>'
        +'</div>'
        // Order details
        +'<div><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Order details</div>'
        +(o.customerEmail?'<div style="font-size:12px;margin-bottom:4px;color:var(--text2)">📧 '+e(o.customerEmail)+'</div>':'')
        +(n(o.coreValue)>0?'<div style="font-size:12px;margin-bottom:4px;color:var(--amber);font-weight:600">⚠ Core value at risk: '+$$(n(o.coreValue),2)+'</div>':'')
        +(o.returnSent?'<div style="font-size:12px;margin-bottom:4px;color:'+(isOrderReturned(o)?'var(--green)':'var(--amber)')+'">'+( isOrderReturned(o)?'✓ Core returned':'⚑ Core return pending')+'</div>':'')
        +(tNums.length?'<div style="font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Tracking</div>'+tNums.map(t=>'<div style="font-family:monospace;font-size:11px;color:var(--text2);margin-bottom:2px">'+e(t)+'</div>').join(''):'')
        +(o.notes?'<div style="font-size:12px;color:var(--text3);margin-top:4px;font-style:italic">'+e(o.notes)+'</div>':'')
        +'</div>'
        +'</div>';
    }
    return '<div class="ord-row'+(lowM?' low-margin':'') +'" style="cursor:pointer" onclick="toggleOrdExpand(\''+oid+'\')">'+
      '<span class="ord-num">#'+e(o.orderNum)+'</span>'
      +'<span class="ord-desc">'+e(o.description)+(o.customerName?' <span style="font-size:10px;color:var(--text3)">· '+e(o.customerName)+'</span>':'')+(o.technician?' <span style="font-size:10px;color:var(--blue)">🔧 '+e(o.technician)+'</span>':'')+'</span>'
      +'<span class="ord-rev">'+$$(n(o.revenue),2)+'</span>'
      +'<span class="ord-vc cr">−'+$$(vc(o),2)+'</span>'
      +'<span class="ord-gp '+cc(gp(o))+'">'+$$(gp(o),2)+' <span style="font-size:10px;opacity:.7">'+gpPct(o).toFixed(0)+'%</span></span>'
      +'<span class="ord-act" style="flex:0 0 auto;display:flex;gap:3px;justify-content:flex-end">'
      +reviewBtn
      +'<button class="btn-s" onclick="event.stopPropagation();editOrd(\''+oid+'\')">edit</button>'
      +'<button class="btn-d" onclick="event.stopPropagation();delOrd(\''+oid+'\')">×</button>'
      +'</span>'
      +'</div>'
      +detail;
  }).join('');


  const dayExps=getDayExpenses(date);
  let expSection='';
  if(dayExps.length||addingExpDate===date){
    const expRows=dayExps.map(x=>`<div class="exp-row"><span class="exp-desc">${e(x.description)}</span><span class="exp-cat">${e(x.category)}</span><span class="exp-amt cr">−${$$(n(x.amount),2)}</span><span style="flex:0 0 32px;display:flex;justify-content:flex-end"><button class="btn-d" onclick="delDailyExp('${x.id}')">×</button></span></div>`).join('');
    const addForm=addingExpDate===date?`<div class="exp-add-row">
      <input type="text" class="inp-base" placeholder="Description" style="flex:1;min-width:120px" oninput="dexpField('description',this.value)">
      <input type="number" class="inp-base" placeholder="Amount $" style="width:100px" oninput="dexpField('amount',this.value)">
      <input type="text" class="inp-base" placeholder="Category (optional)" style="width:120px" oninput="dexpField('category',this.value)">
      <button class="btn-p" style="padding:5px 14px;font-size:12px" onclick="confirmAddExp('${date}')">Add</button>
      <button class="btn-g" style="padding:5px 12px;font-size:12px" onclick="cancelAddExp()">Cancel</button>
    </div>`:`<div style="padding:6px 16px"><button class="btn-s" onclick="event.stopPropagation();openAddExp('${date}')">+ one-time expense</button></div>`;
    expSection=`<div class="day-exp-section">${dayExps.length?'<div style="padding:5px 16px 0;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px">One-time expenses</div>':''}${expRows}${addForm}</div>`;
  }
  const period=getPeriod(date);
  const coreInputs=period.items.map(item=>`<div class="fc-field">
    <span class="fc-field-lbl" title="${item.name}">${e(item.name)}</span>
    <input type="number" id="fc-${s}-${item.key}" class="fc-inp${isItemOv(date,item.key)?' ov':''}" value="${getDayItemRate(date,item.key).toFixed(2)}" oninput="setDayItemRate('${date}','${item.key}',this.value)">
  </div>`).join('');
  const activeCx=getActiveCx(date);
  const cxInputs=activeCx.length?'<div class="fc-divider"></div>'+activeCx.map(cx=>`<div class="fc-field"><span class="fc-field-lbl" title="${cx.name}">${e(cx.name)}</span><input type="number" id="fc-${s}-cx_${cx.id}" class="fc-inp${isCxOv(date,cx.id)?' ov':''}" value="${getCxRate(date,cx.id).toFixed(2)}" oninput="setCxRate('${date}','${cx.id}',this.value)"></div>`).join(''):'';
  const expNudge=(!dayExps.length&&addingExpDate!==date)?`<button class="btn-s" style="font-size:10px" onclick="event.stopPropagation();openAddExp('${date}')">+ expense</button>`:'';
  const ordHdr=`<div class="ord-hdr"><span class="ord-num">Order #</span><span style="flex:1">Description</span><span class="ord-rev" style="text-align:right">Revenue</span><span class="ord-vc" style="text-align:right">Var costs</span><span class="ord-gp" style="text-align:right">Gross / margin</span><span class="ord-act" style="min-width:80px"></span></div>`;
  return`<div class="day-section${isOpen?' highlighted':''}" id="day-${s}">
    <div class="day-head" onclick="toggleDay('${date}')" style="cursor:pointer;user-select:none">
      <span class="day-date-lbl">${date}</span>
      <div class="day-kpis">
        <div class="kpi"><span class="kpi-lbl">Revenue in</span><span class="kpi-val cg">${$$(dRev,2)}</span></div>
        <div class="kpi"><span class="kpi-lbl">Total out</span><span class="kpi-val cr" id="dout-${s}">−${$$(dVc+dBurn+dExpT,2)}</span></div>
        <div class="kpi"><span class="kpi-lbl">Net today</span><span class="pill ${dNet>=0?'pill-pos':'pill-neg'}" id="dnet-${s}">${dNet>=0?'+':''} ${$$(dNet,2)}</span></div>
        <div class="kpi"><span class="kpi-lbl">Running</span><span class="kpi-val ${cc(rnet)}" id="drun-${s}">${$$(rnet,2)}</span></div>
      </div>
      <div class="fc-row" style="gap:6px;margin-left:auto">
        <span style="font-size:18px;color:var(--text3);line-height:1">${isOpen?'▾':'▸'}</span>
      </div>
    </div>
    ${isOpen?`
    <div style="padding:6px 14px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <button class="btn-p" style="font-size:12px;padding:5px 14px" onclick="event.stopPropagation();addForDate('${date}')">+ New order</button>
      <span style="font-size:11px;color:var(--text3)">Date pre-fills as ${date} — change it in the form if needed</span>
    </div>
    <div class="day-orders">${ordHdr}${ordRows}</div>
    ${expSection}
    <div class="day-fc">
      <span class="fc-section-lbl">Fixed</span>
      <span style="font-size:12px;color:var(--text3);margin-left:8px">${$$(dBurn,2)}/day</span>
      <div class="fc-right" style="margin-left:auto">
        <div><span class="fc-total-lbl">Total</span><span class="fc-total-val" id="dburn-${s}">${$$(dBurn,2)}</span></div>
      </div>
    </div>`:''}
  </div>`;
}
function addForDate(d){entryDatePreset=d;sv('entry');}

// ── SUMMARY VIEW ──────────────────────────────────────────────────────────────
function summaryV(){
  if(!orders.length)return`<div class="empty"><h3>No data yet</h3></div>`;
  const ranges=dateRanges();
  // break even
  const b=getDayBurn(todayShort());
  const avgVC=orders.length?orders.reduce((s,o)=>s+vc(o),0)/orders.length:0;
  const avgRev=orders.length?orders.reduce((s,o)=>s+n(o.revenue),0)/orders.length:0;
  const avgGP=avgRev-avgVC;
  const ordersNeeded=avgGP>0?Math.ceil(b/avgGP):'∞';
  const revNeeded=avgGP>0?b/(avgGP/avgRev)*100:0;
  const beHtml=`<div class="breakeven-box">
    <div class="be-title">Break-even today (based on averages)</div>
    <div class="be-grid">
      <div class="be-metric"><div class="be-lbl">Daily burn</div><div class="be-val co">${$$(b,2)}</div></div>
      <div class="be-metric"><div class="be-lbl">Orders needed</div><div class="be-val cp">${ordersNeeded}</div></div>
      <div class="be-metric"><div class="be-lbl">Revenue needed</div><div class="be-val cg">${revNeeded>0?$$(b/(avgGP/avgRev)):'—'}</div></div>
    </div>
  </div>`;
  return beHtml+`<div class="sum-cards">${['today','week','month','year'].map(k=>{const r=ranges[k];return buildSumCard(r,ordersInRange(r.start,r.end),expensesInRange(r.start,r.end));}).join('')}</div>`;
}

</script>
